<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="color-scheme" content="dark">
<title>FOX2 Onboarding</title>
<script id="runtime-vars"></script>
<style>
:root { color-scheme: dark; }
* { box-sizing: border-box; }
body {
  background: #000; color: #fff; margin: 0; padding: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  overflow: hidden; position: fixed; inset: 0;
}
.container {
  max-width: 480px; margin: 0 auto; padding: 12px;
  height: 100dvh; display: flex; flex-direction: column; gap: 8px;
}
.title {
  font-size: 28px; font-weight: 700; text-align: center;
  margin-top: 4px; padding-bottom: 4px; line-height: 1.2;
  flex-shrink: 0; color: #f5c842;
  border-bottom: 1px solid rgba(245,200,66,0.3);
}
.dots { display:flex; gap:8px; justify-content:center; margin:6px 0; flex-shrink:0; }
.dot { width:8px; height:8px; border-radius:50%; background:#333; transition:all .3s; }
.dot.active { background:#00ffff; width:24px; border-radius:4px; }
.btn-row { display:flex; gap:10px; padding-top:6px; flex-shrink:0; }
.btn {
  flex:1; padding:12px; border-radius:10px; border:none;
  font-size:16px; font-weight:600; cursor:pointer; transition:all .2s; user-select:none;
}
.btn:active { transform:scale(0.95); }
.btn-primary { background:#00ffff; color:#000; }
.btn-secondary { background:#222; color:#fff; }

/* -- Welcome -- */
.welcome {
  flex:1; display:flex; flex-direction:column;
  justify-content:center; text-align:center; gap:10px;
}
.welcome-device-wrap {
  position:relative; height:320px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
}
.welcome-device-wrap .device-frame {
  position:absolute; z-index:0; pointer-events:none;
}
.logo {
  font-size:64px; font-weight:700;
  background:linear-gradient(135deg,#00ffff,#ff6b00);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.tagline { font-size:20px; color:#ff6b00; position:relative; z-index:1; }
.welcome-body { font-size:19px; line-height:1.6; opacity:0.85; }
.disclaimer { font-size:13px; opacity:0.4; margin-top:8px; }

/* -- Info boxes -- */
.content-area { flex:1; overflow-y:auto; min-height:0; display:flex; flex-direction:column; gap:12px; }
.info-box { background:#0a0a0a; border:1px solid #1e1e1e; border-radius:12px; padding:16px; }
.info-box-text { font-size:19px; line-height:1.6; color:#ccc; }
.info-box-text strong { color:#00ffff; font-weight:600; }
.info-box-text strong.fat { color:#4CAF50; }
.arc-wrap { width:100%; max-width:300px; margin:8px auto 0; }

/* -- Intent cards -- */
.step-question { font-size:19px; color:#666; text-align:center; flex-shrink:0; }
.intent-grid { flex:1; display:flex; flex-direction:column; gap:12px; overflow-y:auto; padding:2px; min-height:0; }
.intent-card {
  display:flex; align-items:center; gap:16px; padding:18px 16px;
  border-radius:14px; border:2px solid #1e1e1e; background:#0a0a0a;
  cursor:pointer; transition:all 0.18s ease; user-select:none; flex-shrink:0;
}
.intent-card:active { transform:scale(0.98); }
.intent-card.sel { border-color:#00ffff; background:#001a1a; box-shadow:0 0 18px rgba(0,255,255,0.2); }
.intent-icon { font-size:34px; width:58px; height:58px; display:flex; align-items:center; justify-content:center; flex-shrink:0; border-radius:12px; background:#111; }
.intent-card.sel .intent-icon { background:#002a2a; }
.intent-title { font-size:22px; font-weight:700; color:#ddd; margin-bottom:5px; line-height:1.2; }
.intent-card.sel .intent-title { color:#00ffff; }
.intent-sub { font-size:17px; color:#555; line-height:1.4; }
.intent-card.sel .intent-sub { color:#4dbfbf; }
.intent-check { width:24px; height:24px; border-radius:50%; border:2px solid #333; flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:all 0.18s; font-size:13px; }
.intent-card.sel .intent-check { background:#00ffff; border-color:#00ffff; color:#000; }

/* -- Confirm -- */
.confirm-wrap { flex:1; display:flex; flex-direction:column; gap:12px; overflow-y:auto; min-height:0; }
.confirm-hero { border-radius:16px; padding:18px 16px 16px; text-align:center; flex-shrink:0; }
.confirm-intent-label { font-size:13px; text-transform:uppercase; letter-spacing:0.12em; color:#555; margin-bottom:4px; }
.confirm-intent-name { font-size:26px; font-weight:700; color:#fff; margin-bottom:14px; }
.confirm-target-row { display:flex; align-items:center; justify-content:center; gap:12px; }
.confirm-target-badge { font-size:58px; font-weight:800; line-height:1; }
.tl-main { font-size:17px; color:#888; text-transform:uppercase; letter-spacing:0.08em; text-align:left; }
.tl-sub { font-size:15px; color:#555; text-align:left; margin-top:2px; }
.custom-adjuster { display:none; align-items:center; justify-content:center; gap:20px; padding:14px; background:#0a0a0a; border:1px solid #1e1e1e; border-radius:12px; flex-shrink:0; }
.custom-adjuster.visible { display:flex; }
.adj-btn { width:44px; height:44px; background:#E91E63; border:none; border-radius:10px; color:#fff; font-size:22px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.adj-btn:active { transform:scale(0.92); }
.adj-val { font-size:40px; font-weight:800; color:#E91E63; min-width:80px; text-align:center; line-height:1; }
.adj-unit { font-size:12px; color:#555; text-align:center; margin-top:3px; }
.confirm-meaning { background:#0a0a0a; border:1px solid #1e1e1e; border-radius:12px; padding:14px; flex-shrink:0; }
.meaning-title { font-size:13px; text-transform:uppercase; letter-spacing:0.12em; color:#444; margin-bottom:12px; }
.meaning-row { display:flex; align-items:flex-start; gap:12px; margin-bottom:12px; }
.meaning-row:last-child { margin-bottom:0; }
.meaning-dot { width:7px; height:7px; border-radius:50%; margin-top:8px; flex-shrink:0; }
.meaning-text { font-size:17px; line-height:1.5; color:#bbb; }
.change-link { text-align:center; font-size:16px; color:#00ffff; cursor:pointer; opacity:0.6; padding:4px; text-decoration:underline; text-underline-offset:3px; flex-shrink:0; }

/* -- Device preview slideshow -- */
.preview-wrap {
  flex:1; display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:16px; min-height:0;
}
.device-screen-outer {
  width:280px; height:280px; overflow:hidden;
  border-radius:16px; border:3px solid #222;
  flex-shrink:0; position:relative;
}
.device-screen-track {
  display:flex; flex-direction:row;
  height:100%;
  transition: transform 2.0s cubic-bezier(0.25,0.46,0.45,0.94);
  will-change: transform;
}
.device-screen-slide {
  flex: 0 0 280px; width:280px; height:280px;
  background:#000;
  overflow:hidden;
}
.device-screen-slide svg { width:100%; height:100%; display:block; }
#todaySlide svg { width:100%; height:100%; display:block; }
.slide-caption {
  font-size:20px; line-height:1.5; color:#aaa;
  text-align:center; padding:0 8px; flex-shrink:0;
  height:80px;
  overflow:hidden;
  transition: opacity 0.3s ease;
}
.slide-caption strong { color:#fff; font-weight:600; }
.slide-caption.fading { opacity:0; }
.slide-dots { display:flex; gap:8px; justify-content:center; flex-shrink:0; }
.slide-dot { width:7px; height:7px; border-radius:50%; background:#333; transition:all .3s; }
.slide-dot.active { background:#00ffff; width:20px; border-radius:4px; }

/* -- Steps -- */
.step-list { display:flex; flex-direction:column; gap:10px; overflow-y:auto; flex:1; min-height:0; }
.step-item { display:flex; align-items:flex-start; gap:14px; background:#0a0a0a; border:1px solid #1e1e1e; border-radius:12px; padding:14px; flex-shrink:0; }
.step-num { width:32px; height:32px; border-radius:50%; background:#00ffff; color:#000; font-size:16px; font-weight:800; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:1px; }
.step-text { font-size:17px; line-height:1.5; color:#ccc; }
.step-text strong { color:#fff; font-weight:600; }

/* -- Caveats -- */
.caveat-list { list-style:none; padding:0; margin:0; }
.caveat-list li { position:relative; padding-left:18px; margin-bottom:18px; font-size:18px; line-height:1.5; color:#ccc; }
.caveat-list li:last-child { margin-bottom:0; }
.caveat-list li:before { content:"\2022"; position:absolute; left:0; color:#00ffff; font-weight:bold; }
.caveat-list li strong { color:#ff9800; }

/* -- Done -- */
.done-wrap { flex:1; display:flex; flex-direction:column; justify-content:center; text-align:center; gap:12px; }

/* -- Welcome device graphic -- */
.device-frame{width:200px;height:320px;position:relative;margin:0 auto;flex-shrink:0;}
.device-body{position:absolute;inset:0;background:#232347;border-radius:100px/140px;box-shadow:0 10px 30px rgba(0,0,0,.85), inset 0 2px 4px rgba(255,255,255,.10);z-index:1}
.device-body::before{content:"";position:absolute;left:0;width:100%;height:26px;background:#000;z-index:2;top:-20px;}
.device-body::after{content:"";position:absolute;left:0;width:100%;height:78px;background:#000;z-index:2;bottom:-66px;}
.device-seam{position:absolute;left:10%;width:80%;height:2px;top:18%;background:linear-gradient(to bottom, rgba(255,255,255,.18), rgba(0,0,0,.45));z-index:4}
.device-screen{position:absolute;top:22%;left:50%;transform:translateX(-50%);width:140px;height:140px;background:#000;border-radius:14px;box-shadow:inset 0 2px 10px rgba(0,0,0,.7), 0 0 0 3px #333;display:flex;align-items:center;justify-content:center;z-index:3;overflow:hidden}
.device-screen svg{width:100%;height:100%}
.device-buttons{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);width:120px;height:40px;z-index:3}
.device-btn-circle{position:absolute;left:50%;transform:translateX(-50%);bottom:11px;width:46px;height:46px;background:#0ff;border-radius:50%;box-shadow:0 2px 10px rgba(0,255,255,.35)}
.device-btn-triangle{position:absolute;left:0;bottom:34px;width:29px;height:29px;background:#ff9800;clip-path:polygon(50% 100%,0 0,100% 0);box-shadow:0 2px 10px rgba(255,152,0,.35)}
.device-mouthpiece{position:absolute;top:11px;right:-11px;width:60px;height:34px;background:#fff;border-radius:8px;transform-origin:left center;transform:rotate(-45deg);box-shadow:0 2px 6px rgba(0,0,0,.4);z-index:6}
</style>
</head>
<body>
<div class="container">
  <div class="title" id="pageTitle" style="display:none;"></div>

  <div class="btn-row" id="buttons"></div>
</div>

var state = 0;

var RUNTIME_CURRENT_LEVEL = (typeof RUNTIME_CURRENT_LEVEL !== 'undefined') ? RUNTIME_CURRENT_LEVEL : 1;
var RUNTIME_TARGET2       = (typeof RUNTIME_TARGET2       !== 'undefined') ? RUNTIME_TARGET2       : 60;
var RUNTIME_TARGET3       = (typeof RUNTIME_TARGET3       !== 'undefined') ? RUNTIME_TARGET3       : 120;

// Map level -> intent

var intent   = _lvlToIntent[RUNTIME_CURRENT_LEVEL] || 'explore';

  ? Math.round((RUNTIME_TARGET2 + RUNTIME_TARGET3) / 2)  // midpoint as sensible custom default

function makeNowSVG(value, label) {
  // 10 segments, left=glucose (cyan), right=fat (green)
  // segments light up from left to right based on value (1-20, mapped to 10 segments)
  var segs = Math.round(value / 2); // how many segments lit (1-10)

function makeTodaySVG(target, meas, total) {
  var xMin=8, xMax=170, yBase=100, yTop=30, maxVal=10;
  function hx(h){return xMin+(h/24)*(xMax-xMin);}
  function vy(v){return yBase-(v/maxVal)*(yBase-yTop);}
  var allPts=[{x:hx(0),y:vy(meas[0].value)}];
  for(var i=0;i<meas.length;i++) allPts.push({x:hx(meas[i].hour),y:vy(meas[i].value)});
  var path='M '+xMin+','+yBase+' L '+xMin+','+allPts[0].y;
  for(var i=0;i<allPts.length-1;i++){
    var cx=(allPts[i].x+allPts[i+1].x)/2;
    path+=' Q '+allPts[i].x+','+allPts[i].y+' '+cx+','+((allPts[i].y+allPts[i+1].y)/2);
  }
  var last=allPts[allPts.length-1];
  path+=' Q '+last.x+','+last.y+' '+last.x+','+last.y+' L '+last.x+','+yBase+' Z';
  var svg='<svg viewBox="0 0 184 184" xmlns="http://www.w3.org/2000/svg">' +
    '<rect x="66" y="5" width="52" height="16" rx="8" fill="#f5c842"/>' +
    '<text x="92" y="17" font-size="11" font-weight="700" fill="#1a1a2e" text-anchor="middle">TODAY</text>' +
    '<rect x="158" y="10" width="18" height="10" rx="2" stroke="#0ff" stroke-width="1" fill="none"/>' +
    '<rect x="176" y="12" width="2" height="6" fill="#0ff"/>' +
    '<rect x="160" y="12" width="14" height="6" fill="#0f0"/>' +
    '<path d="'+path+'" fill="#f5c842"/>';
  for(var i=1;i<allPts.length;i++){
    var dc=meas[i-1].value>=5?'#4CAF50':'#00ffff';
    svg+='<circle cx="'+allPts[i].x+'" cy="'+allPts[i].y+'" r="3" fill="'+dc+'"/>';
    svg+='<text x="'+allPts[i].x+'" y="'+(allPts[i].y-8)+'" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">'+meas[i-1].value+'</text>';
  }
  svg+='<line x1="'+last.x+'" y1="'+last.y+'" x2="'+xMax+'" y2="'+last.y+'" stroke="#666" stroke-width="1" stroke-dasharray="4,4"/>';
  svg+='<line x1="'+xMin+'" y1="'+yBase+'" x2="'+xMax+'" y2="'+yBase+'" stroke="#fff" stroke-width="1"/>' +
    '<text x="'+xMin+'" y="115" font-size="12" fill="#fff" text-anchor="start">0a</text>' +
    '<text x="92" y="115" font-size="12" fill="#fff" text-anchor="middle">12p</text>' +
    '<text x="'+xMax+'" y="115" font-size="12" fill="#fff" text-anchor="end">12a</text>';
  svg+='<text x="68" y="160" font-size="40" font-weight="700" fill="#ff9800" text-anchor="middle">'+total+'</text>';
  if(target>0){
    svg+='<text x="101" y="155" font-size="40" font-weight="700" fill="#fff" text-anchor="middle">/</text>' +
      '<path d="M128,123 C123,119 119,121 119,126 C119,131 128,137 128,137 C128,137 137,131 137,126 C137,121 133,119 128,123 Z" fill="none" stroke="#ff4444" stroke-width="2"/>' +
      '<text x="111" y="160" font-size="20" font-weight="700" fill="#666" text-anchor="start">'+target+'</text>';
  }
  svg+='</svg>';
  return svg;
}

// -- Slide timer --
function startSlideTimer(slides) {
  stopSlideTimer();
  slideTimer = setInterval(function() {
    slideIndex = (slideIndex + 1) % slides.length;
    updateSlide(slides);
  }, 3500);
}

function stopSlideTimer() {
  if (slideTimer) { clearInterval(slideTimer); slideTimer = null; }
}

function updateSlide(slides) {
  var track = document.getElementById('deviceTrack');
  var caption = document.getElementById('slideCaption');
  var dotsEl = document.getElementById('slideDots');
  if (!track || !caption) return;

  // Slide the track left to reveal the next screen
  track.style.transform = 'translateX(-' + (slideIndex * 280) + 'px)';

  // Fade caption
  caption.classList.add('fading');
  setTimeout(function() {
    caption.innerHTML = slides[slideIndex].caption;
    caption.classList.remove('fading');
  }, 250);

  // Update slide dots
  var dotEls = dotsEl ? dotsEl.querySelectorAll('.slide-dot') : [];
  dotEls.forEach(function(d, i) {
    d.classList.toggle('active', i === slideIndex);
  });
}

// -- Arc canvas animation (screen 2) --
var arcAnimTimer = null;

function stopArcAnimation() {
  if (arcAnimTimer) { clearInterval(arcAnimTimer); arcAnimTimer = null; }
}

function startArcAnimation() {
  stopArcAnimation();
  var canvas = document.getElementById('arcCanvas');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var W = 320, H = 140;
  var S = W / 184; // scale from SVG coords

  // Arc center in SVG coords: cx=92, cy=93, r=60 (from getArcSVG baseline)
  var cx = 92, cy = 93, r = 60;
  var pts = [
    [32.0,90.0],[34.9,71.5],[43.5,54.7],[56.7,41.5],[73.5,32.9],
    [92.0,30.0],[110.5,32.3],[127.3,41.5],[140.5,54.7],[149.1,71.5],[152.0,87.9]
  ];
  var angles = pts.map(function(p){ return Math.atan2(p[1]-cy, p[0]-cx); });
  var activeColors = ['#00ffff','#00ffff','#00ffff','#00ddbb','#4CAF50','#4CAF50','#4CAF50','#4CAF50','#4CAF50','#4CAF50'];
  var dimColors    = ['#003333','#003333','#003333','#003333','#003300','#003300','#003300','#003300','#003300','#003300'];
  var GAP = 0.02;

  // Oscillate value between 1 and 10 smoothly
  var t = 0;

  function drawArc(val) {
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);

    var segs = Math.round(val);
    var numColor = segs <= 4 ? '#00ffff' : '#4CAF50';
    var dispVal = segs * 2; // display on 1-20 scale

    // Segments
    for (var i = 0; i < 10; i++) {
      ctx.beginPath();
      ctx.arc(cx*S, cy*S, r*S, angles[i]+GAP, angles[i+1]-GAP, false);
      ctx.strokeStyle = i < segs ? activeColors[i] : dimColors[i];
      ctx.lineWidth = 18*S;
      ctx.lineCap = 'butt';
      ctx.stroke();
    }

    // Baseline arc
    var bStart = Math.atan2(93-cy, 38-cx);
    var bEnd   = Math.atan2(93-cy, 146-cx);
    ctx.beginPath();
    ctx.arc(cx*S, cy*S, 54*S, bStart, bEnd, false);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2*S;
    ctx.lineCap = 'butt';
    ctx.stroke();

    // Tick marks
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2*S;
    ctx.beginPath(); ctx.moveTo(92*S,35*S); ctx.lineTo(92*S,40*S); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(38*S,93*S); ctx.lineTo(43*S,93*S); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(146*S,93*S); ctx.lineTo(141*S,93*S); ctx.stroke();

    // GLUCOSE / FAT labels
    ctx.font = 'bold ' + Math.round(11*S) + 'px -apple-system,sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#00ffff';
    ctx.fillText('GLUCOSE', 32*S, 110*S);
    ctx.fillStyle = '#4CAF50';
    ctx.fillText('FAT', 152*S, 110*S);

    // NOW number &#8212; centered in arc
    ctx.fillStyle = numColor;
    ctx.font = 'bold ' + Math.round(38*S) + 'px -apple-system,sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(String(dispVal), 92*S, 88*S);
  }

  arcAnimTimer = setInterval(function() {
    t += 0.04;
    // Oscillate between 1 and 9 segments using sine
    var val = 1 + 8 * (0.5 + 0.5 * Math.sin(t));
    drawArc(val);
  }, 50);

  drawArc(1);
}

function next() { stopAllAnimations(); if (state < TOTAL_SCREENS-1) { state++; render(); } }
function back() { stopAllAnimations(); if (state > 0) { state--; render(); } }
function goTo(s) { stopAllAnimations(); state = s; render(); }

function adjustCustom(delta) {
  customVal = Math.max(10, customVal + delta);
  var el = document.getElementById('adjVal');
  if (el) el.textContent = customVal;
  intentData.custom.badge = String(customVal);
  intentData.custom.tlMain = 'Daily target: ' + customVal;

  // Update day description line live
  var descEl = document.getElementById('dayDescLine');
  if (descEl) descEl.innerHTML = 'You\'re setting your own target.';

  // Update confirm badge
  var badgeEl = document.getElementById('confirmBadgeLive');
  if (badgeEl) badgeEl.textContent = customVal;
}

// -- Global animation cleanup --
var activeTimers = [];

function trackTimer(id) { activeTimers.push(id); return id; }

function stopAllAnimations() {
  var timers = activeTimers.slice();
  activeTimers = [];
  timers.forEach(function(id) { clearTimeout(id); clearInterval(id); });
  stopArcAnimation();
}

// -- NOW screen canvas animation --
var nowAnimTimer = null;

function stopNowAnimation() {
  if (nowAnimTimer) { clearInterval(nowAnimTimer); nowAnimTimer = null; }
}

function startNowAnimation(finalValue, label, todayCaption, todayData) {
  stopNowAnimation();
  var canvas = document.getElementById('nowCanvas');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var W = 280, H = 280;
  var S = W / 184;

  // Arc center: cx=92, cy=108, r=60
  // Segment boundary angles derived from SVG M coords via atan2(y-cy, x-cx)
  // SVG segment start points (from getZoneSVG):
  // [32,105], [34.9,86.5], [43.5,69.7], [56.7,56.5], [73.5,47.9],
  // [92,45], [110.5,47.9], [127.3,56.5], [140.5,69.7], [149.1,86.5], [152,102.9]
  var cx = 92, cy = 108, r = 60;
  var pts = [
    [32.0,105.0],[34.9,86.5],[43.5,69.7],[56.7,56.5],[73.5,47.9],
    [92.0,45.0],[110.5,47.9],[127.3,56.5],[140.5,69.7],[149.1,86.5],[152.0,102.9]
  ];
  var angles = pts.map(function(p){ return Math.atan2(p[1]-cy, p[0]-cx); });

  var activeColors = ['#00ffff','#00ffff','#00ffff','#00ddbb','#4CAF50','#4CAF50','#4CAF50','#4CAF50','#4CAF50','#4CAF50'];
  var dimColors    = ['#003333','#003333','#003333','#003333','#003300','#003300','#003300','#003300','#003300','#003300'];

  // Gap between segments in radians (larger = more visible gap)
  var GAP = 0.02;

  var current = 0;
  var settled = false;

  function drawFrame(displayVal) {
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);

    // segments lit = displayVal directly (1 segment per zone value)
    var segs = displayVal;
    var numColor = segs <= 4 ? '#00ffff' : '#4CAF50';

    // Draw 10 segments with gap trimmed from each end
    for (var i = 0; i < 10; i++) {
      var a0 = angles[i]   + GAP;
      var a1 = angles[i+1] - GAP;
      ctx.beginPath();
      ctx.arc(cx*S, cy*S, r*S, a0, a1, false);
      ctx.strokeStyle = i < segs ? activeColors[i] : dimColors[i];
      ctx.lineWidth = 18*S;
      ctx.lineCap = 'butt';
      ctx.stroke();
    }

    // Baseline arc r=54, from (38,108) to (146,108)
    var bStart = Math.atan2(108-cy, 38-cx);
    var bEnd   = Math.atan2(108-cy, 146-cx);
    ctx.beginPath();
    ctx.arc(cx*S, cy*S, 54*S, bStart, bEnd, false);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2*S;
    ctx.lineCap = 'butt';
    ctx.stroke();

    // Tick marks
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2*S;
    ctx.beginPath(); ctx.moveTo(92*S,50*S); ctx.lineTo(92*S,55*S); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(38*S,108*S); ctx.lineTo(43*S,108*S); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(146*S,108*S); ctx.lineTo(141*S,108*S); ctx.stroke();

    // NOW badge
    ctx.fillStyle = '#00ffff';
    ctx.beginPath();
    ctx.roundRect(55*S, 7*S, 74*S, 16*S, 8*S);
    ctx.fill();
    ctx.fillStyle = '#1a1a2e';
    ctx.font = 'bold ' + Math.round(11*S) + 'px -apple-system,sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'alphabetic';
    ctx.fillText('NOW', 92*S, 18*S);

    // Battery
    ctx.strokeStyle = '#0ff'; ctx.lineWidth = 1*S;
    ctx.strokeRect(158*S,15*S,18*S,10*S);
    ctx.fillStyle = '#0ff'; ctx.fillRect(176*S,17*S,2*S,6*S);
    ctx.fillStyle = '#0f0'; ctx.fillRect(160*S,17*S,14*S,6*S);

    // Number &#8212; always visible
    ctx.fillStyle = numColor;
    ctx.font = 'bold ' + Math.round(60*S) + 'px -apple-system,sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(String(Math.max(displayVal, 1)), 92*S, 125*S);

    // Label &#8212; only once settled
    if (settled) {
      ctx.fillStyle = numColor;
      ctx.font = 'bold ' + Math.round(22*S) + 'px -apple-system,sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(label, 92*S, 162*S);
    }
  }

  drawFrame(1);

  var nowCaption = '';

  var isFirstRun = true;

  function runSequence() {
    // Reset to NOW
    current = 1;
    settled = false;
    var track = document.getElementById('previewTrack');
    var caption = document.getElementById('previewCaption');
    var dot0 = document.getElementById('previewDot0');
    var dot1 = document.getElementById('previewDot1');

    // Clear todayCanvas immediately to avoid stale content
    var todayC = document.getElementById('todayCanvas');
    if (todayC) {
      var tctx = todayC.getContext('2d');
      tctx.clearRect(0, 0, todayC.width, todayC.height);
      tctx.fillStyle = '#000';
      tctx.fillRect(0, 0, todayC.width, todayC.height);
    }

    if (track) track.style.transition = 'none';
    if (track) track.style.transform = 'translateX(0)';
    // Re-enable transition after reset
    trackTimer(setTimeout(function() {
      if (track) track.style.transition = 'transform 1.0s cubic-bezier(0.25,0.46,0.45,0.94)';
    }, 50));

    if (dot0) dot0.classList.add('active');
    if (dot1) dot1.classList.remove('active');

    // Restore NOW caption instantly on loop reset
    if (!isFirstRun && caption) {
      caption.classList.remove('fading');
      caption.innerHTML = nowCaption;
    }
    isFirstRun = false;

    drawFrame(1);

    // Count up from 1
    var countId = trackTimer(setInterval(function() {
      if (!document.getElementById('nowCanvas')) { clearInterval(countId); return; }
      current++;
      drawFrame(current);
      if (current >= finalValue) {
        clearInterval(countId);
        trackTimer(setTimeout(function() {
          if (!document.getElementById('nowCanvas')) return;
          settled = true;
          drawFrame(finalValue);

          // Slide to TODAY
          if (todayCaption) {
            trackTimer(setTimeout(function() {
              var track = document.getElementById('previewTrack');
              var caption = document.getElementById('previewCaption');
              var dot0 = document.getElementById('previewDot0');
              var dot1 = document.getElementById('previewDot1');
              if (track) track.style.transform = 'translateX(-280px)';
              if (todayData) startTodayAnimation(todayData, finalValue);
              // Wait for slide to finish before fading caption
              trackTimer(setTimeout(function() {
                if (caption) {
                  caption.classList.add('fading');
                  trackTimer(setTimeout(function() {
                    if (caption) {
                      caption.innerHTML = todayCaption;
                      caption.classList.remove('fading');
                    }
                  }, 350));
                }
              }, 600));
              if (dot0) dot0.classList.remove('active');
              if (dot1) dot1.classList.add('active');

              // Hold on TODAY then loop
              trackTimer(setTimeout(function() {
                if (!document.getElementById('nowCanvas')) return;
                runSequence();
              }, 6000));
            }, 1200));
          }
        }, 400));
      }
    }, 400));
  }

  // Capture the initial NOW caption before first run &#8212; caption is already visible
  trackTimer(setTimeout(function() {
    var caption = document.getElementById('previewCaption');
    if (caption) nowCaption = caption.innerHTML;
    runSequence();
  }, 10));

  // Draw first frame immediately so caption + number 1 appear right away
  trackTimer(setTimeout(function() { drawFrame(1); }, 5));
}

function startTodayAnimation(todayData, newValue) {
  var canvas = document.getElementById('todayCanvas');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var W = 280, H = 280;
  var S = W / 184;

  var xMin=8, xMax=170, yBase=100, yTop=30, maxVal=10;
  function hx(h){ return (xMin + (h/24)*(xMax-xMin)) * S; }
  function vy(v){ return (yBase - (v/maxVal)*(yBase-yTop)) * S; }

  var target = todayData.target;
  var baseMeas = todayData.meas;
  var baseAUC = todayData.baseAUC;

  var newHour = 18;
  var newMeas = baseMeas.concat([{hour: newHour, value: newValue}]);
  var lastBase = baseMeas[baseMeas.length-1];
  var addedAUC = (lastBase.value + newValue) / 2 * (newHour - lastBase.hour);
  var newTotal = Math.round(baseAUC + addedAUC);

  function buildPts(meas) {
    var pts = [{x: hx(0), y: vy(meas[0].value)}];
    for (var i=0; i<meas.length; i++) pts.push({x: hx(meas[i].hour), y: vy(meas[i].value)});
    return pts;
  }

  function drawBase(meas, auc, highlightLast) {
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);

    var pts = buildPts(meas);
    var last = pts[pts.length-1];

    if (highlightLast && pts.length > 2) {
      var sl = pts[pts.length-2];
      // Base area &#8212; dark orange
      ctx.beginPath();
      ctx.moveTo(hx(0), yBase*S); ctx.lineTo(pts[0].x, pts[0].y);
      for (var i=0; i<pts.length-2; i++) {
        var cx2=(pts[i].x+pts[i+1].x)/2;
        ctx.quadraticCurveTo(pts[i].x,pts[i].y,cx2,(pts[i].y+pts[i+1].y)/2);
      }
      ctx.lineTo(sl.x,sl.y); ctx.lineTo(sl.x,yBase*S); ctx.closePath();
      ctx.fillStyle = '#cc6600'; ctx.fill();
      // Delta area &#8212; bright orange
      ctx.beginPath();
      ctx.moveTo(sl.x,yBase*S); ctx.lineTo(sl.x,sl.y);
      ctx.quadraticCurveTo(sl.x,sl.y,(sl.x+last.x)/2,(sl.y+last.y)/2);
      ctx.quadraticCurveTo(last.x,last.y,last.x,last.y);
      ctx.lineTo(last.x,yBase*S); ctx.closePath();
      ctx.fillStyle = '#ff9800'; ctx.fill();
    } else {
      ctx.beginPath();
      ctx.moveTo(hx(0),yBase*S); ctx.lineTo(pts[0].x,pts[0].y);
      for (var i=0; i<pts.length-1; i++) {
        var cx2=(pts[i].x+pts[i+1].x)/2;
        ctx.quadraticCurveTo(pts[i].x,pts[i].y,cx2,(pts[i].y+pts[i+1].y)/2);
      }
      ctx.quadraticCurveTo(last.x,last.y,last.x,last.y);
      ctx.lineTo(last.x,yBase*S); ctx.closePath();
      ctx.fillStyle = '#cc6600'; ctx.fill();
    }

    // Target line
    if (target > 0) {
      var targetY = vy(target/24);
      ctx.setLineDash([4*S,3*S]); ctx.strokeStyle='#444'; ctx.lineWidth=1*S;
      ctx.beginPath(); ctx.moveTo(xMin*S,targetY); ctx.lineTo(xMax*S,targetY); ctx.stroke();
      ctx.setLineDash([]);
    }

    // Baseline
    ctx.strokeStyle='#fff'; ctx.lineWidth=1*S;
    ctx.beginPath(); ctx.moveTo(xMin*S,yBase*S); ctx.lineTo(xMax*S,yBase*S); ctx.stroke();

    // Time labels
    ctx.fillStyle='#fff'; ctx.font=Math.round(12*S)+'px -apple-system,sans-serif';
    ctx.textAlign='left';   ctx.fillText('0a',xMin*S,(yBase+12)*S);
    ctx.textAlign='center'; ctx.fillText('12p',92*S,(yBase+12)*S);
    ctx.textAlign='right';  ctx.fillText('12a',xMax*S,(yBase+12)*S);

    // Dots
    for (var i=1; i<pts.length; i++) {
      var v=meas[i-1].value;
      var dc=v>=5?'#4CAF50':'#00ffff';
      var isNew=highlightLast&&i===pts.length-1;
      ctx.fillStyle=dc; ctx.beginPath();
      ctx.arc(pts[i].x,pts[i].y,(isNew?4:3)*S,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#fff';
      ctx.font='bold '+Math.round(14*S)+'px -apple-system,sans-serif';
      ctx.textAlign='center';
      ctx.fillText(String(v),pts[i].x,pts[i].y-8*S);
    }

    // TODAY badge
    ctx.fillStyle='#f5c842'; ctx.beginPath();
    ctx.roundRect(66*S,5*S,52*S,16*S,8*S); ctx.fill();
    ctx.fillStyle='#1a1a2e';
    ctx.font='bold '+Math.round(11*S)+'px -apple-system,sans-serif';
    ctx.textAlign='center'; ctx.fillText('TODAY',92*S,17*S);

    // Battery
    ctx.strokeStyle='#0ff'; ctx.lineWidth=1*S; ctx.strokeRect(158*S,10*S,18*S,10*S);
    ctx.fillStyle='#0ff'; ctx.fillRect(176*S,12*S,2*S,6*S);
    ctx.fillStyle='#0f0'; ctx.fillRect(160*S,12*S,14*S,6*S);

    // AUC number
    var aucColor=(target>0&&auc>=target)?'#4CAF50':'#ff9800';
    ctx.fillStyle=aucColor;
    ctx.font='bold '+Math.round(40*S)+'px -apple-system,sans-serif';
    ctx.textAlign='center'; ctx.fillText(String(Math.round(auc)),68*S,160*S);

    if (target>0) {
      ctx.fillStyle='#fff'; ctx.font='bold '+Math.round(40*S)+'px -apple-system,sans-serif';
      ctx.fillText('/',101*S,155*S);
      ctx.fillStyle='#555'; ctx.font='bold '+Math.round(20*S)+'px -apple-system,sans-serif';
      ctx.textAlign='left'; ctx.fillText(String(target),111*S,160*S);
      ctx.fillStyle='#ff4444'; ctx.font=Math.round(16*S)+'px -apple-system,sans-serif';
      ctx.textAlign='center'; ctx.fillText('\u2665',128*S,138*S);
    }
  }

  // Draw base state immediately
  drawBase(baseMeas, baseAUC, false);

  // After 600ms add new dot and count up AUC
  trackTimer(setTimeout(function() {
    if (!document.getElementById('todayCanvas')) return;
    var aucVal = baseAUC;
    var aucStep = (newTotal - baseAUC) / 20;
    var aucId = trackTimer(setInterval(function() {
      if (!document.getElementById('todayCanvas')) { clearInterval(aucId); return; }
      aucVal = Math.min(aucVal + aucStep, newTotal);
      drawBase(newMeas, aucVal, true);
      if (aucVal >= newTotal) clearInterval(aucId);
    }, 50));
  }, 600));
}

function doneOnboarding() {
  // Map intent to firmware level number
  var lvlMap = {explore:1, fat:2, lose:3, custom:4};
  var level = lvlMap[intent] || 1;
  var target = (intent === 'fat')    ? RUNTIME_TARGET2 :
               (intent === 'lose')   ? RUNTIME_TARGET3 :
               (intent === 'custom') ? customVal : 0;

  var form = new FormData();
  form.append('level',        String(level));
  form.append('customTarget', String(target));
  form.append('epoch',        String(Math.floor(Date.now() / 1000)));
  form.append('tzoffset',     String(new Date().getTimezoneOffset()));

  fetch('/save', { method: 'POST', body: form })
    .then(function() { return fetch('/exit'); })
    .then(function() {
      document.body.innerHTML = '<div style="text-align:center;padding:40px;font-size:18px;color:#fff">All set &#8212; enjoy FOX2!</div>';
    })
    .catch(function() {
      // /exit may not respond if device reboots immediately — that is fine
      document.body.innerHTML = '<div style="text-align:center;padding:40px;font-size:18px;color:#fff">All set &#8212; enjoy FOX2!</div>';
    });
}

render();
</script>
