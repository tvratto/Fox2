//   - Samples only up to last measurement (not full 1440 minutes)
//   - Rounds PPM to integers before zone classification
//   - No inter-day interpolation for zone calculations
//   - Processes ALL days with data (not just most recent)
// Thresholds: <=2 = glucose, <=4 = mixed, >=5 = fat (after rounding)
function calcZoneTimes() {
  var glucose = 0, mixed = 0, fat = 0;

  if (totalDays === 0) return { glucose: 0, mixed: 0, fat: 0 };
  
  // Process all days that have data
  for (var d = 0; d < totalDays; d++) {
    var pts  = days[d].epochs;
    var vals = days[d].vals;
    
    if (pts.length === 0) continue; // Skip days with no data
    
    var dayStart = windowStart + d * 86400; // midnight of this day (seconds)
    
    // ── Build arrays for ConstrainedSpline (minutes, ppm) ─────────
    var xVals = [];
    var yVals = [];
    
    // Add midnight anchor if needed (device adds this during graph prep)
    var firstMinute = (pts[0] - dayStart) / 60;
    if (firstMinute > 0) {
      // Add a midnight point - use first measurement value for simplicity
      // (device has more complex logic with previous day, but this matches the visual better)
      xVals.push(0);
      yVals.push(vals[0]);
    }
    
    // Add all measurements
    for (var i = 0; i < pts.length; i++) {
      var minute = (pts[i] - dayStart) / 60;
      xVals.push(minute);
      yVals.push(vals[i]);
    }
    
    if (xVals.length < 2) {
      // Need at least 2 points for spline - skip this day
      continue;
    }
    
    // Clear derivative cache for this day
    derivCache = {};
    
    // ── Sample the curve every minute up to last measurement ──────
    var lastMinute = xVals[xVals.length - 1];
    
    for (var minute = 0; minute < lastMinute; minute++) {
      // Use ConstrainedSpline (exact device algorithm)
      var ppm = constrainedSpline(xVals, yVals, xVals.length, minute);
      
      if (isNaN(ppm)) continue;
      
      ppm = Math.max(0, ppm);
      
      // Round ppm to nearest integer (matches device)
      var ppmInt = Math.round(ppm);
      
      // Classify this minute into a zone (matches device thresholds)
      if (ppmInt <= 2) {
        glucose++;
      } else if (ppmInt <= 4) {
        mixed++;
      } else {
        fat++;
      }
    }
  }

  return { glucose: glucose, mixed: mixed, fat: fat };
}

// Calculate zone times for a single day
function calcDayZoneTimes(dayIdx) {
  var glucose = 0, mixed = 0, fat = 0;
  
  var pts  = days[dayIdx].epochs;
  var vals = days[dayIdx].vals;
  
  if (pts.length === 0) return { glucose: 0, mixed: 0, fat: 0 };
  
  var dayStart = windowStart + dayIdx * 86400;
  
  var xVals = [];
  var yVals = [];
  
  var firstMinute = (pts[0] - dayStart) / 60;
  if (firstMinute > 0) {
    xVals.push(0);
    yVals.push(vals[0]);
  }
  
  for (var i = 0; i < pts.length; i++) {
    var minute = (pts[i] - dayStart) / 60;
    xVals.push(minute);
    yVals.push(vals[i]);
  }
  
  if (xVals.length < 2) return { glucose: 0, mixed: 0, fat: 0 };
  
  derivCache = {};
  var lastMinute = xVals[xVals.length - 1];
  
  for (var minute = 0; minute < lastMinute; minute++) {
    var ppm = constrainedSpline(xVals, yVals, xVals.length, minute);
    if (isNaN(ppm)) continue;
    ppm = Math.max(0, ppm);
    var ppmInt = Math.round(ppm);
    
    if (ppmInt <= 2) {
      glucose++;
    } else if (ppmInt <= 4) {
      mixed++;
    } else {
      fat++;
    }
  }
  
  return { glucose: glucose, mixed: mixed, fat: fat };
}

// Calculate and store zone times for all days
function calcAllDayZoneTimes() {
  for (var d = 0; d < totalDays; d++) {
    if (days[d].vals.length > 0) {
      days[d].zoneTimes = calcDayZoneTimes(d);
    }
  }
}

function fmtHM(minutes) {
  var h = Math.floor(minutes / 60);
  var m = Math.round(minutes % 60);
  if (h === 0) return m + 'm';
  if (m === 0) return h + 'h';
  return h + 'h ' + m + 'm';
}

function renderCard() {
  graphDotHits = []; dotHits = graphDotHits;
  graphCanvas = buildGraphCard();
  var dest = document.getElementById('card-graph');
  dest.width = graphCanvas.width; dest.height = graphCanvas.height;
  dest.getContext('2d').drawImage(graphCanvas, 0, 0);

  fuelDotHits = []; dotHits = fuelDotHits;
  fuelCanvas = buildGraphCard('zones');
  var destF = document.getElementById('card-fuel');
  destF.width = fuelCanvas.width; destF.height = fuelCanvas.height;
  destF.getContext('2d').drawImage(fuelCanvas, 0, 0);

  dotHits = graphDotHits; // restore default
}

window.addEventListener('load', function() {
  if (!dParam || totalDays === 0) return;

  // Phase 1: zone time calc (heavy) — yields to browser between phases
  setTimeout(function() {
    calcAllDayZoneTimes();

  // Phase 2: render — separate turn so spinner animation stays alive
  setTimeout(function() {
    var loading = document.getElementById('loading');
    try {
      renderCard();

      streakCanvas = buildStreakCard();
      var destS = document.getElementById('card-streaks');
      destS.width = streakCanvas.width; destS.height = streakCanvas.height;
      destS.getContext('2d').drawImage(streakCanvas, 0, 0);

      insightsCanvas = buildInsightsCard();
      var destI = document.getElementById('card-insights');
      destI.width = insightsCanvas.width; destI.height = insightsCanvas.height;
      destI.getContext('2d').drawImage(insightsCanvas, 0, 0);

      // Click handler for pattern toggle button
      destI.addEventListener('click', function(e) {
        var rect = destI.getBoundingClientRect();
        var scale = (destI.width / 2) / rect.width; // insightsCanvas uses 2x scale
        var clickX = (e.clientX - rect.left) * scale;
        var clickY = (e.clientY - rect.top) * scale;
        
        // Check if click is on pattern toggle button
        var btn = window.patternToggleHitbox;
        if (btn && clickX >= btn.x && clickX <= btn.x + btn.w &&
            clickY >= btn.y && clickY <= btn.y + btn.h) {
          window.showPatternDetail = !window.showPatternDetail;
          // Rebuild and redraw insights card
          insightsCanvas = buildInsightsCard();
          destI.width = insightsCanvas.width; destI.height = insightsCanvas.height;
          destI.getContext('2d').drawImage(insightsCanvas, 0, 0);
        }
      });

    } catch(e) {
      console.error('FOX2 render error:', e && e.message, e && e.stack);
    }

    // Always hide spinner regardless of render outcome
    if (loading) loading.style.display = 'none';

  }, 50);
  }, 50); // end phase 1

  // ── Tap/click: dot → popup, empty space → cycle labels ───────
  var dest     = document.getElementById('card-graph');
  var popup    = document.getElementById('dot-popup');
  var popupVal = document.getElementById('dot-popup-val');
  var popupTime= document.getElementById('dot-popup-time');
  var touchStartTime = 0, touchStartX = 0, touchStartY = 0, touchCount = 0;
  var lastTouch = 0;
  var HIT_RADIUS = 30;

  var DAYS_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var MONTHS     = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  function fmtPopupTime(epoch) {
    var d = new Date(epoch * 1000);
    var h = d.getUTCHours(), m = d.getUTCMinutes();
    var ampm = h >= 12 ? 'pm' : 'am';
    h = h % 12 || 12;
    var ms = m < 10 ? '0'+m : String(m);
    return DAYS_SHORT[d.getUTCDay()] + ' ' + MONTHS[d.getUTCMonth()] + ' ' + d.getUTCDate()
         + '  ' + h + ':' + ms + ampm;
  }

  function canvasCoords(clientX, clientY) {
    var rect = dest.getBoundingClientRect();
    var scale = (dest.width / graphScale) / rect.width;
    return { x: (clientX - rect.left) * scale,
             y: (clientY - rect.top)  * scale };
  }

  function findNearestDot(cx, cy) {
    var best = null, bestD = HIT_RADIUS;
    for (var i = 0; i < dotHits.length; i++) {
      var dx = dotHits[i].cx - cx, dy = dotHits[i].cy - cy;
      var d = Math.sqrt(dx*dx + dy*dy);
      if (d < bestD) { bestD = d; best = dotHits[i]; }
    }
    return best;
  }

  function positionPopup(dot) {
    var rect = dest.getBoundingClientRect();
    var wrap = dest.parentElement.getBoundingClientRect();
    var logicalW = dest.width / graphScale;
    var cssScale  = rect.width / logicalW;
    var dotCssX = dot.cx * cssScale + (rect.left - wrap.left);
    var dotCssY = dot.cy * cssScale + (rect.top  - wrap.top);
    var pw = popup.offsetWidth || 90, ph = popup.offsetHeight || 44;
    var GAP = 10;
    var px = Math.max(4, Math.min(dotCssX - pw/2, wrap.width - pw - 4));
    var py = Math.max(4, dotCssY - ph - GAP);
    popup.style.left = px + 'px';
    popup.style.top  = py + 'px';
  }

  function showPopup(dot) {
    popupVal.textContent  = showPPM ? dot.val.toFixed(1) + ' ppm' : 'Level ' + Math.round(dot.val);
    popupTime.textContent = fmtPopupTime(dot.epoch);
    popup.style.cssText = 'display:block;position:absolute;background:rgba(20,20,35,0.95);border:1px solid rgba(255,255,255,0.2);border-radius:8px;padding:6px 10px;pointer-events:none;z-index:10;white-space:nowrap;left:0;top:0;';
    void popup.offsetWidth;
    positionPopup(dot);
  }

  function hidePopup() {
    popup.style.display = 'none';
    if (selectedDot) { selectedDot = null; renderCard(); }
  }

  function handleTap(clientX, clientY) {
    var c = canvasCoords(clientX, clientY);

    // Check summary tab hits first
    for (var ti = 0; ti < tabHitBoxes.length; ti++) {
      var tb = tabHitBoxes[ti];
      if (c.x >= tb.x - 6 && c.x <= tb.x + tb.w + 6 &&
          c.y >= tb.y - 6 && c.y <= tb.y + tb.h + 6) {
        setSummaryView(tb.view);
        return;
      }
    }

    var dot = findNearestDot(c.x, c.y);
    if (dot) {
      selectedDot = dot;
      renderCard();
      requestAnimationFrame(function() { showPopup(dot); });
    } else {
      hidePopup();
    }
  }

  dest.addEventListener('touchstart', function(e) {
    touchCount = e.touches.length;
    if (touchCount === 1) {
      touchStartTime = Date.now();
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }
  }, { passive: true });

  dest.addEventListener('touchend', function(e) {
    if (touchCount > 1) { touchCount = 0; hidePopup(); return; }
    var dt = Date.now() - touchStartTime;
    var dx = Math.abs(e.changedTouches[0].clientX - touchStartX);
    var dy = Math.abs(e.changedTouches[0].clientY - touchStartY);
    if (dt < 250 && dx < 10 && dy < 10) {
      lastTouch = Date.now();
      handleTap(touchStartX, touchStartY);
    }
    touchCount = 0;
  }, { passive: true });

  dest.addEventListener('click', function(e) {
    if (Date.now() - lastTouch < 500) return;
    handleTap(e.clientX, e.clientY);
  });
});

function drawPopupOnCanvas(canvas, dot) {
  var ctx = canvas.getContext('2d');
  var S = graphScale;
  var DAYS_S = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var MONS   = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var d = new Date(dot.epoch * 1000);
  var h = d.getHours(), m = d.getMinutes();
  var ampm = h >= 12 ? 'pm' : 'am'; h = h % 12 || 12;
  var ms = m < 10 ? '0'+m : String(m);
  var line1 = showPPM ? dot.val.toFixed(1) + ' ppm' : 'Level ' + Math.round(dot.val);
  var line2  = DAYS_S[d.getDay()] + ' ' + MONS[d.getMonth()] + ' ' + d.getDate() + '  ' + h + ':' + ms + ampm;

  var fs1 = 15 * S, fs2 = 11 * S;
  ctx.font = 'bold ' + fs1 + 'px -apple-system,sans-serif';
  var w1 = ctx.measureText(line1).width;
  ctx.font = fs2 + 'px -apple-system,sans-serif';
  var w2 = ctx.measureText(line2).width;
  var padX = 10 * S, padY = 6 * S, gap = 3 * S;
  var pw = Math.max(w1, w2) + padX * 2;
  var ph = fs1 + gap + fs2 + padY * 2;
  var GAP = 10 * S;

  var dotX = dot.cx * S, dotY = dot.cy * S;
  var px = Math.max(4, Math.min(dotX - pw/2, canvas.width - pw - 4));
  var py = Math.max(4, dotY - ph - GAP);

  ctx.save();
  ctx.fillStyle = 'rgba(20,20,35,0.95)';
  var r = 8 * S;
  ctx.beginPath();
  ctx.moveTo(px + r, py);
  ctx.lineTo(px + pw - r, py);
  ctx.quadraticCurveTo(px + pw, py, px + pw, py + r);
  ctx.lineTo(px + pw, py + ph - r);
  ctx.quadraticCurveTo(px + pw, py + ph, px + pw - r, py + ph);
  ctx.lineTo(px + r, py + ph);
  ctx.quadraticCurveTo(px, py + ph, px, py + ph - r);
  ctx.lineTo(px, py + r);
  ctx.quadraticCurveTo(px, py, px + r, py);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = S * 0.75;
  ctx.stroke();

  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + fs1 + 'px -apple-system,sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText(line1, px + pw/2, py + padY);
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = fs2 + 'px -apple-system,sans-serif';
  ctx.fillText(line2, px + pw/2, py + padY + fs1 + gap);
  ctx.restore();
}

function doShare(canvas) {
  canvas.toBlob(function(blob) {
    var file = new File([blob], 'fox2-results.png', { type: 'image/png' });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      navigator.share({ files: [file], title: 'FOX2 Results' })
        .catch(function() {});
    }
  }, 'image/png');
}

function shareGraph() {
  if (!graphCanvas) return;
  if (selectedDot) {
    var copy = document.createElement('canvas');
    copy.width = graphCanvas.width; copy.height = graphCanvas.height;
    copy.getContext('2d').drawImage(graphCanvas, 0, 0);
    drawPopupOnCanvas(copy, selectedDot);
    doShare(copy);
  } else {
    doShare(graphCanvas);
  }
}

function shareFuel() {
  if (!fuelCanvas) return;
  if (selectedDot) {
    var copy = document.createElement('canvas');
    copy.width = fuelCanvas.width; copy.height = fuelCanvas.height;
    copy.getContext('2d').drawImage(fuelCanvas, 0, 0);
    drawPopupOnCanvas(copy, selectedDot);
    doShare(copy);
  } else {
    doShare(fuelCanvas);
  }
}

function shareStreaks() {
  if (!streakCanvas) return;
  doShare(streakCanvas);
}

// ── Page navigation: tabs + share routing ──
var currentPage = 0;

function handleBottomShare() {
  var url = window.location.href;
  if (navigator.share) {
    navigator.share({ title: 'FOX2 Results', url: url }).catch(function() {});
  } else {
    navigator.clipboard && navigator.clipboard.writeText(url);
  }
}

(function() {
  var scroller = document.getElementById('scroller');
  var tabs = document.querySelectorAll('.nav-tab');

  function updatePage(idx) {
    if (idx === currentPage) return;
    currentPage = idx;
    for (var i = 0; i < tabs.length; i++) tabs[i].classList.toggle('active', i === idx);
    // Clear any open popups when switching pages
    var p1 = document.getElementById('dot-popup');
    var p2 = document.getElementById('dot-popup-fuel');
    if (p1) p1.style.display = 'none';
    if (p2) p2.style.display = 'none';
    if (selectedDot) { selectedDot = null; renderCard(); }
  }

  scroller.addEventListener('scroll', function() {
    var idx = Math.round(scroller.scrollLeft / scroller.clientWidth);
    updatePage(idx);
  }, { passive: true });

  for (var i = 0; i < tabs.length; i++) {
    tabs[i].addEventListener('click', (function(idx) {
      return function() {
        scroller.scrollTo({ left: idx * scroller.clientWidth, behavior: 'smooth' });
      };
    })(i));
  }
})();
