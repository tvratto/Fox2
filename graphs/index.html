<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="color-scheme" content="dark">
<title>FOX2 Results</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  background: #0a0a0a;
  font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  color: #fff;
}
.scroll-y {
  display: flex;
  flex-direction: column;
  width: 100vw;
  min-height: 100dvh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.scroll-y::-webkit-scrollbar { display: none; }
.page {
  width: 100vw;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 16px;
  padding-bottom: 26px;
}
.card-wrap { width: 100%; max-width: 420px; }
.card-wrap canvas {
  width: 100%; height: auto;
  border-radius: 14px; display: block;
}
.share-btn {
  margin-top: 2px;
  display: flex; align-items: center; gap: 7px;
  padding: 10px 24px;
  border-radius: 22px;
  border: none;
  background: #00d4ff;
  color: #1a1a2e;
  font: bold 14px -apple-system, sans-serif;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.share-btn:active { opacity: 0.75; }
#no-data {
  display: none;
  text-align: center;
  color: rgba(255,255,255,0.4);
  font-size: 14px;
  padding: 40px 20px;
  line-height: 1.6;
}
#loading {
  position: fixed; inset: 0;
  background: #000;
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
}
#loading-inner { display: flex; flex-direction: column; align-items: center; gap: 16px; }
#loading-spinner {
  width: 36px; height: 36px;
  border: 3px solid rgba(255,255,255,0.15);
  border-top-color: #f5c842;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
#loading-text { color: rgba(255,255,255,0.4); font-size: 13px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="scroll-y" id="scroller">
  <div class="page">
    <div class="card-wrap" style="position:relative;">
      <canvas id="card-graph" style="cursor:pointer;"></canvas>
      <div id="dot-popup" style="display:none;position:absolute;background:rgba(20,20,35,0.95);border:1px solid rgba(255,255,255,0.2);border-radius:8px;padding:6px 10px;pointer-events:none;z-index:10;white-space:nowrap;">
        <div id="dot-popup-val" style="font-size:15px;font-weight:700;color:#fff;text-align:center;"></div>
        <div id="dot-popup-time" style="font-size:11px;color:rgba(255,255,255,0.5);text-align:center;margin-top:2px;"></div>
      </div>
    </div>
    <button class="share-btn" id="btn-share" onclick="shareGraph()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M8 1v9M4 4l4-3 4 3M3 10v4h10v-4" stroke="#1a1a2e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Share
    </button>
  </div>
  <div class="page">
    <div class="card-wrap"><canvas id="card-streaks"></canvas></div>
    <button class="share-btn" onclick="shareStreaks()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M8 1v9M4 4l4-3 4 3M3 10v4h10v-4" stroke="#1a1a2e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Share
    </button>
  </div>

</div>

<div id="loading">
  <div id="loading-inner">
    <div id="loading-spinner"></div>
    <div id="loading-text">Loading results…</div>
  </div>
</div>

<div id="no-data">
  <p>No FOX2 data found.</p>
  <p style="margin-top:8px;font-size:12px">Scan the QR code on your FOX2 device to view your results.</p>
</div>

<script>

// ─── Parse URL params ─────────────────────────────────────────────
var params    = new URLSearchParams(window.location.search);
var targetAUC = parseInt(params.get('t') || '0', 36);  // base36 encoded
var dParam    = params.get('d') || '';
var aParam    = params.get('a') || '';
var sParam    = params.get('s') || '';

// Derive windowStart: 3 weeks ending on the most recent Saturday (same logic as device)
var windowStart = (function() {
  var now = new Date();
  var dow = now.getUTCDay(); // 0=Sun, 6=Sat
  var daysToSat = (6 - dow + 7) % 7;
  var weekEndMs = Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate()) + daysToSat * 86400000;
  return Math.floor(weekEndMs / 1000) - 20 * 86400;
})();

// Parse injected AUCs — fixed 21-slot, 2-char base36 each, no separators
// e.g. &a=003k4h3t000...  zero = no data for that day
var injectedAUCs = {};
if (aParam) {
  if (aParam.indexOf(':') < 0 && aParam.indexOf(',') < 0) {
    // New fixed-width base36 format
    for (var ai = 0; ai * 2 + 2 <= aParam.length; ai++) {
      var val = parseInt(aParam.substring(ai * 2, ai * 2 + 2), 36);
      if (val > 0) injectedAUCs[ai] = val;
    }
  } else {
    // Legacy sparse format fallback
    var aucParts = aParam.split(',');
    for (var ai = 0; ai < aucParts.length; ai++) {
      var kv = aucParts[ai].split(':');
      if (kv.length === 2) {
        injectedAUCs[parseInt(kv[0], 36)] = parseInt(kv[1], 36);
      } else if (kv.length === 1 && kv[0] !== '') {
        injectedAUCs[ai] = parseFloat(kv[0]) || 0;
      }
    }
  }
}

// Parse streaks
var sParts     = sParam ? sParam.split(',') : [];
var currentStreak = sParts.length > 0 ? parseInt(sParts[0], 10) : 0;
var bestStreak    = sParts.length > 1 ? parseInt(sParts[1], 10) : 0;

// Parse days from compact format:
// d = <label>:<m0>:<p0>,<m1>:<p1>|<label>:...|...
var days = [];
var totalDays = 0;
var bestStreak = 0;
var currentStreak = 0;

// Base36 decoder
function fromBase36(s) {
  return parseInt(s, 36);
}

if (dParam) {
  var dayBlocks = dParam.split('|');
  totalDays = dayBlocks.length;

  for (var d = 0; d < dayBlocks.length; d++) {
    var block  = dayBlocks[d];
    var colon1 = block.indexOf(':');
    var label  = colon1 >= 0 ? block.substring(0, colon1) : '?';
    var rest   = colon1 >= 0 ? block.substring(colon1 + 1) : '';

    var epochs = [], vals = [];
    var dayStartEpoch = windowStart + d * 86400;

    // Each measurement is exactly 4 chars: 2 for minutes (base36), 2 for ppm×10 (base36)
    var i = 0;
    while (i + 4 <= rest.length) {
      var minuteOffset = fromBase36(rest.substring(i,   i+2));
      var ppmTimes10   = fromBase36(rest.substring(i+2, i+4));
      var ppm          = ppmTimes10 / 10.0;
      epochs.push(dayStartEpoch + minuteOffset * 60);
      vals.push(ppm);
      i += 4;
    }

    // Use injected AUC if available, otherwise trapezoid approximation
    var auc = 0;
    if (injectedAUCs[d] !== undefined) {
      auc = injectedAUCs[d];
    } else if (epochs.length >= 2) {
      for (var j = 1; j < epochs.length; j++) {
        var dt = (epochs[j] - epochs[j-1]) / 3600;
        auc += 0.5 * (vals[j-1] + vals[j]) * dt;
      }
    }

    days.push({ label: label, epochs: epochs, vals: vals, auc: auc });
  }
}

// Show no-data message if URL has no data
if (!dParam || totalDays === 0) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('scroller').style.display = 'none';
  document.getElementById('no-data').style.display  = 'block';
}

// ─── Helpers ─────────────────────────────────────────────────────
function roundRect(ctx, x, y, w, h, r) {
  r = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function pill(ctx, cx, cy, w, h, r, bg, fg, label, fs) {
  ctx.fillStyle = bg; roundRect(ctx,cx-w/2,cy-h/2,w,h,r); ctx.fill();
  ctx.fillStyle = fg;
  ctx.font = 'bold '+fs+'px -apple-system,sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, cx, cy+1);
}

function filledDot(ctx, cx, cy, r, color) {
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fillStyle=color; ctx.fill();
}

// ─── Catmull-Rom spline helpers ───────────────────────────────────
function catmullRomCP(p0, p1, p2, p3) {
  var t = 0.5;
  return {
    cp1x: p1.x + (p2.x - p0.x) * t / 3,
    cp1y: p1.y + (p2.y - p0.y) * t / 3,
    cp2x: p2.x - (p3.x - p1.x) * t / 3,
    cp2y: p2.y - (p3.y - p1.y) * t / 3
  };
}

function splinePath(ctx, pts, bottomY) {
  if (pts.length < 2) return;
  var p0 = { x: 2*pts[0].x - pts[1].x, y: 2*pts[0].y - pts[1].y };
  var pN = { x: 2*pts[pts.length-1].x - pts[pts.length-2].x,
             y: 2*pts[pts.length-1].y - pts[pts.length-2].y };
  var ext = [p0].concat(pts).concat([pN]);
  if (bottomY !== undefined) {
    ctx.moveTo(pts[0].x, bottomY);
    ctx.lineTo(pts[0].x, pts[0].y);
  } else {
    ctx.moveTo(pts[0].x, pts[0].y);
  }
  for (var i = 0; i < pts.length - 1; i++) {
    var cp = catmullRomCP(ext[i], ext[i+1], ext[i+2], ext[i+3]);
    ctx.bezierCurveTo(cp.cp1x, cp.cp1y, cp.cp2x, cp.cp2y, pts[i+1].x, pts[i+1].y);
  }
}

// ─── Draw a single week row ───────────────────────────────────────
// weekDays: array of 7 day objects from days[]
// dayOffset: index of weekDays[0] within the global days[] array
// gLeft/gRight/gTop/gBottom: pixel bounds for this row's graph area
// maxY: shared y scale maximum
// todayIdx: global day index of today
function drawWeekRow(ctx, weekDays, dayOffset, gLeft, gRight, gTop, gBottom, maxY, todayIdx, prevPt, nextPt) {
  prevPt = prevPt || null;
  nextPt = nextPt || null;
  var gW = gRight - gLeft;
  var gH = gBottom - gTop;
  var DAYS = weekDays.length;

  function wx(epoch) {
    // x within this row: epoch relative to this week's start midnight
    var weekStartEpoch = windowStart + dayOffset * 86400;
    return gLeft + ((epoch - weekStartEpoch) / (DAYS * 86400)) * gW;
  }

  function wy(v) {
    return gBottom - (Math.min(Math.max(v, 0), maxY) / maxY) * gH;
  }

  // ── Day bands ──────────────────────────────────────────────────
  var bandW = gW / DAYS;
  for (var d = 0; d < DAYS; d++) {
    var bandX   = gLeft + d * bandW;
    var isToday = (dayOffset + d === todayIdx);
    var label   = weekDays[d].label.toLowerCase();

    if (d % 2 === 1) {
      ctx.fillStyle = 'rgba(255,255,255,0.04)';
      ctx.fillRect(bandX, gTop, bandW, gH);
    }
    if (d > 0) {
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.lineWidth = 0.75;
      ctx.beginPath(); ctx.moveTo(bandX, gTop); ctx.lineTo(bandX, gBottom); ctx.stroke();
    }
    if (isToday) {
      ctx.strokeStyle = 'rgba(245,200,66,0.5)';
      ctx.lineWidth = 2;
      ctx.strokeRect(bandX+0.5, gTop+0.5, bandW-1, gH-1);
    }

    // Day labels below x axis
    ctx.fillStyle = isToday ? '#f5c842' : 'rgba(255,255,255,0.45)';
    ctx.font = (isToday ? 'bold ' : '') + '10px -apple-system,sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.fillText(label, bandX + bandW/2, gBottom + 3);
  }

  // ── X axis ────────────────────────────────────────────────────
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 0.75;
  ctx.beginPath(); ctx.moveTo(gLeft, gBottom); ctx.lineTo(gRight, gBottom); ctx.stroke();

  // ── Target line ───────────────────────────────────────────────
  if (targetAUC > 0) {
    var tPPM = targetAUC / 24;
    if (tPPM <= maxY) {
      var tY = wy(tPPM);
      ctx.strokeStyle = 'rgba(255,255,255,0.2)';
      ctx.lineWidth = 0.75;
      ctx.setLineDash([4,3]);
      ctx.beginPath(); ctx.moveTo(gLeft, tY); ctx.lineTo(gRight, tY); ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  // ── Collect points for this week ──────────────────────────────
  var allPts = [];
  for (var d = 0; d < DAYS; d++) {
    for (var i = 0; i < weekDays[d].epochs.length; i++) {
      allPts.push({ epoch: weekDays[d].epochs[i], val: weekDays[d].vals[i], dayIdx: d });
    }
  }
  allPts.sort(function(a,b){ return a.epoch - b.epoch; });

  if (allPts.length > 0) {
    var weekStartEpoch = windowStart + dayOffset * 86400;

    // Single pts array for both fill and line.
    // prevPt/nextPt are ghost points at their real epoch x (off-screen) for Sat→Sun continuity.
    // For week 0 (no prevPt), anchor back to midnight of first data day at first measurement value.
    var pts = [];

    if (prevPt) {
      pts.push({ x: wx(prevPt.epoch), y: wy(prevPt.val) });
    } else {
      var firstMidnight = weekStartEpoch + allPts[0].dayIdx * 86400;
      pts.push({ x: wx(firstMidnight), y: wy(allPts[0].val) });
    }
    for (var i = 0; i < allPts.length; i++) {
      pts.push({ x: wx(allPts[i].epoch), y: wy(allPts[i].val) });
    }
    if (nextPt) {
      pts.push({ x: wx(nextPt.epoch), y: wy(nextPt.val) });
    }

    // Clip to row bounds so off-screen ghost points don't bleed
    ctx.save();
    ctx.beginPath();
    ctx.rect(gLeft, gTop, gRight - gLeft, gBottom - gTop);
    ctx.clip();

    // Precompute Catmull-Rom extended array (shared by fill and line)
    var p0  = { x: 2*pts[0].x - pts[1].x, y: 2*pts[0].y - pts[1].y };
    var pN  = { x: 2*pts[pts.length-1].x - pts[pts.length-2].x,
                y: 2*pts[pts.length-1].y - pts[pts.length-2].y };
    var ext = [p0].concat(pts).concat([pN]);

    // Gradient fill — same beziers as line, closed to baseline
    var grad = ctx.createLinearGradient(0, gTop, 0, gBottom);
    grad.addColorStop(0,   'rgba(255,140,0,0.0)');
    grad.addColorStop(0.5, 'rgba(255,140,0,0.22)');
    grad.addColorStop(1,   'rgba(255,140,0,0.5)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(pts[0].x, gBottom);
    ctx.lineTo(pts[0].x, pts[0].y);
    for (var i = 0; i < pts.length - 1; i++) {
      var cp = catmullRomCP(ext[i], ext[i+1], ext[i+2], ext[i+3]);
      ctx.bezierCurveTo(cp.cp1x, cp.cp1y, cp.cp2x, cp.cp2y, pts[i+1].x, pts[i+1].y);
    }
    ctx.lineTo(pts[pts.length-1].x, gBottom);
    ctx.closePath(); ctx.fill();

    // Spline line — identical beziers
    ctx.strokeStyle = '#FF8C00'; ctx.lineWidth = 1.5;
    ctx.lineJoin = 'round'; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (var i = 0; i < pts.length - 1; i++) {
      var cp = catmullRomCP(ext[i], ext[i+1], ext[i+2], ext[i+3]);
      ctx.bezierCurveTo(cp.cp1x, cp.cp1y, cp.cp2x, cp.cp2y, pts[i+1].x, pts[i+1].y);
    }
    ctx.stroke();

    ctx.restore();

    // Dots — data points always start at pts[1]
    var dotR = 3, valFS = 12;
    for (var i = 0; i < allPts.length; i++) {
      var px = pts[i+1].x, py = pts[i+1].y;
      var isNewest = (allPts[i].dayIdx + dayOffset === todayIdx) && (i === allPts.length - 1);
      var dc = allPts[i].val >= 5 ? '#00FF00' : '#00FFFF';
      var isSelected = selectedDot && selectedDot.epoch === allPts[i].epoch;
      if (isNewest) {
        ctx.globalAlpha=0.3; filledDot(ctx,px,py,dotR*2.2,dc);
        ctx.globalAlpha=1;   filledDot(ctx,px,py,dotR*1.4,dc);
      } else {
        filledDot(ctx,px,py,dotR,dc);
      }
      if (isSelected) {
        ctx.beginPath(); ctx.arc(px, py, dotR*2.8, 0, Math.PI*2);
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.stroke();
      }
      dotHits.push({ cx: px, cy: py, val: allPts[i].val, epoch: allPts[i].epoch });
    }

    // Labels with collision resolution
    ctx.font = 'bold '+valFS+'px -apple-system,sans-serif';
    var PAD_X=2, MAX_SHIFT=gW/DAYS*0.35, ITERS=5;
    var MIN_CX=gLeft+2, MAX_CX=gRight-2;
    var labels = [];
    for (var i = 0; i < allPts.length; i++) {
      var px=pts[i+1].x, py=pts[i+1].y;
      var isNewest=(allPts[i].dayIdx + dayOffset === todayIdx)&&(i===allPts.length-1);
      var dotEdge=isNewest?dotR*1.4:dotR;
      var s=String(Math.round(allPts[i].val));
      var w=ctx.measureText(s).width;
      labels.push({ s:s, baseX:px, x:px, y:py-dotEdge-1, w:w, visible:true, newest:isNewest });
    }
    for (var pass=0; pass<ITERS; pass++) {
      for (var i=0; i<labels.length-1; i++) {
        var L=labels[i], R=labels[i+1];
        if (!L.visible||!R.visible) continue;
        var Lright=L.x+L.w/2+PAD_X, Rleft=R.x-R.w/2-PAD_X;
        if (Lright<=Rleft) continue;
        var overlap=Lright-Rleft, push=Math.floor(overlap/2)+1;
        var newLX=Math.max(L.x-push,MIN_CX), newRX=Math.min(R.x+push,MAX_CX);
        var Lexc=Math.abs(newLX-L.baseX)>MAX_SHIFT, Rexc=Math.abs(newRX-R.baseX)>MAX_SHIFT;
        if (L.newest) { L.x=L.baseX; if(Rexc)R.visible=false;else R.x=newRX; }
        else if (R.newest) { R.x=R.baseX; if(Lexc)L.visible=false;else L.x=newLX; }
        else {
          if (!Lexc&&!Rexc)     { L.x=newLX; R.x=newRX; }
          else if (Lexc&&!Rexc) { L.visible=false; R.x=R.baseX; }
          else if (!Lexc&&Rexc) { R.visible=false; L.x=L.baseX; }
          else                  { L.visible=false; R.x=R.baseX; }
        }
      }
    }
    ctx.font='bold '+valFS+'px -apple-system,sans-serif';
    ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.textBaseline='bottom';
    var shown = 0;
    for (var i=0; i<labels.length; i++) {
      if (!labels[i].visible) continue;
      if (labels[i].newest) { ctx.fillText(labels[i].s, labels[i].x, labels[i].y); continue; }
      shown++;
      if (shown % 2 === 0) ctx.fillText(labels[i].s, labels[i].x, labels[i].y);
    }
  }

  // ── AUC / heart row below day labels ─────────────────────────
  var aucY    = gBottom + 14 + 18; // 14=LABEL_H, 18 = mid of AUC_H(36)
  var aucFS   = 18;
  var heartFS = 16;
  for (var d = 0; d < DAYS; d++) {
    var bandX   = gLeft + d * bandW;
    var cx      = bandX + bandW / 2;
    var isToday = (dayOffset + d === todayIdx);
    var auc     = weekDays[d].auc;
    var hit     = targetAUC > 0 && auc >= targetAUC;
    var hasData = auc > 0;
    var heart   = hit ? '\u2665' : '\u2661';
    var aucStr  = hasData ? String(Math.round(auc)) : '\u2014';

    ctx.fillStyle = hit ? '#e53935' : 'rgba(255,255,255,0.25)';
    ctx.font = heartFS + 'px -apple-system,sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(heart, cx, aucY - aucFS * 0.6);

    ctx.fillStyle = isToday ? (hit ? '#FFFF00' : '#FF8C00')
                            : (hit ? '#FFA500' : 'rgba(255,255,255,0.45)');
    ctx.font = (isToday ? 'bold ' : '') + aucFS + 'px -apple-system,sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(aucStr, cx, aucY + heartFS * 0.5);
  }
}

// ─── 3-week graph card ────────────────────────────────────────────
function buildGraphCard() {
  var SCALE   = graphScale;
  var CW      = 400;
  var PAD     = 14;
  var PILL_H  = 28;
  var PILL_PAD = 8;
  var WEEKS   = 3;
  var DAYS_PER_WEEK = 7;
  var GRAPH_H = 90;   // height of each week's graph area
  var LABEL_H = 14;   // day letters below each graph
  var AUC_H   = 36;   // heart + AUC number row (doubled)
  var ROW_GAP = 12;   // gap between week rows
  var SUMMARY_H = 60;
  var LABEL_ABOVE_H = 0;
  var FOOTER_H = 14;

  // Total height: pill + 3 rows of (graph + labels + auc) + gaps between + summary + footer
  var CH = PAD + PILL_H + PILL_PAD
         + WEEKS * (GRAPH_H + LABEL_H + AUC_H)
         + (WEEKS - 1) * ROW_GAP
         + ROW_GAP + LABEL_ABOVE_H + SUMMARY_H
         + PAD + FOOTER_H;

  var canvas = document.createElement('canvas');
  canvas.width  = CW * SCALE;
  canvas.height = CH * SCALE;
  var ctx = canvas.getContext('2d');
  ctx.scale(SCALE, SCALE);

  // Card background
  ctx.fillStyle = '#111';
  roundRect(ctx, 0, 0, CW, CH, 14); ctx.fill();

  var gLeft  = PAD + 6;
  var gRight = CW - PAD - 4;

  // ── Compute shared y scale across ALL 21 days ─────────────────
  var rawMax = 0;
  for (var d = 0; d < totalDays; d++) {
    for (var i = 0; i < days[d].vals.length; i++) {
      if (days[d].vals[i] > rawMax) rawMax = days[d].vals[i];
    }
  }
  if (rawMax < 4) rawMax = 4;
  var step = rawMax <= 4 ? 0.5 : rawMax <= 8 ? 1 : rawMax <= 15 ? 2 : 5;
  var maxY = Math.ceil(rawMax * 1.15 / step) * step;
  if (maxY < 2) maxY = 2;

  // Today = last day with any measurements
  var todayIdx = 0;
  for (var d = 0; d < totalDays; d++) {
    if (days[d].vals.length > 0) todayIdx = d;
  }

  // ── Draw 3 week rows ─────────────────────────────────────────
  var rowTop = PAD + PILL_H + PILL_PAD;
  for (var w = 0; w < WEEKS; w++) {
    var dayOffset  = w * DAYS_PER_WEEK;
    var weekDays   = days.slice(dayOffset, dayOffset + DAYS_PER_WEEK);
    var gTop       = rowTop;
    var gBottom    = gTop + GRAPH_H;

    // Last measurement from previous week (ghost point before this row)
    var prevPt = null;
    if (w > 0) {
      for (var pd = w * DAYS_PER_WEEK - 1; pd >= (w-1) * DAYS_PER_WEEK; pd--) {
        if (days[pd] && days[pd].epochs.length > 0) {
          var ei = days[pd].epochs.length - 1;
          prevPt = { epoch: days[pd].epochs[ei], val: days[pd].vals[ei] };
          break;
        }
      }
    }

    // First measurement from next week (ghost point after this row)
    var nextPt = null;
    if (w < WEEKS - 1) {
      for (var nd = (w+1) * DAYS_PER_WEEK; nd < (w+2) * DAYS_PER_WEEK; nd++) {
        if (days[nd] && days[nd].epochs.length > 0) {
          nextPt = { epoch: days[nd].epochs[0], val: days[nd].vals[0] };
          break;
        }
      }
    }

    drawWeekRow(ctx, weekDays, dayOffset, gLeft, gRight, gTop, gBottom, maxY, todayIdx, prevPt, nextPt);

    rowTop += GRAPH_H + LABEL_H + AUC_H + ROW_GAP;
  }

  // ── Summary stats strip ───────────────────────────────────────
  // zone = round(ppm), range/avg shown as integer zones
  var allVals = [], daysWithData = 0, daysOnTarget = 0, totalAUC = 0;
  for (var d = 0; d < totalDays; d++) {
    for (var i = 0; i < days[d].vals.length; i++) allVals.push(days[d].vals[i]);
    if (days[d].vals.length > 0) {
      daysWithData++;
      totalAUC += days[d].auc;
      if (targetAUC > 0 && days[d].auc >= targetAUC) daysOnTarget++;
    }
  }
  var minZone = allVals.length ? Math.round(Math.min.apply(null, allVals)) : 0;
  var maxZone = allVals.length ? Math.round(Math.max.apply(null, allVals)) : 0;
  var avgZone = daysWithData > 0 ? Math.round(totalAUC / (daysWithData * 24) * 10) / 10 : 0;
  var pctOnTarget = daysWithData > 0 ? Math.round(daysOnTarget / daysWithData * 100) : 0;

  var summaryY = rowTop + ROW_GAP;
  var sumPad = 6;
  var rectY = summaryY;
  var sumStats = [
    { label: 'Range',  value: minZone + '–' + maxZone },
    { label: 'Avg',    value: avgZone.toFixed(1)          },
    { label: targetAUC > 0 ? 'Target (' + targetAUC + ')' : 'Target',
                       value: pctOnTarget + '%'         }
  ];
  var colW = (gRight - gLeft) / 3;
  var LABEL_FS = 14;
  var LABEL_TOP_PAD = 8;
  var LINE_GAP = 3;

  // Yellow border rounded rect (no fill)
  ctx.strokeStyle = '#f5c842';
  ctx.lineWidth = 4;
  roundRect(ctx, gLeft - sumPad, rectY, gRight - gLeft + sumPad*2, SUMMARY_H, 10); ctx.stroke();

  // Dividers, labels, underlines, values
  for (var s = 0; s < sumStats.length; s++) {
    var cx = gLeft + colW * s + colW / 2;

    if (s > 0) {
      ctx.strokeStyle = 'rgba(255,255,255,0.25)';
      ctx.lineWidth = 0.75;
      ctx.beginPath();
      ctx.moveTo(gLeft + colW * s, rectY + 6);
      ctx.lineTo(gLeft + colW * s, rectY + SUMMARY_H - 6);
      ctx.stroke();
    }

    var VALUE_FS = 26;
    var VALUE_GAP = 4;
    var blockH = LABEL_FS + LINE_GAP + VALUE_GAP + VALUE_FS;
    var blockTop = rectY + (SUMMARY_H - blockH) / 2;

    var labelY = blockTop + LABEL_FS / 2;
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.font = LABEL_FS + 'px -apple-system,sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(sumStats[s].label, cx, labelY);

    var lw = ctx.measureText(sumStats[s].label).width;
    var lineY = blockTop + LABEL_FS + LINE_GAP;
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 0.75;
    ctx.beginPath();
    ctx.moveTo(cx - lw/2, lineY);
    ctx.lineTo(cx + lw/2, lineY);
    ctx.stroke();

    var valueY = lineY + VALUE_GAP + VALUE_FS / 2;
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold ' + VALUE_FS + 'px -apple-system,sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(sumStats[s].value, cx, valueY);
  }

  // ── 3 WEEKS + date range pill ─────────────────────────────────
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function fmtDate(epoch) {
    var d = new Date(epoch * 1000);
    return months[d.getUTCMonth()] + ' ' + d.getUTCDate();
  }
  var rangeStr = fmtDate(windowStart) + ' – ' + fmtDate(windowStart + 20 * 86400);
  var pillW = 220, pillH = PILL_H, pillCY = PAD + pillH / 2;
  var pillLeft = CW/2 - pillW/2, pillRight = CW/2 + pillW/2;
  ctx.fillStyle = '#f5c842';
  roundRect(ctx, pillLeft, PAD, pillW, pillH, pillH/2); ctx.fill();
  ctx.font = 'bold 16px -apple-system,sans-serif';
  var weeksW = ctx.measureText('3 WEEKS').width;
  ctx.font = '15px -apple-system,sans-serif';
  var rangeW = ctx.measureText(rangeStr).width;
  var totalTextW = weeksW + rangeW;
  var textGap = pillW - totalTextW - 20; // 10px padding each side
  var weeksX = pillLeft + 10 + weeksW / 2;
  var sepX   = pillLeft + 10 + weeksW + textGap / 2;
  var rangeX = sepX + textGap / 2 + rangeW / 2;

  ctx.fillStyle = '#1a1a2e';
  ctx.textBaseline = 'middle'; ctx.textAlign = 'center';
  ctx.font = 'bold 16px -apple-system,sans-serif';
  ctx.fillText('3 WEEKS', weeksX, pillCY + 1);
  ctx.fillStyle = 'rgba(26,26,46,0.35)';
  ctx.fillRect(sepX, PAD + 7, 1, pillH - 14);
  ctx.fillStyle = '#1a1a2e';
  ctx.font = '15px -apple-system,sans-serif';
  ctx.fillText(rangeStr, rangeX, pillCY + 1);

  // ── Watermark ─────────────────────────────────────────────────
  ctx.fillStyle = 'rgba(255,255,255,0.07)';
  ctx.font = '9px -apple-system,sans-serif';
  ctx.textAlign = 'right'; ctx.textBaseline = 'alphabetic';
  ctx.fillText('fox2.app', CW - PAD, CH - 4);

  return canvas;
}

// ─── 21-day AUC bar card ──────────────────────────────────────────
function buildStreakCard() {
  var SCALE    = 2;
  var CW       = 400;
  var PAD      = 14;
  var PILL_H   = 28;
  var PILL_PAD = 8;
  var WEEKS    = 3;
  var DAYS_PER_WEEK = 7;
  var BAR_H    = 90;
  var LABEL_H  = 14;
  var ROW_GAP  = 12;
  var SUMMARY_H = 60;
  var FOOTER_H = 14;

  var CH = PAD + PILL_H + PILL_PAD
         + WEEKS * (BAR_H + LABEL_H)
         + (WEEKS - 1) * ROW_GAP
         + ROW_GAP + SUMMARY_H
         + PAD + FOOTER_H;

  var canvas = document.createElement('canvas');
  canvas.width  = CW * SCALE;
  canvas.height = CH * SCALE;
  var ctx = canvas.getContext('2d');
  ctx.scale(SCALE, SCALE);

  ctx.fillStyle = '#111';
  roundRect(ctx, 0, 0, CW, CH, 14); ctx.fill();

  var gLeft  = PAD + 6;
  var gRight = CW - PAD - 4;
  var gW     = gRight - gLeft;
  var bandW  = gW / DAYS_PER_WEEK;

  // ── Shared AUC y-scale ────────────────────────────────────────
  var yMax = targetAUC > 0 ? targetAUC : 0;
  for (var d = 0; d < totalDays; d++) {
    if (days[d].auc > yMax) yMax = days[d].auc;
  }
  yMax *= 1.15;
  if (yMax < 40) yMax = 40;

  // Today = last day with data
  var todayIdx = 0;
  for (var d = 0; d < totalDays; d++) {
    if (days[d].vals.length > 0) todayIdx = d;
  }

  // ── 3 week rows ───────────────────────────────────────────────
  var rowTop = PAD + PILL_H + PILL_PAD;

  for (var w = 0; w < WEEKS; w++) {
    var dayOffset = w * DAYS_PER_WEEK;
    var weekDays  = days.slice(dayOffset, dayOffset + DAYS_PER_WEEK);
    var gTop      = rowTop;
    var gBottom   = gTop + BAR_H;

    // Target dashed line
    if (targetAUC > 0) {
      var tY = gBottom - (targetAUC / yMax) * BAR_H;
      ctx.strokeStyle = 'rgba(255,255,255,0.35)';
      ctx.lineWidth = 1;
      ctx.setLineDash([3, 3]);
      ctx.beginPath();
      ctx.moveTo(gLeft, tY); ctx.lineTo(gRight, tY);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // Baseline
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(gLeft, gBottom); ctx.lineTo(gRight, gBottom);
    ctx.stroke();

    // Today column highlight band
    for (var d = 0; d < DAYS_PER_WEEK; d++) {
      if (dayOffset + d === todayIdx) {
        ctx.fillStyle = 'rgba(255,255,100,0.06)';
        ctx.fillRect(gLeft + d * bandW, gTop, bandW, BAR_H);
      }
    }

    // Bars + day labels
    for (var d = 0; d < DAYS_PER_WEEK; d++) {
      var globalIdx = dayOffset + d;
      var day       = weekDays[d];
      var cx        = gLeft + d * bandW + bandW / 2;
      var isToday   = (globalIdx === todayIdx);
      var isFuture  = (globalIdx > todayIdx);
      var auc       = day.auc;
      var hit       = targetAUC > 0 && auc >= targetAUC;

      if (auc > 0 && !isFuture) {
        var bh  = Math.min(auc / yMax, 1) * BAR_H;
        var bx  = gLeft + d * bandW + bandW * 0.12;
        var bw  = bandW * 0.76;
        var by  = gBottom - bh;
        var br  = Math.min(3, bh / 2);
        ctx.fillStyle = isToday ? 'rgba(255,255,255,0.35)' : 'rgba(255,255,255,0.2)';
        roundRect(ctx, bx, by, bw, bh, br); ctx.fill();
        if (hit) {
          ctx.strokeStyle = '#FFA500';
          ctx.lineWidth = 2;
          roundRect(ctx, bx, by, bw, bh, br); ctx.stroke();
        }

        var valFS = 13;
        if (bh > valFS * 1.6) {
          ctx.fillStyle = 'rgba(255,255,255,0.8)';
          ctx.font = 'bold ' + valFS + 'px -apple-system,sans-serif';
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText(Math.round(auc), cx, by + bh / 2);
        }
      }

      if (isToday) {
        ctx.strokeStyle = '#f5c842';
        ctx.lineWidth = 2;
        ctx.strokeRect(gLeft + d * bandW + 1, gTop + 1, bandW - 2, BAR_H - 2);
      }

      var labelY = gBottom + LABEL_H * 0.75;
      ctx.fillStyle = isToday ? '#f5c842' : 'rgba(255,255,255,0.45)';
      ctx.font = (isToday ? 'bold ' : '') + '11px -apple-system,sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(day.label.toLowerCase(), cx, labelY);
    }

    rowTop += BAR_H + LABEL_H + ROW_GAP;
  }

  // ── Summary strip ─────────────────────────────────────────────
  var daysWithData = 0, totalAUC = 0;
  var completedDays = 0, completedOnTarget = 0;
  for (var d = 0; d < totalDays; d++) {
    if (days[d].auc > 0) {
      daysWithData++;
      totalAUC += days[d].auc;
      if (d !== todayIdx) {
        completedDays++;
        if (targetAUC > 0 && days[d].auc >= targetAUC) completedOnTarget++;
      }
    }
  }
  var avgAUC      = daysWithData > 0 ? Math.round(totalAUC / daysWithData) : 0;
  var pctOnTarget = completedDays > 0 ? Math.round(completedOnTarget / completedDays * 100) : 0;

  var summaryY  = rowTop;
  var sumPad    = 6;
  var rectY     = summaryY;
  var rectW     = gRight - gLeft + sumPad * 2;
  var rectX     = gLeft - sumPad;
  var colW      = rectW / 3;
  var LABEL_FS  = 14;
  var LINE_GAP  = 3;
  var VALUE_FS  = 26;
  var VALUE_GAP = 4;
  var blockH    = LABEL_FS + LINE_GAP + VALUE_GAP + VALUE_FS;
  var blockTop  = rectY + (SUMMARY_H - blockH) / 2;

  ctx.strokeStyle = '#f5c842';
  ctx.lineWidth = 4;
  roundRect(ctx, rectX, rectY, rectW, SUMMARY_H, 10); ctx.stroke();

  for (var d = 1; d <= 2; d++) {
    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
    ctx.lineWidth = 0.75;
    ctx.beginPath();
    ctx.moveTo(rectX + colW * d, rectY + 6);
    ctx.lineTo(rectX + colW * d, rectY + SUMMARY_H - 6);
    ctx.stroke();
  }

  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 0.75;
  ctx.beginPath();
  ctx.moveTo(rectX + colW * 0.5, rectY + SUMMARY_H * 0.2);
  ctx.lineTo(rectX + colW * 0.5, rectY + SUMMARY_H * 0.8);
  ctx.stroke();

  function drawSumCell(cx, label, value) {
    var labelY = blockTop + LABEL_FS / 2;
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.font = LABEL_FS + 'px -apple-system,sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(label, cx, labelY);
    var lw    = ctx.measureText(label).width;
    var lineY = blockTop + LABEL_FS + LINE_GAP;
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 0.75;
    ctx.beginPath();
    ctx.moveTo(cx - lw/2, lineY); ctx.lineTo(cx + lw/2, lineY);
    ctx.stroke();
    var valueY = lineY + VALUE_GAP + VALUE_FS / 2;
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold ' + VALUE_FS + 'px -apple-system,sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(value, cx, valueY);
  }

  // Left compartment: Streaks header + Best | Now
  var leftColCX     = rectX + colW * 0.5;
  var STREAK_HDR_FS = 11;
  var STREAK_LBL_FS = 10;
  var STREAK_VAL_FS = 18;
  var STREAK_GAP    = 3;
  var streakTotalH  = STREAK_HDR_FS + STREAK_GAP + STREAK_LBL_FS + STREAK_GAP + STREAK_VAL_FS;
  var streakTop     = rectY + (SUMMARY_H - streakTotalH) / 2;

  var hdrY = streakTop + STREAK_HDR_FS / 2;
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = STREAK_HDR_FS + 'px -apple-system,sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('Streaks', leftColCX, hdrY);
  var hdrLW    = ctx.measureText('Streaks').width;
  var hdrLineY = streakTop + STREAK_HDR_FS + 2;
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 0.75;
  ctx.beginPath();
  ctx.moveTo(leftColCX - hdrLW/2, hdrLineY);
  ctx.lineTo(leftColCX + hdrLW/2, hdrLineY);
  ctx.stroke();

  var subLblY = hdrLineY + STREAK_GAP + STREAK_LBL_FS / 2;
  var subValY = subLblY + STREAK_LBL_FS / 2 + STREAK_GAP + STREAK_VAL_FS / 2;
  var leftQX  = rectX + colW * 0.25;
  var rightQX = rectX + colW * 0.75;

  ctx.font = STREAK_LBL_FS + 'px -apple-system,sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('best', leftQX,  subLblY);
  ctx.fillText('now',  rightQX, subLblY);

  ctx.font = 'bold ' + STREAK_VAL_FS + 'px -apple-system,sans-serif';
  ctx.fillStyle = '#ffffff';
  ctx.fillText(String(bestStreak),    leftQX,  subValY);
  ctx.fillText(String(currentStreak), rightQX, subValY);

  // Middle: Daily Avg
  drawSumCell(rectX + colW * 1.5, 'Daily Avg', String(avgAUC));

  // Right: Target %
  var targetLabel = targetAUC > 0 ? 'Target (' + targetAUC + ')' : 'Target';
  drawSumCell(rectX + colW * 2.5, targetLabel, pctOnTarget + '%');

  // ── Pill ──────────────────────────────────────────────────────
  var pillCX = CW / 2;
  var pillCY = PAD + PILL_H / 2;
  var pillW  = 220;
  ctx.fillStyle = '#f5c842';
  roundRect(ctx, pillCX - pillW/2, pillCY - PILL_H/2, pillW, PILL_H, PILL_H/2); ctx.fill();
  ctx.fillStyle = '#1a1a2e';
  ctx.font = 'bold 16px -apple-system,sans-serif';
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText('21 DAYS', pillCX - pillW/2 + 14, pillCY + 1);
  ctx.fillStyle = 'rgba(26,26,46,0.35)';
  ctx.fillRect(pillCX - 1, pillCY - PILL_H/2 + 6, 1, PILL_H - 12);

  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var d0 = new Date(windowStart * 1000);
  var d1 = new Date((windowStart + 20 * 86400) * 1000);
  var dateStr = months[d0.getUTCMonth()] + ' ' + d0.getUTCDate()
              + ' – ' + months[d1.getUTCMonth()] + ' ' + d1.getUTCDate();
  ctx.fillStyle = '#1a1a2e';
  ctx.font = '15px -apple-system,sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText(dateStr, pillCX + pillW/2 - 14, pillCY + 1);

  // ── Watermark ─────────────────────────────────────────────────
  ctx.fillStyle = 'rgba(255,255,255,0.07)';
  ctx.font = '9px -apple-system,sans-serif';
  ctx.textAlign = 'right'; ctx.textBaseline = 'alphabetic';
  ctx.fillText('fox2.app', CW - PAD, CH - 4);

  return canvas;
}

// ─── Render + share ───────────────────────────────────────────────
var graphCanvas, streakCanvas;
var dotHits = [];
var selectedDot = null;
var graphScale = 2;

function renderCard() {
  dotHits = [];
  graphCanvas = buildGraphCard();
  var dest = document.getElementById('card-graph');
  dest.width = graphCanvas.width; dest.height = graphCanvas.height;
  dest.getContext('2d').drawImage(graphCanvas, 0, 0);
}

window.addEventListener('load', function() {
  if (!dParam || totalDays === 0) return;

  setTimeout(function() {
    renderCard();

    streakCanvas = buildStreakCard();
    var destS = document.getElementById('card-streaks');
    destS.width = streakCanvas.width; destS.height = streakCanvas.height;
    destS.getContext('2d').drawImage(streakCanvas, 0, 0);

    // Hide loading overlay
    var loading = document.getElementById('loading');
    if (loading) loading.style.display = 'none';

    // Auto-trigger share sheet on load (real Safari only)
    if (navigator.share && navigator.canShare) {
      doShare(graphCanvas);
    }
  }, 100);

  // ── Tap/click: dot → popup, empty space → cycle labels ───────
  var dest     = document.getElementById('card-graph');
  var popup    = document.getElementById('dot-popup');
  var popupVal = document.getElementById('dot-popup-val');
  var popupTime= document.getElementById('dot-popup-time');
  var touchStartTime = 0, touchStartX = 0, touchStartY = 0, touchCount = 0;
  var lastTouch = 0;
  var HIT_RADIUS = 22;

  var DAYS_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var MONTHS     = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  function fmtPopupTime(epoch) {
    var d = new Date(epoch * 1000);
    var h = d.getUTCHours(), m = d.getUTCMinutes();
    var ampm = h >= 12 ? 'pm' : 'am';
    h = h % 12 || 12;
    var ms = m < 10 ? '0'+m : String(m);
    return DAYS_SHORT[d.getUTCDay()] + ' ' + MONTHS[d.getUTCMonth()] + ' ' + d.getUTCDate()
         + '  ' + h + ':' + ms + ampm;
  }

  function canvasCoords(clientX, clientY) {
    var rect = dest.getBoundingClientRect();
    var scale = (dest.width / graphScale) / rect.width;
    return { x: (clientX - rect.left) * scale,
             y: (clientY - rect.top)  * scale };
  }

  function findNearestDot(cx, cy) {
    var best = null, bestD = HIT_RADIUS;
    for (var i = 0; i < dotHits.length; i++) {
      var dx = dotHits[i].cx - cx, dy = dotHits[i].cy - cy;
      var d = Math.sqrt(dx*dx + dy*dy);
      if (d < bestD) { bestD = d; best = dotHits[i]; }
    }
    return best;
  }

  function showPopup(dot, clientX, clientY) {
    popupVal.textContent  = 'Zone ' + Math.round(dot.val);
    popupTime.textContent = fmtPopupTime(dot.epoch);
    popup.style.display = 'block';
    var rect = dest.getBoundingClientRect();
    var wrap = dest.parentElement.getBoundingClientRect();
    var logicalW = dest.width / graphScale;
    var cssScale  = rect.width / logicalW;
    var dotCssX = dot.cx * cssScale + (rect.left - wrap.left);
    var dotCssY = dot.cy * cssScale + (rect.top  - wrap.top);
    popup.style.left = '0'; popup.style.top = '0';
    var pw = popup.offsetWidth, ph = popup.offsetHeight;
    var GAP = 10;
    var px = Math.max(4, Math.min(dotCssX - pw/2, wrap.width - pw - 4));
    var py = Math.max(4, dotCssY - ph - GAP);
    popup.style.left = px + 'px';
    popup.style.top  = py + 'px';
  }

  function hidePopup() {
    popup.style.display = 'none';
    if (selectedDot) { selectedDot = null; renderCard(); }
  }

  function handleTap(clientX, clientY) {
    var c = canvasCoords(clientX, clientY);
    var dot = findNearestDot(c.x, c.y);
    if (dot) {
      selectedDot = dot;
      renderCard();
      showPopup(dot);
    } else {
      hidePopup();
    }
  }

  dest.addEventListener('touchstart', function(e) {
    touchCount = e.touches.length;
    if (touchCount === 1) {
      touchStartTime = Date.now();
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }
  }, { passive: true });

  dest.addEventListener('touchend', function(e) {
    if (touchCount > 1) { touchCount = 0; hidePopup(); return; }
    var dt = Date.now() - touchStartTime;
    var dx = Math.abs(e.changedTouches[0].clientX - touchStartX);
    var dy = Math.abs(e.changedTouches[0].clientY - touchStartY);
    if (dt < 250 && dx < 10 && dy < 10) {
      lastTouch = Date.now();
      handleTap(touchStartX, touchStartY);
    }
    touchCount = 0;
  }, { passive: true });

  dest.addEventListener('click', function(e) {
    if (Date.now() - lastTouch < 500) return;
    handleTap(e.clientX, e.clientY);
  });
});

function drawPopupOnCanvas(canvas, dot) {
  var ctx = canvas.getContext('2d');
  var S = graphScale;
  var DAYS_S = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var MONS   = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var d = new Date(dot.epoch * 1000);
  var h = d.getHours(), m = d.getMinutes();
  var ampm = h >= 12 ? 'pm' : 'am'; h = h % 12 || 12;
  var ms = m < 10 ? '0'+m : String(m);
  var line1 = 'Zone ' + Math.round(dot.val);
  var line2  = DAYS_S[d.getDay()] + ' ' + MONS[d.getMonth()] + ' ' + d.getDate() + '  ' + h + ':' + ms + ampm;

  var fs1 = 15 * S, fs2 = 11 * S;
  ctx.font = 'bold ' + fs1 + 'px -apple-system,sans-serif';
  var w1 = ctx.measureText(line1).width;
  ctx.font = fs2 + 'px -apple-system,sans-serif';
  var w2 = ctx.measureText(line2).width;
  var padX = 10 * S, padY = 6 * S, gap = 3 * S;
  var pw = Math.max(w1, w2) + padX * 2;
  var ph = fs1 + gap + fs2 + padY * 2;
  var GAP = 10 * S;

  var dotX = dot.cx * S, dotY = dot.cy * S;
  var px = Math.max(4, Math.min(dotX - pw/2, canvas.width - pw - 4));
  var py = Math.max(4, dotY - ph - GAP);

  ctx.save();
  ctx.fillStyle = 'rgba(20,20,35,0.95)';
  var r = 8 * S;
  ctx.beginPath();
  ctx.moveTo(px + r, py);
  ctx.lineTo(px + pw - r, py);
  ctx.quadraticCurveTo(px + pw, py, px + pw, py + r);
  ctx.lineTo(px + pw, py + ph - r);
  ctx.quadraticCurveTo(px + pw, py + ph, px + pw - r, py + ph);
  ctx.lineTo(px + r, py + ph);
  ctx.quadraticCurveTo(px, py + ph, px, py + ph - r);
  ctx.lineTo(px, py + r);
  ctx.quadraticCurveTo(px, py, px + r, py);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = S * 0.75;
  ctx.stroke();

  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + fs1 + 'px -apple-system,sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText(line1, px + pw/2, py + padY);
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = fs2 + 'px -apple-system,sans-serif';
  ctx.fillText(line2, px + pw/2, py + padY + fs1 + gap);
  ctx.restore();
}

function doShare(canvas) {
  canvas.toBlob(function(blob) {
    var file = new File([blob], 'fox2-results.png', { type: 'image/png' });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      navigator.share({ files: [file], title: 'FOX2 Results' })
        .catch(function() {});
    }
  }, 'image/png');
}

function shareGraph() {
  if (!graphCanvas) return;
  if (selectedDot) {
    var copy = document.createElement('canvas');
    copy.width = graphCanvas.width; copy.height = graphCanvas.height;
    copy.getContext('2d').drawImage(graphCanvas, 0, 0);
    drawPopupOnCanvas(copy, selectedDot);
    doShare(copy);
  } else {
    doShare(graphCanvas);
  }
}

function shareStreaks() {
  if (!streakCanvas) return;
  doShare(streakCanvas);
}

</script>
