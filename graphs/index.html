<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="color-scheme" content="dark">
<title>FOX2 Results</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  background: #000;
  font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  color: #fff;
  overflow: hidden;
}
.top-header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 60;
  padding-top: env(safe-area-inset-top);
  background: #000;
}
.top-header-inner {
  display: flex; align-items: baseline;
  padding: 16px 20px 14px;
  gap: 16px;
}
.nav-tab {
  padding: 0; font-size: 15px; font-weight: 600;
  color: rgba(255,255,255,0.3);
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  user-select: none; -webkit-user-select: none;
  border: none; background: none;
}
.nav-tab.active { font-size: 24px; font-weight: 700; color: #fff; }
.scroll-x {
  display: flex; flex-direction: row;
  width: 100vw; height: 100dvh;
  overflow-x: auto; overflow-y: hidden;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.scroll-x::-webkit-scrollbar { display: none; }
.page {
  flex: 0 0 100vw; width: 100vw; height: 100dvh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-start;
  padding: 16px;
  padding-top: calc(68px + env(safe-area-inset-top));
  padding-bottom: calc(56px + env(safe-area-inset-bottom));
  scroll-snap-align: start;
  overflow-y: auto; scrollbar-width: none;
}
.page::-webkit-scrollbar { display: none; }
.card-wrap { width: 100%; max-width: 420px; margin: auto 0; }
.card-wrap canvas { width: 100%; height: auto; display: block; }
.bottom-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 60;
  display: flex; align-items: center; justify-content: center;
  gap: 10px; padding: 10px 20px;
  padding-bottom: calc(10px + env(safe-area-inset-bottom));
  background: #000;
}
.bar-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 18px; border-radius: 20px;
  border: 1.5px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.05);
  color: rgba(255,255,255,0.7);
  font: 600 13px -apple-system, sans-serif;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  text-decoration: none;
}
.bar-btn:active { background: rgba(255,255,255,0.1); }
.bar-btn svg { opacity: 0.5; }
#no-data {
  display: none; text-align: center;
  color: rgba(255,255,255,0.4); font-size: 14px;
  padding: 40px 20px; line-height: 1.6;
}
#loading {
  position: fixed; inset: 0; background: #000;
  display: flex; align-items: center; justify-content: center; z-index: 100;
}
#loading-inner { display: flex; flex-direction: column; align-items: center; gap: 16px; }
#loading-spinner {
  width: 36px; height: 36px;
  border: 3px solid rgba(255,255,255,0.15);
  border-top-color: #f5c842;
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
#loading-text { color: rgba(255,255,255,0.4); font-size: 13px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="top-header">
  <div class="top-header-inner">
    <button class="nav-tab active" data-page="0">Results</button>
    <button class="nav-tab" data-page="1">Fuel</button>
    <button class="nav-tab" data-page="2">Daily Scores</button>
    <button class="nav-tab" data-page="3">Insights</button>
  </div>
</div>

<div class="scroll-x" id="scroller">
  <div class="page">
    <div class="card-wrap" style="position:relative;">
      <canvas id="card-graph" style="cursor:pointer;"></canvas>
      <div id="dot-popup" style="display:none;position:absolute;background:rgba(20,20,35,0.95);border:1px solid rgba(255,255,255,0.2);border-radius:8px;padding:6px 10px;pointer-events:none;z-index:10;white-space:nowrap;">
        <div id="dot-popup-val" style="font-size:15px;font-weight:700;color:#fff;text-align:center;"></div>
        <div id="dot-popup-time" style="font-size:11px;color:rgba(255,255,255,0.5);text-align:center;margin-top:2px;"></div>
      </div>
    </div>
  </div>
  <div class="page">
    <div class="card-wrap" style="position:relative;">
      <canvas id="card-fuel" style="cursor:pointer;"></canvas>
      <div id="dot-popup-fuel" style="display:none;position:absolute;background:rgba(20,20,35,0.95);border:1px solid rgba(255,255,255,0.2);border-radius:8px;padding:6px 10px;pointer-events:none;z-index:10;white-space:nowrap;">
        <div id="dot-popup-fuel-val" style="font-size:15px;font-weight:700;color:#fff;text-align:center;"></div>
        <div id="dot-popup-fuel-time" style="font-size:11px;color:rgba(255,255,255,0.5);text-align:center;margin-top:2px;"></div>
      </div>
    </div>
  </div>
  <div class="page">
    <div class="card-wrap"><canvas id="card-streaks"></canvas></div>
  </div>
  <div class="page">
    <div class="card-wrap"><canvas id="card-insights"></canvas></div>
  </div>
</div>

<div class="bottom-bar">
  <button class="bar-btn" id="bottom-share" onclick="handleBottomShare()">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
      <path d="M8 1v9M4 4l4-3 4 3M3 10v4h10v-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Share
  </button>
  <a class="bar-btn" href="https://tvratto.github.io/Fox2/" target="_blank">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
      <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.8"/>
      <path d="M8 7v5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      <circle cx="8" cy="4.5" r="0.9" fill="currentColor"/>
    </svg>
    Guide
  </a>
</div>

<div id="loading">
  <div id="loading-inner">
    <div id="loading-spinner"></div>
    <div id="loading-text">Loading results…</div>
  </div>
</div>

<div id="no-data">
  <p>No FOX2 data found.</p>
  <p style="margin-top:8px;font-size:12px">Scan the QR code on your FOX2 device to view your results.</p>
</div>

<script>

// ─── Parse URL params ─────────────────────────────────────────────
var params    = new URLSearchParams(window.location.search);
var targetAUC = parseInt(params.get('t') || '0', 36);  // base36 encoded
var dParam    = params.get('d') || '';
var aParam    = params.get('a') || '';
var sParam    = params.get('s') || '';

// Derive windowStart: 3 weeks ending on the most recent Saturday (same logic as device)
var windowStart = (function() {
  var now = new Date();
  var dow = now.getUTCDay(); // 0=Sun, 6=Sat
  var daysToSat = (6 - dow + 7) % 7;
  var weekEndMs = Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate()) + daysToSat * 86400000;
  return Math.floor(weekEndMs / 1000) - 20 * 86400;
})();

// Parse injected AUCs — fixed 21-slot, 2-char base36 each, no separators
// e.g. &a=003k4h3t000...  zero = no data for that day
var injectedAUCs = {};
if (aParam) {
  if (aParam.indexOf(':') < 0 && aParam.indexOf(',') < 0) {
    // New fixed-width base36 format
    for (var ai = 0; ai * 2 + 2 <= aParam.length; ai++) {
      var val = parseInt(aParam.substring(ai * 2, ai * 2 + 2), 36);
      if (val > 0) injectedAUCs[ai] = val;
    }
  } else {
    // Legacy sparse format fallback
    var aucParts = aParam.split(',');
    for (var ai = 0; ai < aucParts.length; ai++) {
      var kv = aucParts[ai].split(':');
      if (kv.length === 2) {
        injectedAUCs[parseInt(kv[0], 36)] = parseInt(kv[1], 36);
      } else if (kv.length === 1 && kv[0] !== '') {
        injectedAUCs[ai] = parseFloat(kv[0]) || 0;
      }
    }
  }
}

// Parse streaks
var sParts     = sParam ? sParam.split(',') : [];
var currentStreak = sParts.length > 0 ? parseInt(sParts[0], 10) : 0;
var bestStreak    = sParts.length > 1 ? parseInt(sParts[1], 10) : 0;

// Parse days from compact format:
// d = <label>:<m0>:<p0>,<m1>:<p1>|<label>:...|...
var days = [];
var totalDays = 0;
var bestStreak = 0;
var currentStreak = 0;

// Base36 decoder
function fromBase36(s) {
  return parseInt(s, 36);
}

if (dParam) {
  var dayBlocks = dParam.split('|');
  totalDays = dayBlocks.length;

  for (var d = 0; d < dayBlocks.length; d++) {
    var block  = dayBlocks[d];
    var colon1 = block.indexOf(':');
    var label  = colon1 >= 0 ? block.substring(0, colon1) : '?';
    var rest   = colon1 >= 0 ? block.substring(colon1 + 1) : '';

    var epochs = [], vals = [];
    var dayStartEpoch = windowStart + d * 86400;

    // Each measurement is exactly 4 chars: 2 for minutes (base36), 2 for ppm×10 (base36)
    var i = 0;
    while (i + 4 <= rest.length) {
      var minuteOffset = fromBase36(rest.substring(i,   i+2));
      var ppmTimes10   = fromBase36(rest.substring(i+2, i+4));
      var ppm          = ppmTimes10 / 10.0;
      epochs.push(dayStartEpoch + minuteOffset * 60);
      vals.push(ppm);
      i += 4;
    }

    // Use injected AUC if available, otherwise trapezoid approximation
    var auc = 0;
    if (injectedAUCs[d] !== undefined) {
      auc = injectedAUCs[d];
    } else if (epochs.length >= 2) {
      for (var j = 1; j < epochs.length; j++) {
        var dt = (epochs[j] - epochs[j-1]) / 3600;
        auc += 0.5 * (vals[j-1] + vals[j]) * dt;
      }
    }

    days.push({ label: label, epochs: epochs, vals: vals, auc: auc });
  }
}

// Show no-data message if URL has no data
if (!dParam || totalDays === 0) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('scroller').style.display = 'none';
  document.getElementById('no-data').style.display  = 'block';
}

// ─── PPM toggle ──────────────────────────────────────────────────
var showPPM = false;

// Store original (output-scale) data for toggling back
var originalDays = [];
for (var d = 0; d < days.length; d++) {
  originalDays.push({
    label: days[d].label,
    epochs: days[d].epochs.slice(),
    vals: days[d].vals.slice(),
    auc: days[d].auc
  });
}
var originalTargetAUC = targetAUC;

// Inverse of convertPPMtoOutput: output → raw ppm
function outputToPPM(output) {
  if (output <= 10.0) return output / 2.0;
  return 5.0 + (output - 10.0) * 1.5;
}

function applyPPMMode() {
  for (var d = 0; d < days.length; d++) {
    var src = originalDays[d];
    if (showPPM) {
      // Convert vals to raw PPM
      days[d].vals = [];
      for (var i = 0; i < src.vals.length; i++) {
        days[d].vals.push(outputToPPM(src.vals[i]));
      }
      // Recompute AUC via trapezoid from converted values
      if (days[d].epochs.length >= 2) {
        var auc = 0;
        for (var j = 1; j < days[d].epochs.length; j++) {
          var dt = (days[d].epochs[j] - days[d].epochs[j-1]) / 3600;
          auc += 0.5 * (days[d].vals[j-1] + days[d].vals[j]) * dt;
        }
        days[d].auc = auc;
      }
    } else {
      // Restore originals
      days[d].vals = src.vals.slice();
      days[d].auc = src.auc;
    }
  }
  // Approximate target conversion (output scale is ~2× in the common range)
  targetAUC = showPPM ? Math.round(originalTargetAUC / 2) : originalTargetAUC;
}

function togglePPM() {
  showPPM = !showPPM;
  var track = document.getElementById('toggle-track');
  var lblPPM  = document.getElementById('lbl-ppm');
  track.classList.toggle('on', showPPM);
  lblPPM.classList.toggle('active', showPPM);
  applyPPMMode();
  renderCard();
  // Re-render streaks card too
  streakCanvas = buildStreakCard();
  var destS = document.getElementById('card-streaks');
  destS.width = streakCanvas.width; destS.height = streakCanvas.height;
  destS.getContext('2d').drawImage(streakCanvas, 0, 0);
  // Re-render insights card
  insightsCanvas = buildInsightsCard();
  var destI = document.getElementById('card-insights');
  destI.width = insightsCanvas.width; destI.height = insightsCanvas.height;
  destI.getContext('2d').drawImage(insightsCanvas, 0, 0);
}

// ─── Helpers ─────────────────────────────────────────────────────
function roundRect(ctx, x, y, w, h, r) {
  r = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function pill(ctx, cx, cy, w, h, r, bg, fg, label, fs) {
  ctx.fillStyle = bg; roundRect(ctx,cx-w/2,cy-h/2,w,h,r); ctx.fill();
  ctx.fillStyle = fg;
  ctx.font = 'bold '+fs+'px -apple-system,sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, cx, cy+1);
}

function filledDot(ctx, cx, cy, r, color) {
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fillStyle=color; ctx.fill();
}

// ─── ConstrainedSpline helpers (matches device InterpolationLib) ───
// Cache for first derivatives to avoid infinite recursion
var derivCache = {};

function getFirstDerivate(x, y, n, i) {
  var cacheKey = i + '_' + n;
  if (derivCache[cacheKey] !== undefined) {
    return derivCache[cacheKey];
  }
  
  var fd1_x;
  if (i === 0) {
    // Base case: calculate derivative at i=1 first
    var fd1_1;
    if ((x[2] - x[1]) / (y[2] - y[1]) * (x[1] - x[0]) / (y[1] - y[0]) < 0) {
      fd1_1 = 0;
    } else {
      fd1_1 = 2.0 / ((x[2] - x[1]) / (y[2] - y[1]) + (x[1] - x[0]) / (y[1] - y[0]));
    }
    fd1_x = 3.0 / 2.0 * (y[1] - y[0]) / (x[1] - x[0]) - fd1_1 / 2.0;
  }
  else if (i === n) {
    // Base case: calculate derivative at i=n-1 first
    var fd1_nm1;
    if ((x[n] - x[n-1]) / (y[n] - y[n-1]) * (x[n-1] - x[n-2]) / (y[n-1] - y[n-2]) < 0) {
      fd1_nm1 = 0;
    } else {
      fd1_nm1 = 2.0 / ((x[n] - x[n-1]) / (y[n] - y[n-1]) + (x[n-1] - x[n-2]) / (y[n-1] - y[n-2]));
    }
    fd1_x = 3.0 / 2.0 * (y[n] - y[n - 1]) / (x[n] - x[n - 1]) - fd1_nm1 / 2.0;
  }
  else {
    if ((x[i + 1] - x[i]) / (y[i + 1] - y[i]) * (x[i] - x[i - 1]) / (y[i] - y[i - 1]) < 0) {
      fd1_x = 0;
    }
    else {
      fd1_x = 2.0 / ((x[i + 1] - x[i]) / (y[i + 1] - y[i]) + (x[i] - x[i - 1]) / (y[i] - y[i - 1]));
    }
  }
  
  derivCache[cacheKey] = fd1_x;
  return fd1_x;
}

function getLeftSecondDerivate(x, y, n, i) {
  var fdi_x = getFirstDerivate(x, y, n, i);
  var fdi_xl1 = getFirstDerivate(x, y, n, i - 1);
  var fd2l_x = -2.0 * (fdi_x + 2.0 * fdi_xl1) / (x[i] - x[i - 1]);
  fd2l_x += 6.0 * (y[i] - y[i - 1]) / (x[i] - x[i - 1]) / (x[i] - x[i - 1]);
  return fd2l_x;
}

function getRightSecondDerivate(x, y, n, i) {
  var fdi_x = getFirstDerivate(x, y, n, i);
  var fdi_xl1 = getFirstDerivate(x, y, n, i - 1);
  var fd2r_x = 2.0 * (2.0 * fdi_x + fdi_xl1) / (x[i] - x[i - 1]);
  fd2r_x -= 6.0 * (y[i] - y[i - 1]) / (x[i] - x[i - 1]) / (x[i] - x[i - 1]);
  return fd2r_x;
}

function constrainedSpline(xValues, yValues, numValues, pointX) {
  if (pointX <= xValues[0]) return yValues[0];
  if (pointX >= xValues[numValues - 1]) return yValues[numValues - 1];
  
  var i = 0;
  while (pointX >= xValues[i + 1] && i < numValues - 2) i++;
  if (pointX === xValues[i + 1]) return yValues[i + 1];
  
  var x0 = xValues[i + 1];
  var x1 = xValues[i];
  var y0 = yValues[i + 1];
  var y1 = yValues[i];
  
  var fd2i_xl1 = getLeftSecondDerivate(xValues, yValues, numValues - 1, i + 1);
  var fd2i_x = getRightSecondDerivate(xValues, yValues, numValues - 1, i + 1);
  
  var d = (fd2i_x - fd2i_xl1) / (6.0 * (x0 - x1));
  var c = (x0 * fd2i_xl1 - x1 * fd2i_x) / 2.0 / (x0 - x1);
  var b = (y0 - y1 - c * (x0 * x0 - x1 * x1) - d * (x0 * x0 * x0 - x1 * x1 * x1)) / (x0 - x1);
  var a = y1 - b * x1 - c * x1 * x1 - d * x1 * x1 * x1;
  
  var rst = a + pointX * (b + pointX * (c + pointX * d));
  return rst;
}

// ─── Catmull-Rom spline helpers (visual rendering only) ───────────
function catmullRomCP(p0, p1, p2, p3) {
  var t = 0.5;
  return {
    cp1x: p1.x + (p2.x - p0.x) * t / 3,
    cp1y: p1.y + (p2.y - p0.y) * t / 3,
    cp2x: p2.x - (p3.x - p1.x) * t / 3,
    cp2y: p2.y - (p3.y - p1.y) * t / 3
  };
}

function splinePath(ctx, pts, bottomY) {
  if (pts.length < 2) return;
  var p0 = { x: 2*pts[0].x - pts[1].x, y: 2*pts[0].y - pts[1].y };
  var pN = { x: 2*pts[pts.length-1].x - pts[pts.length-2].x,
             y: 2*pts[pts.length-1].y - pts[pts.length-2].y };
  var ext = [p0].concat(pts).concat([pN]);
  if (bottomY !== undefined) {
    ctx.moveTo(pts[0].x, bottomY);
    ctx.lineTo(pts[0].x, pts[0].y);
  } else {
    ctx.moveTo(pts[0].x, pts[0].y);
  }
  for (var i = 0; i < pts.length - 1; i++) {
    var cp = catmullRomCP(ext[i], ext[i+1], ext[i+2], ext[i+3]);
    ctx.bezierCurveTo(cp.cp1x, cp.cp1y, cp.cp2x, cp.cp2y, pts[i+1].x, pts[i+1].y);
  }
}

// ─── Draw a single week row ───────────────────────────────────────
// weekDays: array of 7 day objects from days[]
// dayOffset: index of weekDays[0] within the global days[] array
// gLeft/gRight/gTop/gBottom: pixel bounds for this row's graph area
// maxY: shared y scale maximum
// prevPt/nextPt: last point from previous week / first point from next week
// isLastWeek: true if this is the final row (last QR data point gets no extension)
function drawWeekRow(ctx, weekDays, dayOffset, gLeft, gRight, gTop, gBottom, maxY, todayIdx, prevPt, nextPt, isLastWeek, zoneGrad, viewMode) {
  prevPt = prevPt || null;
  nextPt = nextPt || null;
  isLastWeek = isLastWeek || false;
  var gW = gRight - gLeft;
  var gH = gBottom - gTop;
  var DAYS = weekDays.length;
  var GAP_LIMIT = 24 * 60 * 60; // 24 hours in seconds

  function wx(epoch) {
    var weekStartEpoch = windowStart + dayOffset * 86400;
    return gLeft + ((epoch - weekStartEpoch) / (DAYS * 86400)) * gW;
  }

  function wy(v) {
    return gBottom - (Math.min(Math.max(v, 0), maxY) / maxY) * gH;
  }

  // ── Day bands ──────────────────────────────────────────────────
  var bandW = gW / DAYS;
  for (var d = 0; d < DAYS; d++) {
    var bandX   = gLeft + d * bandW;
    var isToday = (dayOffset + d === todayIdx);
    var label   = weekDays[d].label.toLowerCase();

    if (d % 2 === 1) {
      ctx.fillStyle = 'rgba(255,255,255,0.04)';
      ctx.fillRect(bandX, gTop, bandW, gH);
    }
    if (d > 0) {
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.lineWidth = 0.75;
      ctx.beginPath(); ctx.moveTo(bandX, gTop); ctx.lineTo(bandX, gBottom); ctx.stroke();
    }
    if (isToday) {
      ctx.strokeStyle = 'rgba(245,200,66,0.5)';
      ctx.lineWidth = 2;
      ctx.strokeRect(bandX+0.5, gTop+0.5, bandW-1, gH-1);
    }

    ctx.fillStyle = isToday ? '#f5c842' : 'rgba(255,255,255,0.45)';
    ctx.font = (isToday ? 'bold ' : '') + '10px -apple-system,sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.fillText(label, bandX + bandW/2, gBottom + 3);
  }

  // ── X axis ────────────────────────────────────────────────────
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 0.75;
  ctx.beginPath(); ctx.moveTo(gLeft, gBottom); ctx.lineTo(gRight, gBottom); ctx.stroke();

  // ── Target line ───────────────────────────────────────────────
  if (viewMode === 'stats' && targetAUC > 0) {
    var tPPM = targetAUC / 24;
    if (tPPM <= maxY) {
      ctx.strokeStyle = 'rgba(255,255,255,0.2)';
      ctx.lineWidth = 0.75;
      ctx.setLineDash([4, 3]);
      ctx.beginPath(); ctx.moveTo(gLeft, wy(tPPM)); ctx.lineTo(gRight, wy(tPPM)); ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  // ── Collect points for this week ──────────────────────────────
  var allPts = [];
  for (var d = 0; d < DAYS; d++) {
    for (var i = 0; i < weekDays[d].epochs.length; i++) {
      allPts.push({ epoch: weekDays[d].epochs[i], val: weekDays[d].vals[i], dayIdx: d });
    }
  }
  allPts.sort(function(a,b){ return a.epoch - b.epoch; });

  if (allPts.length > 0) {
    var weekStartEpoch = windowStart + dayOffset * 86400;

    // Split allPts into segments at gaps > 960 minutes
    var segments = [];
    var seg = [allPts[0]];
    for (var i = 1; i < allPts.length; i++) {
      if (allPts[i].epoch - allPts[i-1].epoch > GAP_LIMIT) {
        segments.push(seg);
        seg = [];
      }
      seg.push(allPts[i]);
    }
    segments.push(seg);

    // Helper: build pts array for one segment and draw fill + line
    // Returns pts so dots/labels can use pts[0..N-1] directly
    function drawSegment(segPts, isFirst, isLast) {
      var pts = [];
      var firstEpoch = segPts[0].epoch;
      var lastEpoch  = segPts[segPts.length-1].epoch;

      // fillStartX: where the fill base begins (may be left of first data point)
      var fillStartX;

      // ── Leading point ──────────────────────────────────────────
      if (isFirst && prevPt && (firstEpoch - prevPt.epoch) <= GAP_LIMIT) {
        // Valid Sat→Sun ghost: include in spline pts for natural curvature
        pts.push({ x: wx(prevPt.epoch), y: wy(prevPt.val) });
        fillStartX = wx(prevPt.epoch);
      } else {
        // No valid prev: spline starts at first data point,
        // but fill extends back to midnight of that day
        var firstMidnight = weekStartEpoch + segPts[0].dayIdx * 86400;
        fillStartX = wx(firstMidnight);
      }

      // ── Data points ────────────────────────────────────────────
      for (var j = 0; j < segPts.length; j++) {
        pts.push({ x: wx(segPts[j].epoch), y: wy(segPts[j].val) });
      }

      // fillEndX: where the fill base ends
      var fillEndX;

      // ── Trailing point ─────────────────────────────────────────
      if (isLast && nextPt && (nextPt.epoch - lastEpoch) <= GAP_LIMIT) {
        // Valid Sat→Sun ghost: include in spline pts
        pts.push({ x: wx(nextPt.epoch), y: wy(nextPt.val) });
        fillEndX = wx(nextPt.epoch);
      } else if (isLast && isLastWeek) {
        // Very last point — no extension, fill ends at last data point
        fillEndX = pts[pts.length-1].x;
      } else {
        // Mid-week gap or end of non-final row: trail to next midnight at zero
        var nextMidnight = weekStartEpoch + (segPts[segPts.length-1].dayIdx + 1) * 86400;
        pts.push({ x: wx(nextMidnight), y: wy(0) });
        fillEndX = wx(nextMidnight);
      }

      // ── Draw ───────────────────────────────────────────────────
      var p0  = { x: 2*pts[0].x - pts[1].x, y: 2*pts[0].y - pts[1].y };
      var pN  = { x: 2*pts[pts.length-1].x - pts[pts.length-2].x,
                  y: 2*pts[pts.length-1].y - pts[pts.length-2].y };
      var ext = [p0].concat(pts).concat([pN]);

      // ── Helper: evaluate spline at parameter t (0..pts.length-1) ──
      function evalSpline(t) {
        var i = Math.min(Math.floor(t), pts.length - 2);
        var frac = t - i;
        // Bezier via catmull-rom control points
        var cp = catmullRomCP(ext[i], ext[i+1], ext[i+2], ext[i+3]);
        var mt = 1 - frac;
        var x = mt*mt*mt*pts[i].x + 3*mt*mt*frac*cp.cp1x + 3*mt*frac*frac*cp.cp2x + frac*frac*frac*pts[i+1].x;
        var y = mt*mt*mt*pts[i].y + 3*mt*mt*frac*cp.cp1y + 3*mt*frac*frac*cp.cp2y + frac*frac*frac*pts[i+1].y;
        return { x: x, y: y };
      }

      // ── Sample spline at pixel intervals (time-aware) ────────
      // Sample every pixel from start to end of curve
      var startX = pts[0].x;
      var endX = pts[pts.length-1].x;
      var samples = [];
      for (var px = startX; px <= endX; px += 0.5) {
        // Find which segment this pixel falls into
        var segIdx = -1;
        for (var i = 0; i < pts.length - 1; i++) {
          if (px >= pts[i].x && px <= pts[i+1].x) {
            segIdx = i;
            break;
          }
        }
        
        if (segIdx === -1) continue;
        
        // Calculate fractional position within this segment based on pixel x
        var x0 = pts[segIdx].x;
        var x1 = pts[segIdx + 1].x;
        var frac = (px - x0) / (x1 - x0);
        
        // Evaluate Bezier with catmull-rom control points
        var cp = catmullRomCP(ext[segIdx], ext[segIdx+1], ext[segIdx+2], ext[segIdx+3]);
        var mt = 1 - frac;
        var y = mt*mt*mt*pts[segIdx].y + 3*mt*mt*frac*cp.cp1y + 3*mt*frac*frac*cp.cp2y + frac*frac*frac*pts[segIdx+1].y;
        
        var ppm = (gBottom - y) / (gBottom - gTop) * maxY;
        samples.push({ x: px, y: y, ppm: ppm });
      }

      // ── Zone fill colours ──────────────────────────────────────
      var ZONE_COLORS_FILL   = ['rgba(34,211,238,0.45)',  'rgba(74,222,128,0.4)', 'rgba(168,85,247,0.35)'];
      var ZONE_COLORS_STROKE = ['#22D3EE', '#4ADE80', '#A855F7'];
      var ORANGE_FILL_GRAD = (function() {
        var g = ctx.createLinearGradient(0, gTop, 0, gBottom);
        g.addColorStop(0,   'rgba(255,140,0,0.0)');
        g.addColorStop(0.5, 'rgba(255,140,0,0.22)');
        g.addColorStop(1,   'rgba(255,140,0,0.5)');
        return g;
      })();

      function zoneOf(ppm) {
        var rounded = Math.round(ppm); return rounded <= 2 ? 0 : rounded <= 4 ? 1 : 2;
      }

      if (viewMode === 'zones') {
        // ── Zone-crossing fill ────────────────────────────────────
        // Group samples into runs of the same zone, draw each as a filled shape
        var runs = [];
        var curZone = zoneOf(samples[0].ppm);
        var runStart = 0;
        for (var si2 = 1; si2 < samples.length; si2++) {
          var z = zoneOf(samples[si2].ppm);
          if (z !== curZone) {
            runs.push({ zone: curZone, from: runStart, to: si2 });
            curZone = z; runStart = si2;
          }
        }
        runs.push({ zone: curZone, from: runStart, to: samples.length - 1 });

        for (var ri = 0; ri < runs.length; ri++) {
          var run = runs[ri];
          var s0 = samples[run.from], sN = samples[run.to];

          ctx.fillStyle = ZONE_COLORS_FILL[run.zone];
          ctx.beginPath();
          // Start at baseline under first sample
          var bx0 = (run.from === 0) ? fillStartX : s0.x;
          var bxN = (run.to === samples.length - 1) ? fillEndX : sN.x;
          ctx.moveTo(bx0, gBottom);
          ctx.lineTo(s0.x, s0.y);
          // Trace curve forward through this run
          for (var si2 = run.from + 1; si2 <= run.to; si2++) {
            ctx.lineTo(samples[si2].x, samples[si2].y);
          }
          ctx.lineTo(bxN, gBottom);
          ctx.closePath();
          ctx.fill();
        }

        // ── Stroke line with zone colours ─────────────────────────
        for (var ri = 0; ri < runs.length; ri++) {
          var run = runs[ri];
          ctx.strokeStyle = ZONE_COLORS_STROKE[run.zone];
          ctx.lineWidth = 1.5;
          ctx.lineJoin = 'round'; ctx.lineCap = 'round';
          ctx.beginPath();
          ctx.moveTo(samples[run.from].x, samples[run.from].y);
          for (var si2 = run.from + 1; si2 <= run.to; si2++) {
            ctx.lineTo(samples[si2].x, samples[si2].y);
          }
          ctx.stroke();
        }

      } else {
        // ── Orange fill + stroke (stats view) ─────────────────────
        ctx.fillStyle = ORANGE_FILL_GRAD;
        ctx.beginPath();
        ctx.moveTo(fillStartX, gBottom);
        ctx.lineTo(pts[0].x, pts[0].y);
        for (var k = 0; k < pts.length - 1; k++) {
          var cp = catmullRomCP(ext[k], ext[k+1], ext[k+2], ext[k+3]);
          ctx.bezierCurveTo(cp.cp1x, cp.cp1y, cp.cp2x, cp.cp2y, pts[k+1].x, pts[k+1].y);
        }
        ctx.lineTo(fillEndX, gBottom);
        ctx.closePath(); ctx.fill();

        ctx.strokeStyle = '#FF8C00'; ctx.lineWidth = 1.5;
        ctx.lineJoin = 'round'; ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(pts[0].x, pts[0].y);
        for (var k = 0; k < pts.length - 1; k++) {
          var cp = catmullRomCP(ext[k], ext[k+1], ext[k+2], ext[k+3]);
          ctx.bezierCurveTo(cp.cp1x, cp.cp1y, cp.cp2x, cp.cp2y, pts[k+1].x, pts[k+1].y);
        }
        ctx.stroke();
      }

      return { pts: pts, dataOffset: (isFirst && prevPt && (firstEpoch - prevPt.epoch) <= GAP_LIMIT) ? 1 : 0 };
    }

    // Clip to row bounds so ghost points don't bleed outside
    ctx.save();
    ctx.beginPath();
    ctx.rect(gLeft, gTop, gRight - gLeft, gBottom - gTop);
    ctx.clip();

    var segmentPts = [];
    for (var si = 0; si < segments.length; si++) {
      segmentPts.push(drawSegment(segments[si], si === 0, si === segments.length - 1));
    }

    ctx.restore();

    // ── Dots + labels ─────────────────────────────────────────────
    var dotR = 3, valFS = 12;
    var labels = [];
    ctx.font = 'bold '+valFS+'px -apple-system,sans-serif';
    var PAD_X=2, MAX_SHIFT=gW/DAYS*0.35, ITERS=5;
    var MIN_CX=gLeft+2, MAX_CX=gRight-2;

    var globalI = 0;
    for (var si = 0; si < segments.length; si++) {
      var sPts = segmentPts[si].pts;
      var dOff = segmentPts[si].dataOffset;
      for (var j = 0; j < segments[si].length; j++) {
        var ap = allPts[globalI];
        var px = sPts[j + dOff].x, py = sPts[j + dOff].y;
        var isNewest = (ap.dayIdx + dayOffset === todayIdx) && (globalI === allPts.length - 1);
        var dotRounded = Math.round(ap.val); var dc = dotRounded <= 2 ? '#22D3EE' : dotRounded <= 4 ? '#4ADE80' : '#A855F7';
        var isSelected = selectedDot && selectedDot.epoch === ap.epoch;
        if (isNewest) {
          ctx.globalAlpha=0.3; filledDot(ctx,px,py,dotR*2.2,dc);
          ctx.globalAlpha=1;   filledDot(ctx,px,py,dotR*1.4,dc);
        } else {
          filledDot(ctx,px,py,dotR,dc);
        }
        if (isSelected) {
          ctx.beginPath(); ctx.arc(px, py, dotR*2.8, 0, Math.PI*2);
          ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.stroke();
        }
        dotHits.push({ cx: px, cy: py, val: ap.val, epoch: ap.epoch });

        var dotEdge = isNewest ? dotR*1.4 : dotR;
        var s = showPPM ? ap.val.toFixed(1) : String(Math.round(ap.val));
        var w = ctx.measureText(s).width;
        labels.push({ s:s, baseX:px, x:px, y:py-dotEdge-1, w:w, visible:true, newest:isNewest });
        globalI++;
      }
    }

    for (var pass=0; pass<ITERS; pass++) {
      for (var i=0; i<labels.length-1; i++) {
        var L=labels[i], R=labels[i+1];
        if (!L.visible||!R.visible) continue;
        var Lright=L.x+L.w/2+PAD_X, Rleft=R.x-R.w/2-PAD_X;
        if (Lright<=Rleft) continue;
        var overlap=Lright-Rleft, push=Math.floor(overlap/2)+1;
        var newLX=Math.max(L.x-push,MIN_CX), newRX=Math.min(R.x+push,MAX_CX);
        var Lexc=Math.abs(newLX-L.baseX)>MAX_SHIFT, Rexc=Math.abs(newRX-R.baseX)>MAX_SHIFT;
        if (L.newest) { L.x=L.baseX; if(Rexc)R.visible=false;else R.x=newRX; }
        else if (R.newest) { R.x=R.baseX; if(Lexc)L.visible=false;else L.x=newLX; }
        else {
          if (!Lexc&&!Rexc)     { L.x=newLX; R.x=newRX; }
          else if (Lexc&&!Rexc) { L.visible=false; R.x=R.baseX; }
          else if (!Lexc&&Rexc) { R.visible=false; L.x=L.baseX; }
          else                  { L.visible=false; R.x=R.baseX; }
        }
      }
    }
    ctx.font='bold '+valFS+'px -apple-system,sans-serif';
    ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.textBaseline='bottom';
    var shown = 0;
    for (var i=0; i<labels.length; i++) {
      if (!labels[i].visible) continue;
      if (labels[i].newest) { ctx.fillText(labels[i].s, labels[i].x, labels[i].y); continue; }
      shown++;
      if (shown % 2 === 0) ctx.fillText(labels[i].s, labels[i].x, labels[i].y);
    }
  }

  // ── AUC / heart row below day labels ─────────────────────────
  var aucY    = gBottom + 14 + 18;
  var aucFS   = 18;
  var heartFS = 16;
  for (var d = 0; d < DAYS; d++) {
    var bandX   = gLeft + d * bandW;
    var cx      = bandX + bandW / 2;
    var isToday = (dayOffset + d === todayIdx);
    var auc     = weekDays[d].auc;
    var hit     = targetAUC > 0 && auc >= targetAUC;
    var hasData = auc > 0;
    var heart   = hit ? '\u2665' : '\u2661';
    var aucStr  = hasData ? String(Math.round(auc)) : '\u2014';

    ctx.fillStyle = hit ? '#e53935' : 'rgba(255,255,255,0.25)';
    ctx.font = heartFS + 'px -apple-system,sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(heart, cx, aucY - aucFS * 0.6);

    ctx.fillStyle = isToday ? (hit ? '#FFFF00' : '#FF8C00')
                            : (hit ? '#FFA500' : 'rgba(255,255,255,0.45)');
    ctx.font = (isToday ? 'bold ' : '') + aucFS + 'px -apple-system,sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(aucStr, cx, aucY + heartFS * 0.5);
  }
}

// ─── 3-week graph card ────────────────────────────────────────────
// forcedView: optional 'stats'|'zones' — locks the view and hides tabs
function buildGraphCard(forcedView) {
  var SCALE   = graphScale;
  var CW      = 400;
  var PAD     = 14;
  var PILL_H  = 28;
  var PILL_PAD = 8;
  var WEEKS   = 3;
  var DAYS_PER_WEEK = 7;
  var GRAPH_H = 90;   // height of each week's graph area
  var LABEL_H = 14;   // day letters below each graph
  var AUC_H   = 36;   // heart + AUC number row (doubled)
  var ROW_GAP = 12;   // gap between week rows
  var SUMMARY_GAP = 4; // tighter gap before summary box
  var SUMMARY_H = 60;
  var LABEL_ABOVE_H = 0;
  var FOOTER_H = 14;
  var TAB_ABOVE_H = 17; // folder tab protrudes above summary box

  // Total height: pill + 3 rows of (graph + labels + auc) + gaps between + tabs + summary + footer
  var CH = PAD + PILL_H + PILL_PAD
         + WEEKS * (GRAPH_H + LABEL_H + AUC_H)
         + (WEEKS - 1) * ROW_GAP
         + SUMMARY_GAP + LABEL_ABOVE_H + TAB_ABOVE_H + SUMMARY_H
         + PAD + FOOTER_H;

  var canvas = document.createElement('canvas');
  canvas.width  = CW * SCALE;
  canvas.height = CH * SCALE;
  var ctx = canvas.getContext('2d');
  ctx.scale(SCALE, SCALE);

  // Card background
  ctx.fillStyle = '#111';
  roundRect(ctx, 0, 0, CW, CH, 14); ctx.fill();

  var gLeft  = PAD + 6;
  var gRight = CW - PAD - 4;

  // ── Compute shared y scale across ALL 21 days ─────────────────
  var rawMax = 0;
  for (var d = 0; d < totalDays; d++) {
    for (var i = 0; i < days[d].vals.length; i++) {
      if (days[d].vals[i] > rawMax) rawMax = days[d].vals[i];
    }
  }
  if (rawMax < 4) rawMax = 4;
  var step = rawMax <= 4 ? 0.5 : rawMax <= 8 ? 1 : rawMax <= 15 ? 2 : 5;
  var maxY = Math.ceil(rawMax * 1.15 / step) * step;
  if (maxY < 2) maxY = 2;

  // Today = last day with any measurements
  var todayIdx = 0;
  for (var d = 0; d < totalDays; d++) {
    if (days[d].vals.length > 0) todayIdx = d;
  }

  // ── Zone gradient stop fractions (for zones view fill) ───────
  var activeView = forcedView || summaryView;
  var zoneGrad = null;
  if (activeView === 'zones') {
    var zt = calcZoneTimes();
    var ztTotal = zt.glucose + zt.mixed + zt.fat || 1;
    var s3 = zt.glucose / ztTotal;           // end of cyan / start of green
    var s5 = s3 + zt.mixed / ztTotal;        // end of green / start of violet
    zoneGrad = { s3: s3, s5: s5 };
  }

  // ── Draw 3 week rows ─────────────────────────────────────────
  var rowTop = PAD + PILL_H + PILL_PAD;
  for (var w = 0; w < WEEKS; w++) {
    var dayOffset  = w * DAYS_PER_WEEK;
    var weekDays   = days.slice(dayOffset, dayOffset + DAYS_PER_WEEK);
    var gTop       = rowTop;
    var gBottom    = gTop + GRAPH_H;

    // Last measurement from previous week
    var prevPt = null;
    if (w > 0) {
      for (var pd = w * DAYS_PER_WEEK - 1; pd >= (w-1) * DAYS_PER_WEEK; pd--) {
        if (days[pd] && days[pd].epochs.length > 0) {
          var ei = days[pd].epochs.length - 1;
          prevPt = { epoch: days[pd].epochs[ei], val: days[pd].vals[ei] };
          break;
        }
      }
    }

    // First measurement from next week
    var nextPt = null;
    if (w < WEEKS - 1) {
      for (var nd = (w+1) * DAYS_PER_WEEK; nd < (w+2) * DAYS_PER_WEEK; nd++) {
        if (days[nd] && days[nd].epochs.length > 0) {
          nextPt = { epoch: days[nd].epochs[0], val: days[nd].vals[0] };
          break;
        }
      }
    }

    drawWeekRow(ctx, weekDays, dayOffset, gLeft, gRight, gTop, gBottom, maxY, todayIdx, prevPt, nextPt, w === WEEKS - 1, zoneGrad, activeView);

    rowTop += GRAPH_H + LABEL_H + AUC_H + ROW_GAP;
  }

  // ── Summary stats strip ───────────────────────────────────────
  var TAB_W = 84, TAB_H = 30, TAB_R = 9, TAB_GAP = 4, TAB_FS = 14;
  var tabsAboveH = TAB_H - 3; // tabs protrude this many px above box top
  var summaryY = rowTop + SUMMARY_GAP + tabsAboveH;
  var sumPad = 6;
  var rectY = summaryY;
  var boxX = gLeft - sumPad;
  var boxW = gRight - gLeft + sumPad * 2;
  var colW = (gRight - gLeft) / 3;
  var LABEL_FS = 14;
  var LINE_GAP = 3;
  var VALUE_FS = 26;
  var VALUE_GAP = 4;

  tabHitBoxes = [];
  var tabLabel = forcedView === 'zones' ? 'Fuel' : 'Summary';

  // ── Single always-active tab ──────────────────────────────────
  var tx = boxX + 6;
  var ty = rectY - tabsAboveH;

  // Folder tab shape: rounded top corners, open bottom
  ctx.beginPath();
  ctx.moveTo(tx, rectY + 3);
  ctx.lineTo(tx, ty + TAB_R);
  ctx.quadraticCurveTo(tx, ty, tx + TAB_R, ty);
  ctx.lineTo(tx + TAB_W - TAB_R, ty);
  ctx.quadraticCurveTo(tx + TAB_W, ty, tx + TAB_W, ty + TAB_R);
  ctx.lineTo(tx + TAB_W, rectY + 3);
  ctx.closePath();
  ctx.fillStyle = '#111';
  ctx.fill();

  // Border — top and sides only
  ctx.beginPath();
  ctx.moveTo(tx, rectY + 3);
  ctx.lineTo(tx, ty + TAB_R);
  ctx.quadraticCurveTo(tx, ty, tx + TAB_R, ty);
  ctx.lineTo(tx + TAB_W - TAB_R, ty);
  ctx.quadraticCurveTo(tx + TAB_W, ty, tx + TAB_W, ty + TAB_R);
  ctx.lineTo(tx + TAB_W, rectY + 3);
  ctx.strokeStyle = '#f5c842';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Label
  ctx.fillStyle = '#f5c842';
  ctx.font = 'bold ' + TAB_FS + 'px -apple-system,sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(tabLabel, tx + TAB_W / 2, ty + tabsAboveH / 2);

  // ── Box border ────────────────────────────────────────────────
  ctx.strokeStyle = '#f5c842';
  ctx.lineWidth = 2;
  roundRect(ctx, boxX, rectY, boxW, SUMMARY_H, 10); ctx.stroke();

  // Erase top border behind active tab so it merges cleanly
  ctx.fillStyle = '#111';
  ctx.fillRect(tx + 2, rectY - 1, TAB_W - 4, 4);

  if (activeView === 'stats') {
    // ── Stats view: Range / Avg / Target% ──────────────────────
    var allVals = [], daysWithData = 0, daysOnTarget = 0, totalAUC = 0;
    for (var d = 0; d < totalDays; d++) {
      for (var i = 0; i < days[d].vals.length; i++) allVals.push(days[d].vals[i]);
      if (days[d].vals.length > 0) {
        daysWithData++;
        totalAUC += days[d].auc;
        if (targetAUC > 0 && days[d].auc >= targetAUC) daysOnTarget++;
      }
    }
    var minVal = allVals.length ? Math.min.apply(null, allVals) : 0;
    var maxVal = allVals.length ? Math.max.apply(null, allVals) : 0;
    var avgVal = daysWithData > 0 ? totalAUC / (daysWithData * 24) : 0;
    var pctOnTarget = daysWithData > 0 ? Math.round(daysOnTarget / daysWithData * 100) : 0;

    var fmtVal = function(v) { return showPPM ? v.toFixed(1) : String(Math.round(v)); };
    var sumStats = [
      { label: 'Range',  value: fmtVal(minVal) + '–' + fmtVal(maxVal) },
      { label: 'Avg',    value: showPPM ? avgVal.toFixed(1) : (Math.round(avgVal * 10) / 10).toFixed(1) },
      { label: targetAUC > 0 ? 'Target (' + targetAUC + ')' : 'Target', value: pctOnTarget + '%' }
    ];

    for (var s = 0; s < sumStats.length; s++) {
      var cx = gLeft + colW * s + colW / 2;
      if (s > 0) {
        ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 0.75;
        ctx.beginPath();
        ctx.moveTo(gLeft + colW * s, rectY + 6);
        ctx.lineTo(gLeft + colW * s, rectY + SUMMARY_H - 6);
        ctx.stroke();
      }
      var blockH = LABEL_FS + LINE_GAP + VALUE_GAP + VALUE_FS;
      var blockTop = rectY + (SUMMARY_H - blockH) / 2;
      var labelY = blockTop + LABEL_FS / 2;
      ctx.fillStyle = 'rgba(255,255,255,0.38)';
      ctx.font = LABEL_FS + 'px -apple-system,sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(sumStats[s].label, cx, labelY);
      var lw = ctx.measureText(sumStats[s].label).width;
      var lineY = blockTop + LABEL_FS + LINE_GAP;
      ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 0.75;
      ctx.beginPath();
      ctx.moveTo(cx - lw/2, lineY); ctx.lineTo(cx + lw/2, lineY); ctx.stroke();
      var valueY = lineY + VALUE_GAP + VALUE_FS / 2;
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold ' + VALUE_FS + 'px -apple-system,sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(sumStats[s].value, cx, valueY);
    }

  } else {
    // ── Zones view: Glucose / Mixed / Fat ──────────────────────
    var zt = calcZoneTimes();
    var total = zt.glucose + zt.mixed + zt.fat || 1;

    var zones = [
      { label: 'Glucose', value: Math.round(zt.glucose / total * 100) + '%', color: '#00d4ff', pct: zt.glucose / total },
      { label: 'Mixed',   value: Math.round(zt.mixed   / total * 100) + '%', color: '#4caf82', pct: zt.mixed   / total },
      { label: 'Fat',     value: Math.round(zt.fat     / total * 100) + '%', color: '#a855f7', pct: zt.fat     / total }
    ];

    for (var s = 0; s < zones.length; s++) {
      var z = zones[s];
      var cx = gLeft + colW * s + colW / 2;

      if (s > 0) {
        ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 0.75;
        ctx.beginPath();
        ctx.moveTo(gLeft + colW * s, rectY + 6);
        ctx.lineTo(gLeft + colW * s, rectY + SUMMARY_H - 6);
        ctx.stroke();
      }

      var blockH = LABEL_FS + LINE_GAP + VALUE_GAP + VALUE_FS;
      var blockTop = rectY + (SUMMARY_H - blockH) / 2;
      var labelY = blockTop + LABEL_FS / 2;
      ctx.fillStyle = z.color;
      ctx.font = 'bold ' + LABEL_FS + 'px -apple-system,sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(z.label, cx, labelY);

      var barW = colW * 0.72;
      var barH = 3;
      var barX = cx - barW / 2;
      var lineY = blockTop + LABEL_FS + LINE_GAP;
      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      roundRect(ctx, barX, lineY, barW, barH, 2); ctx.fill();
      ctx.fillStyle = z.color;
      roundRect(ctx, barX, lineY, Math.max(barW * z.pct, 2), barH, 2); ctx.fill();

      var valueY = lineY + VALUE_GAP + VALUE_FS / 2;
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold ' + VALUE_FS + 'px -apple-system,sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(z.value, cx, valueY);
    }
  }

  // ── 3 WEEKS + date range pill ─────────────────────────────────
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function fmtDate(epoch) {
    var d = new Date(epoch * 1000);
    return months[d.getUTCMonth()] + ' ' + d.getUTCDate();
  }
  var rangeStr = fmtDate(windowStart) + ' – ' + fmtDate(windowStart + 20 * 86400);
  var pillW = 220, pillH = PILL_H, pillCY = PAD + pillH / 2;
  var pillLeft = CW/2 - pillW/2, pillRight = CW/2 + pillW/2;
  ctx.fillStyle = '#f5c842';
  roundRect(ctx, pillLeft, PAD, pillW, pillH, pillH/2); ctx.fill();
  ctx.font = 'bold 16px -apple-system,sans-serif';
  var weeksW = ctx.measureText('3 WEEKS').width;
  ctx.font = '15px -apple-system,sans-serif';
  var rangeW = ctx.measureText(rangeStr).width;
  var totalTextW = weeksW + rangeW;
  var textGap = pillW - totalTextW - 20; // 10px padding each side
  var weeksX = pillLeft + 10 + weeksW / 2;
  var sepX   = pillLeft + 10 + weeksW + textGap / 2;
  var rangeX = sepX + textGap / 2 + rangeW / 2;

  ctx.fillStyle = '#1a1a2e';
  ctx.textBaseline = 'middle'; ctx.textAlign = 'center';
  ctx.font = 'bold 16px -apple-system,sans-serif';
  ctx.fillText('3 WEEKS', weeksX, pillCY + 1);
  ctx.fillStyle = 'rgba(26,26,46,0.35)';
  ctx.fillRect(sepX, PAD + 7, 1, pillH - 14);
  ctx.fillStyle = '#1a1a2e';
  ctx.font = '15px -apple-system,sans-serif';
  ctx.fillText(rangeStr, rangeX, pillCY + 1);


  // ── Watermark ─────────────────────────────────────────────────
  ctx.fillStyle = 'rgba(255,255,255,0.07)';
  ctx.font = '9px -apple-system,sans-serif';
  ctx.textAlign = 'right'; ctx.textBaseline = 'alphabetic';
  ctx.fillText('fox2.app', CW - PAD, CH - 4);

  return canvas;
}

// ─── 21-day horizontal AUC bars with zone fills ───────────────────
function buildStreakCard() {
  var SCALE    = 2;
  var CW       = 400;
  var PAD      = 14;
  var PILL_H   = 28;
  var PILL_PAD = 8;
  var DATE_W   = 52;  // Width for date labels
  var BAR_H    = 16;  // Height of each bar
  var BAR_GAP  = 4;   // Gap between bars
  var FOOTER_H = 14;

  // Count days with data
  var daysWithData = 0;
  for (var d = 0; d < totalDays; d++) {
    if (days[d].vals.length > 0) daysWithData++;
  }

  var CH = PAD + PILL_H + PILL_PAD + 8
         + daysWithData * (BAR_H + BAR_GAP)
         + PAD + FOOTER_H;

  var canvas = document.createElement('canvas');
  canvas.width  = CW * SCALE;
  canvas.height = CH * SCALE;
  var ctx = canvas.getContext('2d');
  ctx.scale(SCALE, SCALE);

  ctx.fillStyle = '#111';
  roundRect(ctx, 0, 0, CW, CH, 14); ctx.fill();

  var barLeft  = PAD + DATE_W + 8;
  var barRight = CW - PAD - 4;
  var barW     = barRight - barLeft;

  // Find max AUC for scaling
  var maxAUC = targetAUC > 0 ? targetAUC : 0;
  for (var d = 0; d < totalDays; d++) {
    if (days[d].auc > maxAUC) maxAUC = days[d].auc;
  }
  maxAUC *= 1.05;
  if (maxAUC < 40) maxAUC = 40;

  // Today = last day with data
  var todayIdx = 0;
  for (var d = 0; d < totalDays; d++) {
    if (days[d].vals.length > 0) todayIdx = d;
  }

  // ── Pill title ────────────────────────────────────────────────
  var pillCX = CW / 2;
  var pillCY = PAD + PILL_H / 2;
  var pillW  = 220;
  ctx.fillStyle = '#f5c842';
  roundRect(ctx, pillCX - pillW/2, pillCY - PILL_H/2, pillW, PILL_H, PILL_H/2); ctx.fill();
  ctx.fillStyle = '#1a1a2e';
  ctx.font = 'bold 16px -apple-system,sans-serif';
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText('21 DAYS', pillCX - pillW/2 + 14, pillCY + 1);
  ctx.fillStyle = 'rgba(26,26,46,0.35)';
  ctx.fillRect(pillCX - 1, pillCY - PILL_H/2 + 6, 1, PILL_H - 12);

  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var d0 = new Date(windowStart * 1000);
  var d1 = new Date((windowStart + 20 * 86400) * 1000);
  var dateStr = months[d0.getUTCMonth()] + ' ' + d0.getUTCDate()
              + ' – ' + months[d1.getUTCMonth()] + ' ' + d1.getUTCDate();
  ctx.fillStyle = '#1a1a2e';
  ctx.font = '15px -apple-system,sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText(dateStr, pillCX + pillW/2 - 14, pillCY + 1);

  // ── Horizontal bars ───────────────────────────────────────────
  var barY = PAD + PILL_H + PILL_PAD + 8;
  var barRow = 0;
  var daysOfWeek = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

  for (var d = 0; d < totalDays; d++) {
    var day = days[d];
    if (day.vals.length === 0) continue;  // Skip days without data

    var isToday = (d === todayIdx);
    var auc = day.auc;
    var zoneTimes = day.zoneTimes || { glucose: 0, mixed: 0, fat: 0 };
    var totalMins = zoneTimes.glucose + zoneTimes.mixed + zoneTimes.fat;

    // Date label
    var dateObj = new Date((windowStart + d * 86400) * 1000);
    var dateLabel = months[dateObj.getUTCMonth()].substring(0, 3) + ' ' + dateObj.getUTCDate();
    var dayLabel = daysOfWeek[dateObj.getUTCDay()];
    
    ctx.fillStyle = isToday ? '#f5c842' : 'rgba(255,255,255,0.5)';
    ctx.font = (isToday ? 'bold ' : '') + '11px -apple-system,sans-serif';
    ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
    ctx.fillText(dateLabel, PAD + DATE_W - 2, barY + BAR_H / 2);
    
    // Day of week (smaller, lighter)
    ctx.fillStyle = isToday ? 'rgba(245,200,66,0.6)' : 'rgba(255,255,255,0.3)';
    ctx.font = '9px -apple-system,sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(dayLabel, PAD + DATE_W + 4, barY + BAR_H / 2);

    // Bar dimensions
    var bx = barLeft;
    var by = barY;
    var bw = (auc / maxAUC) * barW;
    var br = Math.min(4, BAR_H / 2);

    // Save context before clipping
    ctx.save();
    
    // Create clipping path with rounded corners
    roundRect(ctx, bx, by, bw, BAR_H, br);
    ctx.clip();

    // Bar background
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.fillRect(bx, by, bw, BAR_H);

    // Zone fills (glucose, mixed, fat)
    if (totalMins > 0) {
      var fillX = bx;
      var glucosePct = zoneTimes.glucose / totalMins;
      var mixedPct = zoneTimes.mixed / totalMins;
      var fatPct = zoneTimes.fat / totalMins;

      // Glucose (cyan)
      if (glucosePct > 0) {
        var glucoseW = bw * glucosePct;
        ctx.fillStyle = '#22D3EE';
        ctx.fillRect(fillX, by, glucoseW, BAR_H);
        fillX += glucoseW;
      }

      // Mixed (green)
      if (mixedPct > 0) {
        var mixedW = bw * mixedPct;
        ctx.fillStyle = '#4ADE80';
        ctx.fillRect(fillX, by, mixedW, BAR_H);
        fillX += mixedW;
      }

      // Fat (violet)
      if (fatPct > 0) {
        var fatW = bw * fatPct;
        ctx.fillStyle = '#A855F7';
        ctx.fillRect(fillX, by, fatW, BAR_H);
      }
    }
    
    // Dim overlay for bars that haven't hit target
    var hitTarget = targetAUC > 0 && auc >= targetAUC;
    if (!hitTarget) {
      ctx.fillStyle = 'rgba(0,0,0,0.45)';
      ctx.fillRect(bx, by, bw, BAR_H);
    }

    // AUC value inside bar at the end
    var aucText = Math.round(auc).toString();
    ctx.font = 'bold 11px -apple-system,sans-serif';
    var aucWidth = ctx.measureText(aucText).width;
    
    // Only show if there's enough room (at least 20px)
    if (bw > aucWidth + 8) {
      ctx.fillStyle = hitTarget ? 'rgba(255,255,255,0.9)' : 'rgba(255,255,255,0.35)';
      ctx.textAlign = 'right';
      ctx.textBaseline = 'middle';
      ctx.fillText(aucText, bx + bw - 4, by + BAR_H / 2);
    }
    
    // Restore context (removes clipping)
    ctx.restore();

    // Today highlight border
    if (isToday) {
      ctx.strokeStyle = '#f5c842';
      ctx.lineWidth = 2;
      roundRect(ctx, bx, by, bw, BAR_H, br); ctx.stroke();
    }

    barY += BAR_H + BAR_GAP;
    barRow++;
  }

  // ── Target line ───────────────────────────────────────────────
  if (targetAUC > 0 && targetAUC <= maxAUC) {
    var tx = barLeft + (targetAUC / maxAUC) * barW;
    var lineTop    = PAD + PILL_H + PILL_PAD + 8;
    var lineBottom = barY - BAR_GAP;
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([3, 4]);
    ctx.beginPath();
    ctx.moveTo(tx, lineTop);
    ctx.lineTo(tx, lineBottom);
    ctx.stroke();
    ctx.setLineDash([]);
    // Label at bottom
    var labelText = String(targetAUC);
    ctx.font = '10px -apple-system,sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.textBaseline = 'top';
    var lw = ctx.measureText(labelText).width;
    var lx = Math.min(tx - lw / 2, barRight - lw);
    lx = Math.max(lx, barLeft);
    ctx.fillText(labelText, lx, lineBottom + 3);
    ctx.restore();
  }


  // ── Watermark ─────────────────────────────────────────────────
  ctx.fillStyle = 'rgba(255,255,255,0.07)';
  ctx.font = '9px -apple-system,sans-serif';
  ctx.textAlign = 'right'; ctx.textBaseline = 'alphabetic';
  ctx.fillText('fox2.app', CW - PAD, CH - 4);

  return canvas;
}

// ─── Insights card ───────────────────────────────────────────────
function wrapText(ctx, text, x, y, maxW, lineH) {
  var words = text.split(' ');
  var line = '';
  for (var i = 0; i < words.length; i++) {
    var test = line ? line + ' ' + words[i] : words[i];
    if (ctx.measureText(test).width > maxW && line) {
      ctx.fillText(line, x, y);
      y += lineH;
      line = words[i];
    } else {
      line = test;
    }
  }
  if (line) { ctx.fillText(line, x, y); y += lineH; }
  return y;
}

function buildInsightsCard() {
  var SCALE = 2;
  var CW = 400;
  var PAD = 14;
  var PILL_H = 28;
  var PILL_PAD = 8;
  var SECTION_GAP = 12;
  var BOX_PAD = 12;
  var BOX_R = 10;
  var SECTION_TITLE_FS = 15;
  var SECTION_TITLE_H = 26;
  var SHAPE_ROW_H = 38;
  var FOOTER_H = 14;

  var gLeft  = PAD + BOX_PAD;
  var gRight = CW - PAD - BOX_PAD;
  var gW     = gRight - gLeft;

  // ── Gather base data ────────────────────────────────────────────
  var todayIdx = 0;
  for (var d = 0; d < totalDays; d++) {
    if (days[d].vals.length > 0) todayIdx = d;
  }
  var daysWithData = 0;
  for (var d = 0; d < totalDays; d++) {
    if (days[d].vals.length > 0) daysWithData++;
  }

  // ── 3-day rolling average bars ───────────────────────────────────
  // 7 bars evenly spaced ending at todayIdx, each a 3-day window avg.
  var NUM_BARS = 7;
  var MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var momBars = [];
  for (var b = 0; b < NUM_BARS; b++) {
    var centerDay = Math.round((todayIdx / (NUM_BARS - 1)) * b);
    var winStart  = Math.max(0, centerDay - 1);
    var winEnd    = Math.min(totalDays - 1, centerDay + 1);
    var winAUC = 0, winDays = 0;
    for (var d = winStart; d <= winEnd; d++) {
      if (days[d].vals.length > 0) { winAUC += days[d].auc; winDays++; }
    }
    var d0 = new Date((windowStart + winStart * 86400) * 1000);
    var d1 = new Date((windowStart + winEnd   * 86400) * 1000);
    var rangeLabel = MONTHS_SHORT[d0.getUTCMonth()] + ' ' + d0.getUTCDate()
                   + '–' + d1.getUTCDate();
    momBars.push({
      avg:        winDays > 0 ? winAUC / winDays : 0,
      rangeLabel: rangeLabel,
      startDay:   d0.getUTCDate(),
      endDay:     d1.getUTCDate(),
      startMonth: d0.getUTCMonth(),
      isLatest:   b === NUM_BARS - 1
    });
  }

  // Verdict via linear regression slope across all 7 bar values.
  var lrXsum = 0, lrYsum = 0, lrXXsum = 0, lrXYsum = 0, lrN = 0;
  for (var b = 0; b < NUM_BARS; b++) {
    if (momBars[b].avg > 0) {
      lrXsum += b; lrYsum += momBars[b].avg;
      lrXXsum += b * b; lrXYsum += b * momBars[b].avg;
      lrN++;
    }
  }
  var lrSlope = null;
  if (lrN >= 2) {
    var denom = lrN * lrXXsum - lrXsum * lrXsum;
    if (denom !== 0) lrSlope = (lrN * lrXYsum - lrXsum * lrYsum) / denom;
  }
  var lrMean = lrN > 0 ? lrYsum / lrN : 0;
  var momentumPct = (lrSlope !== null && lrMean > 0)
    ? Math.round((lrSlope / lrMean) * 100) : null;
  var momentumVerdict;
  if (momentumPct === null)    momentumVerdict = 'Not enough data yet';
  else if (momentumPct >= 5)   momentumVerdict = 'Increasing';
  else if (momentumPct <= -5)  momentumVerdict = 'Dropping';
  else                         momentumVerdict = 'Holding steady';

  // ── Personal bests ──────────────────────────────────────────────
  var bestDayAUC = 0, bestDayIdx = -1, bestReading = 0;
  for (var d = 0; d < totalDays; d++) {
    if (days[d].auc > bestDayAUC) { bestDayAUC = days[d].auc; bestDayIdx = d; }
    for (var i = 0; i < days[d].vals.length; i++) {
      if (days[d].vals[i] > bestReading) bestReading = days[d].vals[i];
    }
  }
  var bestStreak = 0, curStreak = 0;
  for (var d = 0; d < totalDays; d++) {
    if (targetAUC > 0 && days[d].auc >= targetAUC) {
      curStreak++; if (curStreak > bestStreak) bestStreak = curStreak;
    } else if (days[d].vals.length > 0) { curStreak = 0; }
  }

  // ── Section heights ─────────────────────────────────────────────
  var MOM_CHART_H  = 80;
  var MOM_LABEL_H  = 22;
  var MOM_SUBTITLE_H = 16;
  var MOM_VALUE_H  = 0;
  var MOM_BAR_H    = MOM_CHART_H;
  var MOM_VERDICT_H = 28;
  var MOMENTUM_H  = SECTION_TITLE_H + MOM_SUBTITLE_H + MOM_CHART_H + MOM_LABEL_H + 8 + MOM_VERDICT_H;

  var SHAPE_SECTION_H = SECTION_TITLE_H + (window.showPatternDetail ? Math.min(daysWithData, 21) : 4) * SHAPE_ROW_H + 8;

  var PATTERN_DESC_FS = 13;
  var PATTERN_SUGG_FS = 13;
  var PATTERN_BLOCK_H = 18 + 4 + PATTERN_DESC_FS * 2 + 4 + PATTERN_SUGG_FS * 2 + 10;
  var PATTERN_GAP = 28;
  var PATTERN_INSIGHTS_H = PATTERN_BLOCK_H * 2 + PATTERN_GAP;

  var FT_BAR_H    = 18;
  var FT_LABEL_FS = 15;
  var FT_SUMMARY_FS = 15;
  var FT_WK_H     = FT_BAR_H + 9 + FT_LABEL_FS + 8 + FT_SUMMARY_FS + 15 + 21;
  var FUELTIME_H  = SECTION_TITLE_H + 3 * FT_WK_H;

  var BOX_INNER_PAD = BOX_PAD * 2;
  var CH = PAD
         + MOMENTUM_H + BOX_INNER_PAD + SECTION_GAP
         + SHAPE_SECTION_H + PATTERN_INSIGHTS_H + BOX_INNER_PAD + SECTION_GAP
         + FUELTIME_H + BOX_INNER_PAD
         + PAD + FOOTER_H + 200; // buffer for wrapped text overflow

  var canvas = document.createElement('canvas');
  canvas.width  = CW * SCALE;
  canvas.height = CH * SCALE;
  var ctx = canvas.getContext('2d');
  ctx.scale(SCALE, SCALE);

  ctx.fillStyle = '#111';
  roundRect(ctx, 0, 0, CW, CH, 14); ctx.fill();

  var curY = PAD;

  var sectionCount = 0;
  function drawSectionTitle(y, text) {
    sectionCount++;
    ctx.fillStyle = '#fff';
    ctx.font = 'bold ' + SECTION_TITLE_FS + 'px -apple-system,sans-serif';
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.fillText(text, gLeft, y);
    return y + SECTION_TITLE_H;
  }

  function drawBox(y, h) {
    ctx.fillStyle = 'rgba(255,255,255,0.04)';
    roundRect(ctx, PAD, y, CW - PAD * 2, h, BOX_R); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 0.75;
    roundRect(ctx, PAD, y, CW - PAD * 2, h, BOX_R); ctx.stroke();
  }

  // ════════════════════════════════════════════════════════════════
  // SECTION 1: Momentum
  // ════════════════════════════════════════════════════════════════
  var momBoxY = curY;
  curY += BOX_PAD;
  curY = drawSectionTitle(curY, 'Momentum');
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '12px -apple-system,sans-serif';
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText('3-day avg score, rolling across your 21-day window', gLeft, curY - 10);

  var NUM_BARS_RENDER = momBars.length;
  var BAR_GAP  = 4;
  var barW     = (gW - BAR_GAP * (NUM_BARS_RENDER - 1)) / NUM_BARS_RENDER;
  var chartTop = curY + MOM_SUBTITLE_H;
  var baseline = chartTop + MOM_CHART_H;
  var maxAvg   = 0;
  for (var b = 0; b < NUM_BARS_RENDER; b++) if (momBars[b].avg > maxAvg) maxAvg = momBars[b].avg;
  if (maxAvg < 1) maxAvg = 1;

  var barCentres = [];
  for (var b = 0; b < NUM_BARS_RENDER; b++) {
    var bx     = gLeft + b * (barW + BAR_GAP);
    var bar    = momBars[b];
    var fillH  = bar.avg > 0 ? Math.max((bar.avg / maxAvg) * MOM_CHART_H * 0.88, 6) : 0;
    var barTop = baseline - fillH;
    var alpha  = 0.15 + (b / (NUM_BARS_RENDER - 1)) * 0.55;

    ctx.fillStyle = 'rgba(255,255,255,0.05)';
    roundRect(ctx, bx, chartTop, barW, MOM_CHART_H, 3); ctx.fill();

    if (fillH > 0) {
      ctx.fillStyle = bar.isLatest ? 'rgba(245,200,66,0.45)' : 'rgba(255,255,255,' + alpha.toFixed(2) + ')';
      roundRect(ctx, bx, barTop, barW, fillH, 3); ctx.fill();
    }

    if (fillH >= 16 && bar.avg > 0) {
      ctx.fillStyle = bar.isLatest ? 'rgba(245,200,66,1)' : 'rgba(255,255,255,0.85)';
      ctx.font = 'bold 12px -apple-system,sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(Math.round(bar.avg), bx + barW / 2, barTop + fillH / 2);
    }

    var showMonth = b === 0 || momBars[b].startMonth !== momBars[b - 1].startMonth;
    var line1 = (showMonth ? MONTHS_SHORT[bar.startMonth] + ' ' : '') + bar.startDay + '–' + bar.endDay;
    ctx.fillStyle = bar.isLatest ? 'rgba(245,200,66,0.8)' : 'rgba(255,255,255,0.28)';
    ctx.font = (bar.isLatest ? 'bold ' : '') + '16px -apple-system,sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.fillText(line1, bx + barW / 2, baseline + 3);

    barCentres.push({ x: bx + barW / 2, y: bar.avg > 0 ? barTop + fillH / 2 : null });
  }

  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 0.75;
  ctx.beginPath(); ctx.moveTo(gLeft, baseline); ctx.lineTo(gRight, baseline); ctx.stroke();

  if (lrSlope !== null) {
    var lrIntercept = (lrYsum - lrSlope * lrXsum) / lrN;
    var trendPts = [];
    for (var b = 0; b < NUM_BARS_RENDER; b++) {
      var fitted = lrIntercept + lrSlope * b;
      var ty = baseline - Math.max(0, Math.min((fitted / maxAvg) * MOM_CHART_H * 0.88, MOM_CHART_H));
      trendPts.push({ x: barCentres[b].x, y: ty });
    }
    ctx.save();
    ctx.strokeStyle = lrSlope > 0 ? 'rgba(74,222,128,0.6)' : lrSlope < 0 ? 'rgba(239,68,68,0.5)' : 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([3, 3]);
    ctx.beginPath();
    ctx.moveTo(trendPts[0].x, trendPts[0].y);
    for (var b = 1; b < trendPts.length; b++) ctx.lineTo(trendPts[b].x, trendPts[b].y);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }

  curY += MOM_SUBTITLE_H + MOM_CHART_H + MOM_LABEL_H + 8;

  // Verdict
  var verdictIcon = momentumVerdict === 'Increasing' ? '↑' : momentumVerdict === 'Dropping' ? '↓' : '→';
  var verdictColor = momentumVerdict === 'Increasing' ? '#4ADE80' : momentumVerdict === 'Dropping' ? '#f87171' : 'rgba(255,255,255,0.75)';
  var verdictStr = verdictIcon + '  ' + momentumVerdict;
  if (momentumPct !== null) verdictStr += '  (' + (momentumPct >= 0 ? '+' : '') + momentumPct + '% / period)';
  ctx.fillStyle = verdictColor;
  ctx.font = 'bold 17px -apple-system,sans-serif';
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText(verdictStr, gLeft, curY);
  curY += MOM_VERDICT_H + BOX_PAD;
  drawBox(momBoxY, curY - momBoxY - BOX_PAD);
  curY += SECTION_GAP;

  // ════════════════════════════════════════════════════════════════
  // SECTION 2: Daily Patterns
  // ════════════════════════════════════════════════════════════════
  var patBoxY = curY;
  curY += BOX_PAD;
  curY = drawSectionTitle(curY, 'Daily Patterns');

  var SHAPE_COLORS = {
    'Rising': '#4ADE80', 'Falling': '#22D3EE', 'Peak': '#A855F7',
    'Valley': '#f5c842', 'Flat': 'rgba(255,255,255,0.4)', 'Single': 'rgba(255,255,255,0.25)'
  };
  var SHAPE_ICONS = { 'Rising': '↗', 'Falling': '↘', 'Peak': '⌃', 'Valley': '⌄', 'Flat': '→', 'Single': '·' };

  function classifyDay(dayIdx) {
    var dayStart = windowStart + dayIdx * 86400;
    var pts = days[dayIdx].epochs, vals = days[dayIdx].vals;
    if (pts.length === 0) return null;
    var xVals = [], yVals = [];
    var firstMinute = (pts[0] - dayStart) / 60;
    if (firstMinute > 0) {
      var lastPrev = null;
      for (var di = dayIdx - 1; di >= 0; di--) {
        if (days[di].epochs.length > 0) {
          var li = days[di].epochs.length - 1;
          lastPrev = { epoch: days[di].epochs[li], val: days[di].vals[li] };
          break;
        }
      }
      var midV;
      if (lastPrev && (dayStart - lastPrev.epoch) <= 1440 * 60) {
        var prevMin = (lastPrev.epoch - dayStart) / 60;
        var slope = (vals[0] - lastPrev.val) / (firstMinute - prevMin);
        midV = Math.max(0, Math.min(30, vals[0] - slope * firstMinute));
      } else { midV = vals[0]; }
      xVals.push(0); yVals.push(midV);
    }
    for (var i = 0; i < pts.length; i++) {
      xVals.push((pts[i] - dayStart) / 60); yVals.push(vals[i]);
    }
    if (xVals.length < 2) return 'Single';
    derivCache = {};
    var sampledVals = [], lastMin = Math.min(xVals[xVals.length - 1], 1440);
    for (var minute = 0; minute <= lastMin; minute += 120) {
      var ppm = constrainedSpline(xVals, yVals, xVals.length, minute);
      if (!isNaN(ppm)) sampledVals.push(Math.max(0, ppm));
    }
    if (sampledVals.length === 0) return null;
    if (sampledVals.length === 1) return 'Single';
    if (sampledVals.length === 2) {
      var diff = sampledVals[1] - sampledVals[0];
      return Math.abs(diff) < 1.5 ? 'Flat' : diff > 0 ? 'Rising' : 'Falling';
    }
    var first = sampledVals[0], last = sampledVals[sampledVals.length - 1];
    var maxVal = sampledVals[0], minVal = sampledVals[0], maxI = 0, minI = 0;
    for (var i = 1; i < sampledVals.length; i++) {
      if (sampledVals[i] > maxVal) { maxVal = sampledVals[i]; maxI = i; }
      if (sampledVals[i] < minVal) { minVal = sampledVals[i]; minI = i; }
    }
    var range = maxVal - minVal;
    if (range < 1.5) return 'Flat';
    if (maxI > 0 && maxI < sampledVals.length - 1 && (maxVal - first) > range * 0.3 && (maxVal - last) > range * 0.3) return 'Peak';
    if (minI > 0 && minI < sampledVals.length - 1 && (first - minVal) > range * 0.3 && (last - minVal) > range * 0.3) return 'Valley';
    var netDiff = last - first;
    if (netDiff > range * 0.2) return 'Rising';
    if (netDiff < -range * 0.2) return 'Falling';
    return 'Flat';
  }

  var patternCounts = {}, patternExamples = {}, dailyPatterns = [], totalPatterned = 0;
  for (var d = 0; d < totalDays; d++) {
    if (days[d].vals.length === 0) continue;
    var shape = classifyDay(d); totalPatterned++;
    dailyPatterns.push({ dayIdx: d, shape: shape });
    if (!patternCounts[shape]) { patternCounts[shape] = 0; patternExamples[shape] = d; }
    patternCounts[shape]++;
  }
  var patternList = [];
  for (var p in patternCounts) patternList.push({ pattern: p, count: patternCounts[p], example: patternExamples[p] });
  patternList.sort(function(a, b) { return b.count - a.count; });

  var dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var months   = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  // Toggle button
  var btnW = 80, btnH = 24;
  var btnX = gRight - btnW, btnY = curY - SECTION_TITLE_H + (SECTION_TITLE_H - btnH) / 2;
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  roundRect(ctx, btnX, btnY, btnW, btnH, btnH / 2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = '15px -apple-system,sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(window.showPatternDetail ? 'Summary' : 'Show All', btnX + btnW / 2, btnY + btnH / 2);
  window.patternToggleHitbox = { x: btnX * SCALE, y: btnY * SCALE, w: btnW * SCALE, h: btnH * SCALE };
  if (window.showPatternDetail === undefined) window.showPatternDetail = false;

  function sparkPts(d, sparkLeft, sparkW, sparkBot, sparkH) {
    var dayStart = windowStart + d * 86400;
    var epochs = days[d].epochs, vals = days[d].vals;
    var firstMinute = (epochs[0] - dayStart) / 60;
    var midnightVal;
    if (firstMinute > 0) {
      var lastPrev = null;
      for (var di = d - 1; di >= 0; di--) {
        if (days[di].epochs.length > 0) {
          var li = days[di].epochs.length - 1;
          lastPrev = { epoch: days[di].epochs[li], val: days[di].vals[li] };
          break;
        }
      }
      if (lastPrev && (dayStart - lastPrev.epoch) <= 1440 * 60) {
        var prevMin = (lastPrev.epoch - dayStart) / 60;
        var slope = (vals[0] - lastPrev.val) / (firstMinute - prevMin);
        midnightVal = Math.max(0, Math.min(30, vals[0] - slope * firstMinute));
      } else { midnightVal = vals[0]; }
    } else { midnightVal = vals[0]; }
    var allEpochs = [dayStart].concat(epochs), allVals = [midnightVal].concat(vals);
    var vMin = allVals[0], vMax = allVals[0];
    for (var i = 1; i < allVals.length; i++) {
      if (allVals[i] < vMin) vMin = allVals[i];
      if (allVals[i] > vMax) vMax = allVals[i];
    }
    var vRange = vMax - vMin; if (vRange < 1) vRange = 1;
    var pts = [];
    for (var i = 0; i < allEpochs.length; i++) {
      var mx = (allEpochs[i] - dayStart) / 86400;
      pts.push({ x: sparkLeft + mx * sparkW, y: sparkBot - ((allVals[i] - vMin) / vRange) * sparkH, isMidnight: i === 0 });
    }
    return pts;
  }

  function drawSparkline(d, sparkLeft, sparkRight, ry, shapeColor) {
    var sparkW = sparkRight - sparkLeft;
    var sparkH = SHAPE_ROW_H - 10;
    var sparkMid = ry + SHAPE_ROW_H / 2;
    var sparkBot = sparkMid + sparkH / 2;
    if (days[d].vals.length >= 1) {
      var sPts = sparkPts(d, sparkLeft, sparkW, sparkBot, sparkH);
      ctx.strokeStyle = shapeColor; ctx.lineWidth = 1.5;
      ctx.lineJoin = 'round'; ctx.lineCap = 'round';
      ctx.beginPath();
      for (var i = 0; i < sPts.length; i++) {
        if (i === 0) ctx.moveTo(sPts[i].x, sPts[i].y); else ctx.lineTo(sPts[i].x, sPts[i].y);
      }
      ctx.stroke();
      for (var i = 0; i < sPts.length; i++) {
        if (sPts[i].isMidnight) continue;
        ctx.beginPath(); ctx.arc(sPts[i].x, sPts[i].y, 2.5, 0, Math.PI * 2);
        ctx.fillStyle = shapeColor; ctx.fill();
      }
    } else {
      ctx.beginPath(); ctx.arc(sparkLeft + sparkW / 2, sparkMid, 3, 0, Math.PI * 2);
      ctx.fillStyle = shapeColor; ctx.fill();
    }
  }

  if (window.showPatternDetail) {
    for (var pi = 0; pi < dailyPatterns.length; pi++) {
      var pData = dailyPatterns[pi], d = pData.dayIdx, shape = pData.shape;
      var ry = curY + pi * SHAPE_ROW_H;
      var shapeColor = SHAPE_COLORS[shape] || '#fff';
      var epochD = new Date((windowStart + d * 86400) * 1000);
      var dateLabel = dayNames[epochD.getUTCDay()] + ' ' + months[epochD.getUTCMonth()] + ' ' + epochD.getUTCDate();
      ctx.fillStyle = 'rgba(255,255,255,0.55)'; ctx.font = '15px -apple-system,sans-serif';
      ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      ctx.fillText(dateLabel, gLeft, ry + SHAPE_ROW_H / 2);
      drawSparkline(d, gLeft + 96, gRight - 88, ry, '#4ADE80');
      ctx.fillStyle = '#fff'; ctx.font = 'bold 15px -apple-system,sans-serif';
      ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
      ctx.fillText(SHAPE_ICONS[shape] + ' ' + shape, gRight, ry + SHAPE_ROW_H / 2);
      if (pi > 0) {
        ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 0.5;
        ctx.beginPath(); ctx.moveTo(gLeft, ry); ctx.lineTo(gRight, ry); ctx.stroke();
      }
    }
    curY += dailyPatterns.length * SHAPE_ROW_H + 8 + SECTION_GAP;
  } else {
    // Show top 3 patterns + "Other" for the rest
    var TOP_N = 3;
    var displayList = patternList.slice(0, TOP_N);
    var otherCount = 0;
    for (var pi = TOP_N; pi < patternList.length; pi++) otherCount += patternList[pi].count;
    if (otherCount > 0) displayList.push({ pattern: 'Other', count: otherCount, example: -1 });

    for (var pi = 0; pi < displayList.length; pi++) {
      var pInfo = displayList[pi], shape = pInfo.pattern, d = pInfo.example;
      var pct = Math.round((pInfo.count / totalPatterned) * 100);
      var ry = curY + pi * SHAPE_ROW_H;
      var shapeColor = shape === 'Other' ? 'rgba(255,255,255,0.35)' : (SHAPE_COLORS[shape] || '#fff');
      ctx.fillStyle = 'rgba(255,255,255,0.65)'; ctx.font = 'bold 15px -apple-system,sans-serif';
      ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      ctx.fillText(pct + '%', gLeft, ry + SHAPE_ROW_H / 2);
      if (shape !== 'Other') {
        drawSparkline(d, gLeft + 52, gRight - 88, ry, '#4ADE80');
      }
      ctx.fillStyle = '#fff'; ctx.font = 'bold 15px -apple-system,sans-serif';
      ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
      ctx.fillText((SHAPE_ICONS[shape] || '·') + ' ' + shape, gRight, ry + SHAPE_ROW_H / 2);
      if (pi > 0) {
        ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 0.5;
        ctx.beginPath(); ctx.moveTo(gLeft, ry); ctx.lineTo(gRight, ry); ctx.stroke();
      }
    }
    curY += displayList.length * SHAPE_ROW_H + 8 + SECTION_GAP;
  }

  // ════════════════════════════════════════════════════════════════
  // SECTION 3: Pattern Insights
  // ════════════════════════════════════════════════════════════════

  var PATTERN_DESCRIPTIONS = {
    'Falling': 'Starts elevated from overnight fat-burning, then eases off as your body releases glucose to get you going in the morning.',
    'Valley':  'Starts elevated from overnight fat-burning, dips as your body releases glucose after waking, then climbs back up as that glucose gets used up. A really positive pattern — it shows your body switching cleanly back into fat-burning through the day.',
    'Peak':    'Fat-burning builds through the day and then comes back down, possibly from eating or evening activity.',
    'Rising':  'Fat-burning deepens steadily as the day goes on and glucose gets used up without being replaced.',
    'Flat':    'Readings stay similar all day. Whether that\'s good or not depends on the level — high and flat means you\'re consistently burning fat, low and flat suggests glucose is staying elevated throughout the day.',
    'Single':  'Only one reading for the day, so no pattern can be determined.'
  };
  var PATTERN_SUGGESTIONS = {
    'Falling': 'Not coming back up before bed may mean carbs or calories at lunch are keeping glucose elevated. Try eating lighter at lunch or pushing it later in the day, or this might reflect not measuring late enough in the day.',
    'Valley':  'Reducing carbs in the morning can help the recovery climb higher and faster through the day.',
    'Peak':    'If the peak is earlier in the day, extending your fast or staying active afterward could help sustain it longer.',
    'Rising':  'Already trending in the right direction. Eating earlier or reducing carbs or calories at dinner would likely push your morning reading even higher.',
    'Flat':    'Reducing carbs, particularly at breakfast and lunch, would likely start shifting this pattern.',
    'Single':  'Try to measure at least twice a day — once on waking and once in the evening — to start seeing your pattern emerge.'
  };

  var insightPatterns = [];
  for (var pi = 0; pi < patternList.length && insightPatterns.length < 2; pi++) {
    if (patternList[pi].pattern !== 'Single' || patternList.length === 1) {
      insightPatterns.push(patternList[pi]);
    }
  }

  for (var pi = 0; pi < insightPatterns.length; pi++) {
    var shape = insightPatterns[pi].pattern;
    var pct   = Math.round((insightPatterns[pi].count / totalPatterned) * 100);
    var shapeColor = SHAPE_COLORS[shape] || 'rgba(255,255,255,0.4)';
    var desc  = PATTERN_DESCRIPTIONS[shape] || '';
    var sugg  = PATTERN_SUGGESTIONS[shape]  || '';

    if (pi > 0) curY += PATTERN_GAP;

    ctx.fillStyle = '#fff';
    ctx.font = 'bold 15px -apple-system,sans-serif';
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.fillText((SHAPE_ICONS[shape] || '·') + '  ' + shape + '  ' + pct + '%', gLeft, curY);
    curY += 20;

    ctx.fillStyle = 'rgba(255,255,255,0.38)';
    ctx.font = PATTERN_DESC_FS + 'px -apple-system,sans-serif';
    curY = wrapText(ctx, desc, gLeft, curY, gW, PATTERN_DESC_FS + 3);

    curY += 4;
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.font = PATTERN_SUGG_FS + 'px -apple-system,sans-serif';
    curY = wrapText(ctx, sugg, gLeft, curY, gW, PATTERN_SUGG_FS + 3);

    if (pi === 0 && insightPatterns.length > 1) {
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.lineWidth = 0.75;
      ctx.beginPath();
      ctx.moveTo(gLeft, curY + PATTERN_GAP / 2);
      ctx.lineTo(gRight, curY + PATTERN_GAP / 2);
      ctx.stroke();
    }
  }
  curY += BOX_PAD;
  drawBox(patBoxY, curY - patBoxY);
  curY += SECTION_GAP;

  // ════════════════════════════════════════════════════════════════
  // SECTION 4: Weekly Fuel Breakdown
  // ════════════════════════════════════════════════════════════════
  var fuelBoxY = curY;
  curY += BOX_PAD;
  curY = drawSectionTitle(curY, 'Fuel Balance');

  function weekZoneTimes(w) {
    var glucose = 0, mixed = 0, fat = 0;
    for (var d = w * 7; d < (w + 1) * 7 && d < totalDays; d++) {
      if (days[d].zoneTimes) {
        glucose += days[d].zoneTimes.glucose;
        mixed   += days[d].zoneTimes.mixed;
        fat     += days[d].zoneTimes.fat;
      }
    }
    return { glucose: glucose, mixed: mixed, fat: fat };
  }

  function fuelSummary(fatPct) {
    if (fatPct < 0.1)  return 'Little fat burning detected';
    if (fatPct < 0.25) return 'Mostly glucose-burning, brief fat windows';
    if (fatPct < 0.5)  return 'Building fat-burning consistency';
    if (fatPct < 0.7)  return 'Spending most measured time in fat zone';
    return 'Strong fat burner — glucose spikes are brief';
  }

  function drawStackedBar(x, y, w, h, glucose, mixed, fat, r) {
    var total = glucose + mixed + fat || 1;
    var zones = [
      { pct: glucose / total, color: '#22D3EE' },
      { pct: mixed   / total, color: '#4ADE80' },
      { pct: fat     / total, color: '#A855F7' }
    ];
    // Background
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    roundRect(ctx, x, y, w, h, r); ctx.fill();

    var bx = x, drawnFirst = false;
    for (var z = 0; z < zones.length; z++) {
      var segW = zones[z].pct * w;
      if (segW < 1) continue;
      var isFirst = !drawnFirst;
      var remaining = 0;
      for (var zz = z + 1; zz < zones.length; zz++) remaining += zones[zz].pct * w;
      var isLast = remaining < 1;
      ctx.fillStyle = zones[z].color;
      ctx.globalAlpha = 0.8;
      if (isFirst && isLast) {
        roundRect(ctx, bx, y, segW, h, r); ctx.fill();
      } else if (isFirst) {
        roundRect(ctx, bx, y, segW, h, r); ctx.fill();
        ctx.fillRect(bx + segW - r, y, r, h);
      } else if (isLast) {
        roundRect(ctx, bx, y, segW, h, r); ctx.fill();
        ctx.fillRect(bx, y, r, h);
      } else {
        ctx.fillRect(bx, y, segW, h);
      }
      ctx.globalAlpha = 1;
      drawnFirst = true;
      bx += segW;
    }
    return zones;
  }

  var wkNames = ['Week 1', 'Week 2', 'Week 3'];
  for (var w = 0; w < 3; w++) {
    var wzt = weekZoneTimes(w);
    var total = wzt.glucose + wzt.mixed + wzt.fat;
    var hasData = total > 0;
    var fatPct = hasData ? wzt.fat / total : 0;

    // Week label
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.font = '15px -apple-system,sans-serif';
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.fillText(wkNames[w], gLeft, curY);

    // Fat % right-aligned
    if (hasData) {
      ctx.fillStyle = '#A855F7';
      ctx.font = 'bold 15px -apple-system,sans-serif';
      ctx.textAlign = 'right'; ctx.textBaseline = 'top';
      ctx.fillText(Math.round(fatPct * 100) + '% fat', gRight, curY);
    }
    curY += 21;

    // Stacked bar
    if (hasData) {
      var zones = drawStackedBar(gLeft, curY, gW, FT_BAR_H, wzt.glucose, wzt.mixed, wzt.fat, 5);

      // Pct labels below segments
      var lx = gLeft;
      curY += FT_BAR_H + 6;
      for (var z = 0; z < zones.length; z++) {
        var segW = zones[z].pct * gW;
        if (segW < 20) { lx += segW; continue; }
        var ZONE_NAMES = ['Glucose', 'Mixed', 'Fat'];
        ctx.fillStyle = zones[z].color;
        ctx.font = FT_LABEL_FS + 'px -apple-system,sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'top';
        ctx.fillText(Math.round(zones[z].pct * 100) + '%', lx + segW / 2, curY);
        lx += segW;
      }
      curY += FT_LABEL_FS + 8;
    } else {
      ctx.fillStyle = 'rgba(255,255,255,0.06)';
      roundRect(ctx, gLeft, curY, gW, FT_BAR_H, 5); ctx.fill();
      curY += FT_BAR_H + FT_LABEL_FS + 14;
    }

    // Summary sentence
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.font = 'italic ' + FT_SUMMARY_FS + 'px -apple-system,sans-serif';
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.fillText(hasData ? fuelSummary(fatPct) : 'No data this week', gLeft, curY);
    curY += FT_SUMMARY_FS + 15;
  }

  drawBox(fuelBoxY, curY - fuelBoxY + BOX_PAD);

  // ── Watermark ─────────────────────────────────────────────────
  ctx.fillStyle = 'rgba(255,255,255,0.07)';
  ctx.font = '9px -apple-system,sans-serif';
  ctx.textAlign = 'right'; ctx.textBaseline = 'alphabetic';
  ctx.fillText('fox2.app', CW - PAD, CH - 4);

  return canvas;
}


function shareInsights() {
  if (!insightsCanvas) return;
  doShare(insightsCanvas);
}

// ─── Render + share ───────────────────────────────────────────────
var graphCanvas, fuelCanvas, streakCanvas, insightsCanvas;
var graphDotHits = [], fuelDotHits = [];
var dotHits = graphDotHits; // legacy alias used inside buildGraphCard
var dotHits = [];
var selectedDot = null;
var graphScale = 2;
var summaryView = 'stats'; // 'stats' | 'zones'
var tabHitBoxes = []; // [{view, x, y, w, h}] in logical (pre-scale) canvas coords

function setSummaryView(v) {
  summaryView = v;
  renderCard();
}

// ── Zone time calculation ─────────────────────────────────────────
// Matches device behavior (drawKetoneGraphToSprite_zones):
//   - Uses ConstrainedSpline interpolation (exact device algorithm)
