<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="color-scheme" content="dark">
<title>FOX2 Results</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  background: #0a0a0a;
  font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  color: #fff;
}
.scroll-y {
  display: flex;
  flex-direction: column;
  width: 100vw;
  min-height: 100dvh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.scroll-y::-webkit-scrollbar { display: none; }
.page {
  width: 100vw;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 16px;
  padding-bottom: 26px;
}
.card-wrap { width: 100%; max-width: 420px; }
.card-wrap canvas {
  width: 100%; height: auto;
  border-radius: 14px; display: block;
}
.share-btn {
  display: flex; align-items: center; gap: 7px;
  padding: 10px 24px;
  border-radius: 22px;
  border: none;
  background: #00d4ff;
  color: #1a1a2e;
  font: bold 14px -apple-system, sans-serif;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.share-btn:active { opacity: 0.75; }
.btn-row { display: flex; gap: 10px; margin-top: 2px; }
.guide-btn {
  display: flex; align-items: center; gap: 7px;
  padding: 10px 20px;
  border-radius: 22px;
  border: 2px solid rgba(255,255,255,0.25);
  background: transparent;
  color: #fff;
  font: bold 14px -apple-system, sans-serif;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  text-decoration: none;
}
.guide-btn:active { opacity: 0.75; }
.ppm-toggle {
  position: absolute; top: 19px; left: 10px;
  display: flex; align-items: center; gap: 6px;
  z-index: 5;
}
.ppm-toggle label {
  font-size: 11px; color: rgba(255,255,255,0.5);
  font-weight: 600; letter-spacing: 0.3px;
  cursor: pointer; user-select: none; -webkit-user-select: none;
}
.ppm-toggle label.active { color: #f5c842; }
.toggle-track {
  width: 34px; height: 18px;
  background: rgba(255,255,255,0.15);
  border-radius: 9px;
  position: relative;
  cursor: pointer;
  transition: background 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.toggle-track.on { background: rgba(245,200,66,0.4); }
.toggle-thumb {
  width: 14px; height: 14px;
  background: #888;
  border-radius: 50%;
  position: absolute; top: 2px; left: 2px;
  transition: transform 0.2s, background 0.2s;
}
.toggle-track.on .toggle-thumb {
  transform: translateX(16px);
  background: #f5c842;
}
#no-data {
  display: none;
  text-align: center;
  color: rgba(255,255,255,0.4);
  font-size: 14px;
  padding: 40px 20px;
  line-height: 1.6;
}
#loading {
  position: fixed; inset: 0;
  background: #000;
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
}
#loading-inner { display: flex; flex-direction: column; align-items: center; gap: 16px; }
#loading-spinner {
  width: 36px; height: 36px;
  border: 3px solid rgba(255,255,255,0.15);
  border-top-color: #f5c842;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
#loading-text { color: rgba(255,255,255,0.4); font-size: 13px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="scroll-y" id="scroller">
  <div class="page">
    <div class="card-wrap" style="position:relative;">
      <div class="ppm-toggle" id="ppm-toggle">
        <div class="toggle-track" id="toggle-track" onclick="togglePPM()">
          <div class="toggle-thumb"></div>
        </div>
        <label id="lbl-ppm">PPM</label>
      </div>
      <canvas id="card-graph" style="cursor:pointer;"></canvas>
      <div id="dot-popup" style="display:none;position:absolute;background:rgba(20,20,35,0.95);border:1px solid rgba(255,255,255,0.2);border-radius:8px;padding:6px 10px;pointer-events:none;z-index:10;white-space:nowrap;">
        <div id="dot-popup-val" style="font-size:15px;font-weight:700;color:#fff;text-align:center;"></div>
        <div id="dot-popup-time" style="font-size:11px;color:rgba(255,255,255,0.5);text-align:center;margin-top:2px;"></div>
      </div>
    </div>
    <div class="btn-row">
    <button class="share-btn" id="btn-share" onclick="shareGraph()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M8 1v9M4 4l4-3 4 3M3 10v4h10v-4" stroke="#1a1a2e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Share
    </button>
    <button class="guide-btn" onclick="window.open('https://tvratto.github.io/Fox2/','_blank')">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <circle cx="8" cy="8" r="7" stroke="#fff" stroke-width="1.8"/>
        <path d="M8 7v5" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
        <circle cx="8" cy="4.5" r="0.9" fill="#fff"/>
      </svg>
      Guide
    </button>
    </div>
  </div>
  <div class="page">
    <div class="card-wrap"><canvas id="card-streaks"></canvas></div>
    <div class="btn-row">
    <button class="share-btn" onclick="shareStreaks()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M8 1v9M4 4l4-3 4 3M3 10v4h10v-4" stroke="#1a1a2e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Share
    </button>
    <button class="guide-btn" onclick="window.open('https://tvratto.github.io/Fox2/','_blank')">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <circle cx="8" cy="8" r="7" stroke="#fff" stroke-width="1.8"/>
        <path d="M8 7v5" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
        <circle cx="8" cy="4.5" r="0.9" fill="#fff"/>
      </svg>
      Guide
    </button>
    </div>
  </div>
  <div class="page">
    <div class="card-wrap"><canvas id="card-insights"></canvas></div>
    <div class="btn-row">
    <button class="share-btn" onclick="shareInsights()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M8 1v9M4 4l4-3 4 3M3 10v4h10v-4" stroke="#1a1a2e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Share
    </button>
    <button class="guide-btn" onclick="window.open('https://tvratto.github.io/Fox2/','_blank')">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <circle cx="8" cy="8" r="7" stroke="#fff" stroke-width="1.8"/>
        <path d="M8 7v5" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
        <circle cx="8" cy="4.5" r="0.9" fill="#fff"/>
      </svg>
      Guide
    </button>
    </div>
  </div>

</div>

<div id="loading">
  <div id="loading-inner">
    <div id="loading-spinner"></div>
    <div id="loading-text">Loading results…</div>
  </div>
</div>

<div id="no-data">
  <p>No FOX2 data found.</p>
  <p style="margin-top:8px;font-size:12px">Scan the QR code on your FOX2 device to view your results.</p>
</div>

<script>

// ─── Parse URL params ─────────────────────────────────────────────
var params    = new URLSearchParams(window.location.search);
var targetAUC = parseInt(params.get('t') || '0', 36);  // base36 encoded
var dParam    = params.get('d') || '';
var aParam    = params.get('a') || '';
var sParam    = params.get('s') || '';

// Derive windowStart: 3 weeks ending on the most recent Saturday (same logic as device)
var windowStart = (function() {
  var now = new Date();
  var dow = now.getUTCDay(); // 0=Sun, 6=Sat
  var daysToSat = (6 - dow + 7) % 7;
  var weekEndMs = Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate()) + daysToSat * 86400000;
  return Math.floor(weekEndMs / 1000) - 20 * 86400;
})();

// Parse injected AUCs — fixed 21-slot, 2-char base36 each, no separators
// e.g. &a=003k4h3t000...  zero = no data for that day
var injectedAUCs = {};
if (aParam) {
  if (aParam.indexOf(':') < 0 && aParam.indexOf(',') < 0) {
    // New fixed-width base36 format
    for (var ai = 0; ai * 2 + 2 <= aParam.length; ai++) {
      var val = parseInt(aParam.substring(ai * 2, ai * 2 + 2), 36);
      if (val > 0) injectedAUCs[ai] = val;
    }
  } else {
    // Legacy sparse format fallback
    var aucParts = aParam.split(',');
    for (var ai = 0; ai < aucParts.length; ai++) {
      var kv = aucParts[ai].split(':');
      if (kv.length === 2) {
        injectedAUCs[parseInt(kv[0], 36)] = parseInt(kv[1], 36);
      } else if (kv.length === 1 && kv[0] !== '') {
        injectedAUCs[ai] = parseFloat(kv[0]) || 0;
      }
    }
  }
}

// Parse streaks
var sParts     = sParam ? sParam.split(',') : [];
var currentStreak = sParts.length > 0 ? parseInt(sParts[0], 10) : 0;
var bestStreak    = sParts.length > 1 ? parseInt(sParts[1], 10) : 0;

// Parse days from compact format:
// d = <label>:<m0>:<p0>,<m1>:<p1>|<label>:...|...
var days = [];
var totalDays = 0;
var bestStreak = 0;
var currentStreak = 0;

// Base36 decoder
function fromBase36(s) {
  return parseInt(s, 36);
}

if (dParam) {
  var dayBlocks = dParam.split('|');
  totalDays = dayBlocks.length;

  for (var d = 0; d < dayBlocks.length; d++) {
    var block  = dayBlocks[d];
    var colon1 = block.indexOf(':');
    var label  = colon1 >= 0 ? block.substring(0, colon1) : '?';
    var rest   = colon1 >= 0 ? block.substring(colon1 + 1) : '';

    var epochs = [], vals = [];
    var dayStartEpoch = windowStart + d * 86400;

    // Each measurement is exactly 4 chars: 2 for minutes (base36), 2 for ppm×10 (base36)
    var i = 0;
    while (i + 4 <= rest.length) {
      var minuteOffset = fromBase36(rest.substring(i,   i+2));
      var ppmTimes10   = fromBase36(rest.substring(i+2, i+4));
      var ppm          = ppmTimes10 / 10.0;
      epochs.push(dayStartEpoch + minuteOffset * 60);
      vals.push(ppm);
      i += 4;
    }

    // Use injected AUC if available, otherwise trapezoid approximation
    var auc = 0;
    if (injectedAUCs[d] !== undefined) {
      auc = injectedAUCs[d];
    } else if (epochs.length >= 2) {
      for (var j = 1; j < epochs.length; j++) {
        var dt = (epochs[j] - epochs[j-1]) / 3600;
        auc += 0.5 * (vals[j-1] + vals[j]) * dt;
      }
    }

    days.push({ label: label, epochs: epochs, vals: vals, auc: auc });
  }
}

// Calculate zone times for each day
calcAllDayZoneTimes();

// Show no-data message if URL has no data
if (!dParam || totalDays === 0) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('scroller').style.display = 'none';
  document.getElementById('no-data').style.display  = 'block';
}

// ─── PPM toggle ──────────────────────────────────────────────────
var showPPM = false;

// Store original (output-scale) data for toggling back
var originalDays = [];
for (var d = 0; d < days.length; d++) {
  originalDays.push({
    label: days[d].label,
    epochs: days[d].epochs.slice(),
    vals: days[d].vals.slice(),
    auc: days[d].auc
  });
}
var originalTargetAUC = targetAUC;

// Inverse of convertPPMtoOutput: output → raw ppm
function outputToPPM(output) {
  if (output <= 10.0) return output / 2.0;
  return 5.0 + (output - 10.0) * 1.5;
}

function applyPPMMode() {
  for (var d = 0; d < days.length; d++) {
    var src = originalDays[d];
    if (showPPM) {
      // Convert vals to raw PPM
      days[d].vals = [];
      for (var i = 0; i < src.vals.length; i++) {
        days[d].vals.push(outputToPPM(src.vals[i]));
      }
      // Recompute AUC via trapezoid from converted values
      if (days[d].epochs.length >= 2) {
        var auc = 0;
        for (var j = 1; j < days[d].epochs.length; j++) {
          var dt = (days[d].epochs[j] - days[d].epochs[j-1]) / 3600;
          auc += 0.5 * (days[d].vals[j-1] + days[d].vals[j]) * dt;
        }
        days[d].auc = auc;
      }
    } else {
      // Restore originals
      days[d].vals = src.vals.slice();
      days[d].auc = src.auc;
    }
  }
  // Approximate target conversion (output scale is ~2× in the common range)
  targetAUC = showPPM ? Math.round(originalTargetAUC / 2) : originalTargetAUC;
}

function togglePPM() {
  showPPM = !showPPM;
  var track = document.getElementById('toggle-track');
  var lblPPM  = document.getElementById('lbl-ppm');
  track.classList.toggle('on', showPPM);
  lblPPM.classList.toggle('active', showPPM);
  applyPPMMode();
  renderCard();
  // Re-render streaks card too
  streakCanvas = buildStreakCard();
  var destS = document.getElementById('card-streaks');
  destS.width = streakCanvas.width; destS.height = streakCanvas.height;
  destS.getContext('2d').drawImage(streakCanvas, 0, 0);
  // Re-render insights card
  insightsCanvas = buildInsightsCard();
  var destI = document.getElementById('card-insights');
  destI.width = insightsCanvas.width; destI.height = insightsCanvas.height;
  destI.getContext('2d').drawImage(insightsCanvas, 0, 0);
}

// ─── Helpers ─────────────────────────────────────────────────────
function roundRect(ctx, x, y, w, h, r) {
  r = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function pill(ctx, cx, cy, w, h, r, bg, fg, label, fs) {
  ctx.fillStyle = bg; roundRect(ctx,cx-w/2,cy-h/2,w,h,r); ctx.fill();
  ctx.fillStyle = fg;
  ctx.font = 'bold '+fs+'px -apple-system,sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, cx, cy+1);
}

function filledDot(ctx, cx, cy, r, color) {
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fillStyle=color; ctx.fill();
}

// ─── ConstrainedSpline helpers (matches device InterpolationLib) ───
// Cache for first derivatives to avoid infinite recursion
var derivCache = {};

function getFirstDerivate(x, y, n, i) {
  var cacheKey = i + '_' + n;
  if (derivCache[cacheKey] !== undefined) {
    return derivCache[cacheKey];
  }
  
  var fd1_x;
  if (i === 0) {
    // Base case: calculate derivative at i=1 first
    var fd1_1;
    if ((x[2] - x[1]) / (y[2] - y[1]) * (x[1] - x[0]) / (y[1] - y[0]) < 0) {
      fd1_1 = 0;
    } else {
      fd1_1 = 2.0 / ((x[2] - x[1]) / (y[2] - y[1]) + (x[1] - x[0]) / (y[1] - y[0]));
    }
    fd1_x = 3.0 / 2.0 * (y[1] - y[0]) / (x[1] - x[0]) - fd1_1 / 2.0;
  }
  else if (i === n) {
    // Base case: calculate derivative at i=n-1 first
    var fd1_nm1;
    if ((x[n] - x[n-1]) / (y[n] - y[n-1]) * (x[n-1] - x[n-2]) / (y[n-1] - y[n-2]) < 0) {
      fd1_nm1 = 0;
    } else {
      fd1_nm1 = 2.0 / ((x[n] - x[n-1]) / (y[n] - y[n-1]) + (x[n-1] - x[n-2]) / (y[n-1] - y[n-2]));
    }
    fd1_x = 3.0 / 2.0 * (y[n] - y[n - 1]) / (x[n] - x[n - 1]) - fd1_nm1 / 2.0;
  }
  else {
    if ((x[i + 1] - x[i]) / (y[i + 1] - y[i]) * (x[i] - x[i - 1]) / (y[i] - y[i - 1]) < 0) {
      fd1_x = 0;
    }
    else {
      fd1_x = 2.0 / ((x[i + 1] - x[i]) / (y[i + 1] - y[i]) + (x[i] - x[i - 1]) / (y[i] - y[i - 1]));
    }
  }
  
  derivCache[cacheKey] = fd1_x;
  return fd1_x;
}

function getLeftSecondDerivate(x, y, n, i) {
  var fdi_x = getFirstDerivate(x, y, n, i);
  var fdi_xl1 = getFirstDerivate(x, y, n, i - 1);
  var fd2l_x = -2.0 * (fdi_x + 2.0 * fdi_xl1) / (x[i] - x[i - 1]);
  fd2l_x += 6.0 * (y[i] - y[i - 1]) / (x[i] - x[i - 1]) / (x[i] - x[i - 1]);
  return fd2l_x;
}

function getRightSecondDerivate(x, y, n, i) {
  var fdi_x = getFirstDerivate(x, y, n, i);
  var fdi_xl1 = getFirstDerivate(x, y, n, i - 1);
  var fd2r_x = 2.0 * (2.0 * fdi_x + fdi_xl1) / (x[i] - x[i - 1]);
  fd2r_x -= 6.0 * (y[i] - y[i - 1]) / (x[i] - x[i - 1]) / (x[i] - x[i - 1]);
  return fd2r_x;
}

function constrainedSpline(xValues, yValues, numValues, pointX) {
  if (pointX <= xValues[0]) return yValues[0];
  if (pointX >= xValues[numValues - 1]) return yValues[numValues - 1];
  
  var i = 0;
  while (pointX >= xValues[i + 1] && i < numValues - 2) i++;
  if (pointX === xValues[i + 1]) return yValues[i + 1];
  
  var x0 = xValues[i + 1];
  var x1 = xValues[i];
  var y0 = yValues[i + 1];
  var y1 = yValues[i];
  
  var fd2i_xl1 = getLeftSecondDerivate(xValues, yValues, numValues - 1, i + 1);
  var fd2i_x = getRightSecondDerivate(xValues, yValues, numValues - 1, i + 1);
  
  var d = (fd2i_x - fd2i_xl1) / (6.0 * (x0 - x1));
  var c = (x0 * fd2i_xl1 - x1 * fd2i_x) / 2.0 / (x0 - x1);
  var b = (y0 - y1 - c * (x0 * x0 - x1 * x1) - d * (x0 * x0 * x0 - x1 * x1 * x1)) / (x0 - x1);
  var a = y1 - b * x1 - c * x1 * x1 - d * x1 * x1 * x1;
  
  var rst = a + pointX * (b + pointX * (c + pointX * d));
  return rst;
}

// ─── Catmull-Rom spline helpers (visual rendering only) ───────────
function catmullRomCP(p0, p1, p2, p3) {
  var t = 0.5;
  return {
    cp1x: p1.x + (p2.x - p0.x) * t / 3,
    cp1y: p1.y + (p2.y - p0.y) * t / 3,
    cp2x: p2.x - (p3.x - p1.x) * t / 3,
    cp2y: p2.y - (p3.y - p1.y) * t / 3
  };
}

function splinePath(ctx, pts, bottomY) {
  if (pts.length < 2) return;
  var p0 = { x: 2*pts[0].x - pts[1].x, y: 2*pts[0].y - pts[1].y };
  var pN = { x: 2*pts[pts.length-1].x - pts[pts.length-2].x,
             y: 2*pts[pts.length-1].y - pts[pts.length-2].y };
  var ext = [p0].concat(pts).concat([pN]);
  if (bottomY !== undefined) {
    ctx.moveTo(pts[0].x, bottomY);
    ctx.lineTo(pts[0].x, pts[0].y);
  } else {
    ctx.moveTo(pts[0].x, pts[0].y);
  }
  for (var i = 0; i < pts.length - 1; i++) {
    var cp = catmullRomCP(ext[i], ext[i+1], ext[i+2], ext[i+3]);
    ctx.bezierCurveTo(cp.cp1x, cp.cp1y, cp.cp2x, cp.cp2y, pts[i+1].x, pts[i+1].y);
  }
}

// ─── Draw a single week row ───────────────────────────────────────
// weekDays: array of 7 day objects from days[]
// dayOffset: index of weekDays[0] within the global days[] array
// gLeft/gRight/gTop/gBottom: pixel bounds for this row's graph area
// maxY: shared y scale maximum
// prevPt/nextPt: last point from previous week / first point from next week
// isLastWeek: true if this is the final row (last QR data point gets no extension)
function drawWeekRow(ctx, weekDays, dayOffset, gLeft, gRight, gTop, gBottom, maxY, todayIdx, prevPt, nextPt, isLastWeek, zoneGrad) {
  prevPt = prevPt || null;
  nextPt = nextPt || null;
  isLastWeek = isLastWeek || false;
  var gW = gRight - gLeft;
  var gH = gBottom - gTop;
  var DAYS = weekDays.length;
  var GAP_LIMIT = 24 * 60 * 60; // 24 hours in seconds

  function wx(epoch) {
    var weekStartEpoch = windowStart + dayOffset * 86400;
    return gLeft + ((epoch - weekStartEpoch) / (DAYS * 86400)) * gW;
  }

  function wy(v) {
    return gBottom - (Math.min(Math.max(v, 0), maxY) / maxY) * gH;
  }

  // ── Day bands ──────────────────────────────────────────────────
  var bandW = gW / DAYS;
  for (var d = 0; d < DAYS; d++) {
    var bandX   = gLeft + d * bandW;
    var isToday = (dayOffset + d === todayIdx);
    var label   = weekDays[d].label.toLowerCase();

    if (d % 2 === 1) {
      ctx.fillStyle = 'rgba(255,255,255,0.04)';
      ctx.fillRect(bandX, gTop, bandW, gH);
    }
    if (d > 0) {
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.lineWidth = 0.75;
      ctx.beginPath(); ctx.moveTo(bandX, gTop); ctx.lineTo(bandX, gBottom); ctx.stroke();
    }
    if (isToday) {
      ctx.strokeStyle = 'rgba(245,200,66,0.5)';
      ctx.lineWidth = 2;
      ctx.strokeRect(bandX+0.5, gTop+0.5, bandW-1, gH-1);
    }

    ctx.fillStyle = isToday ? '#f5c842' : 'rgba(255,255,255,0.45)';
    ctx.font = (isToday ? 'bold ' : '') + '10px -apple-system,sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.fillText(label, bandX + bandW/2, gBottom + 3);
  }

  // ── X axis ────────────────────────────────────────────────────
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 0.75;
  ctx.beginPath(); ctx.moveTo(gLeft, gBottom); ctx.lineTo(gRight, gBottom); ctx.stroke();

  // ── Target line ───────────────────────────────────────────────
  if (summaryView === 'stats' && targetAUC > 0) {
    var tPPM = targetAUC / 24;
    if (tPPM <= maxY) {
      ctx.strokeStyle = 'rgba(255,255,255,0.2)';
      ctx.lineWidth = 0.75;
      ctx.setLineDash([4, 3]);
      ctx.beginPath(); ctx.moveTo(gLeft, wy(tPPM)); ctx.lineTo(gRight, wy(tPPM)); ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  // ── Collect points for this week ──────────────────────────────
  var allPts = [];
  for (var d = 0; d < DAYS; d++) {
    for (var i = 0; i < weekDays[d].epochs.length; i++) {
      allPts.push({ epoch: weekDays[d].epochs[i], val: weekDays[d].vals[i], dayIdx: d });
    }
  }
  allPts.sort(function(a,b){ return a.epoch - b.epoch; });

  if (allPts.length > 0) {
    var weekStartEpoch = windowStart + dayOffset * 86400;

    // Split allPts into segments at gaps > 960 minutes
    var segments = [];
    var seg = [allPts[0]];
    for (var i = 1; i < allPts.length; i++) {
      if (allPts[i].epoch - allPts[i-1].epoch > GAP_LIMIT) {
        segments.push(seg);
        seg = [];
      }
      seg.push(allPts[i]);
    }
    segments.push(seg);

    // Helper: build pts array for one segment and draw fill + line
    // Returns pts so dots/labels can use pts[0..N-1] directly
    function drawSegment(segPts, isFirst, isLast) {
      var pts = [];
      var firstEpoch = segPts[0].epoch;
      var lastEpoch  = segPts[segPts.length-1].epoch;

      // fillStartX: where the fill base begins (may be left of first data point)
      var fillStartX;

      // ── Leading point ──────────────────────────────────────────
      if (isFirst && prevPt && (firstEpoch - prevPt.epoch) <= GAP_LIMIT) {
        // Valid Sat→Sun ghost: include in spline pts for natural curvature
        pts.push({ x: wx(prevPt.epoch), y: wy(prevPt.val) });
        fillStartX = wx(prevPt.epoch);
      } else {
        // No valid prev: spline starts at first data point,
        // but fill extends back to midnight of that day
        var firstMidnight = weekStartEpoch + segPts[0].dayIdx * 86400;
        fillStartX = wx(firstMidnight);
      }

      // ── Data points ────────────────────────────────────────────
      for (var j = 0; j < segPts.length; j++) {
        pts.push({ x: wx(segPts[j].epoch), y: wy(segPts[j].val) });
      }

      // fillEndX: where the fill base ends
      var fillEndX;

      // ── Trailing point ─────────────────────────────────────────
      if (isLast && nextPt && (nextPt.epoch - lastEpoch) <= GAP_LIMIT) {
        // Valid Sat→Sun ghost: include in spline pts
        pts.push({ x: wx(nextPt.epoch), y: wy(nextPt.val) });
        fillEndX = wx(nextPt.epoch);
      } else if (isLast && isLastWeek) {
        // Very last point — no extension, fill ends at last data point
        fillEndX = pts[pts.length-1].x;
      } else {
        // Mid-week gap or end of non-final row: trail to next midnight at zero
        var nextMidnight = weekStartEpoch + (segPts[segPts.length-1].dayIdx + 1) * 86400;
        pts.push({ x: wx(nextMidnight), y: wy(0) });
        fillEndX = wx(nextMidnight);
      }

      // ── Draw ───────────────────────────────────────────────────
      var p0  = { x: 2*pts[0].x - pts[1].x, y: 2*pts[0].y - pts[1].y };
      var pN  = { x: 2*pts[pts.length-1].x - pts[pts.length-2].x,
                  y: 2*pts[pts.length-1].y - pts[pts.length-2].y };
      var ext = [p0].concat(pts).concat([pN]);

      // ── Helper: evaluate spline at parameter t (0..pts.length-1) ──
      function evalSpline(t) {
        var i = Math.min(Math.floor(t), pts.length - 2);
        var frac = t - i;
        // Bezier via catmull-rom control points
        var cp = catmullRomCP(ext[i], ext[i+1], ext[i+2], ext[i+3]);
        var mt = 1 - frac;
        var x = mt*mt*mt*pts[i].x + 3*mt*mt*frac*cp.cp1x + 3*mt*frac*frac*cp.cp2x + frac*frac*frac*pts[i+1].x;
        var y = mt*mt*mt*pts[i].y + 3*mt*mt*frac*cp.cp1y + 3*mt*frac*frac*cp.cp2y + frac*frac*frac*pts[i+1].y;
        return { x: x, y: y };
      }

      // ── Sample spline at pixel intervals (time-aware) ────────
      // Sample every pixel from start to end of curve
      var startX = pts[0].x;
      var endX = pts[pts.length-1].x;
      var samples = [];
      for (var px = startX; px <= endX; px += 0.5) {
        // Find which segment this pixel falls into
        var segIdx = -1;
        for (var i = 0; i < pts.length - 1; i++) {
          if (px >= pts[i].x && px <= pts[i+1].x) {
            segIdx = i;
            break;
          }
        }
        
        if (segIdx === -1) continue;
        
        // Calculate fractional position within this segment based on pixel x
        var x0 = pts[segIdx].x;
        var x1 = pts[segIdx + 1].x;
        var frac = (px - x0) / (x1 - x0);
        
        // Evaluate Bezier with catmull-rom control points
        var cp = catmullRomCP(ext[segIdx], ext[segIdx+1], ext[segIdx+2], ext[segIdx+3]);
        var mt = 1 - frac;
        var y = mt*mt*mt*pts[segIdx].y + 3*mt*mt*frac*cp.cp1y + 3*mt*frac*frac*cp.cp2y + frac*frac*frac*pts[segIdx+1].y;
        
        var ppm = (gBottom - y) / (gBottom - gTop) * maxY;
        samples.push({ x: px, y: y, ppm: ppm });
      }

      // ── Zone fill colours ──────────────────────────────────────
      var ZONE_COLORS_FILL   = ['rgba(34,211,238,0.45)',  'rgba(74,222,128,0.4)', 'rgba(168,85,247,0.35)'];
      var ZONE_COLORS_STROKE = ['#22D3EE', '#4ADE80', '#A855F7'];
      var ORANGE_FILL_GRAD = (function() {
        var g = ctx.createLinearGradient(0, gTop, 0, gBottom);
        g.addColorStop(0,   'rgba(255,140,0,0.0)');
        g.addColorStop(0.5, 'rgba(255,140,0,0.22)');
        g.addColorStop(1,   'rgba(255,140,0,0.5)');
        return g;
      })();

      function zoneOf(ppm) {
        var rounded = Math.round(ppm); return rounded <= 2 ? 0 : rounded <= 4 ? 1 : 2;
      }

      if (summaryView === 'zones') {
        // ── Zone-crossing fill ────────────────────────────────────
        // Group samples into runs of the same zone, draw each as a filled shape
        var runs = [];
        var curZone = zoneOf(samples[0].ppm);
        var runStart = 0;
        for (var si2 = 1; si2 < samples.length; si2++) {
          var z = zoneOf(samples[si2].ppm);
          if (z !== curZone) {
            runs.push({ zone: curZone, from: runStart, to: si2 });
            curZone = z; runStart = si2;
          }
        }
        runs.push({ zone: curZone, from: runStart, to: samples.length - 1 });

        for (var ri = 0; ri < runs.length; ri++) {
          var run = runs[ri];
          var s0 = samples[run.from], sN = samples[run.to];

          ctx.fillStyle = ZONE_COLORS_FILL[run.zone];
          ctx.beginPath();
          // Start at baseline under first sample
          var bx0 = (run.from === 0) ? fillStartX : s0.x;
          var bxN = (run.to === samples.length - 1) ? fillEndX : sN.x;
          ctx.moveTo(bx0, gBottom);
          ctx.lineTo(s0.x, s0.y);
          // Trace curve forward through this run
          for (var si2 = run.from + 1; si2 <= run.to; si2++) {
            ctx.lineTo(samples[si2].x, samples[si2].y);
          }
          ctx.lineTo(bxN, gBottom);
          ctx.closePath();
          ctx.fill();
        }

        // ── Stroke line with zone colours ─────────────────────────
        for (var ri = 0; ri < runs.length; ri++) {
          var run = runs[ri];
          ctx.strokeStyle = ZONE_COLORS_STROKE[run.zone];
          ctx.lineWidth = 1.5;
          ctx.lineJoin = 'round'; ctx.lineCap = 'round';
          ctx.beginPath();
          ctx.moveTo(samples[run.from].x, samples[run.from].y);
          for (var si2 = run.from + 1; si2 <= run.to; si2++) {
            ctx.lineTo(samples[si2].x, samples[si2].y);
          }
          ctx.stroke();
        }

      } else {
        // ── Orange fill + stroke (stats view) ─────────────────────
        ctx.fillStyle = ORANGE_FILL_GRAD;
        ctx.beginPath();
        ctx.moveTo(fillStartX, gBottom);
        ctx.lineTo(pts[0].x, pts[0].y);
        for (var k = 0; k < pts.length - 1; k++) {
          var cp = catmullRomCP(ext[k], ext[k+1], ext[k+2], ext[k+3]);
          ctx.bezierCurveTo(cp.cp1x, cp.cp1y, cp.cp2x, cp.cp2y, pts[k+1].x, pts[k+1].y);
        }
        ctx.lineTo(fillEndX, gBottom);
        ctx.closePath(); ctx.fill();

        ctx.strokeStyle = '#FF8C00'; ctx.lineWidth = 1.5;
        ctx.lineJoin = 'round'; ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(pts[0].x, pts[0].y);
        for (var k = 0; k < pts.length - 1; k++) {
          var cp = catmullRomCP(ext[k], ext[k+1], ext[k+2], ext[k+3]);
          ctx.bezierCurveTo(cp.cp1x, cp.cp1y, cp.cp2x, cp.cp2y, pts[k+1].x, pts[k+1].y);
        }
        ctx.stroke();
      }

      return { pts: pts, dataOffset: (isFirst && prevPt && (firstEpoch - prevPt.epoch) <= GAP_LIMIT) ? 1 : 0 };
    }

    // Clip to row bounds so ghost points don't bleed outside
    ctx.save();
    ctx.beginPath();
    ctx.rect(gLeft, gTop, gRight - gLeft, gBottom - gTop);
    ctx.clip();

    var segmentPts = [];
    for (var si = 0; si < segments.length; si++) {
      segmentPts.push(drawSegment(segments[si], si === 0, si === segments.length - 1));
    }

    ctx.restore();

    // ── Dots + labels ─────────────────────────────────────────────
    var dotR = 3, valFS = 12;
    var labels = [];
    ctx.font = 'bold '+valFS+'px -apple-system,sans-serif';
    var PAD_X=2, MAX_SHIFT=gW/DAYS*0.35, ITERS=5;
    var MIN_CX=gLeft+2, MAX_CX=gRight-2;

    var globalI = 0;
    for (var si = 0; si < segments.length; si++) {
      var sPts = segmentPts[si].pts;
      var dOff = segmentPts[si].dataOffset;
      for (var j = 0; j < segments[si].length; j++) {
        var ap = allPts[globalI];
        var px = sPts[j + dOff].x, py = sPts[j + dOff].y;
        var isNewest = (ap.dayIdx + dayOffset === todayIdx) && (globalI === allPts.length - 1);
        var dotRounded = Math.round(ap.val); var dc = dotRounded <= 2 ? '#22D3EE' : dotRounded <= 4 ? '#4ADE80' : '#A855F7';
        var isSelected = selectedDot && selectedDot.epoch === ap.epoch;
        if (isNewest) {
          ctx.globalAlpha=0.3; filledDot(ctx,px,py,dotR*2.2,dc);
          ctx.globalAlpha=1;   filledDot(ctx,px,py,dotR*1.4,dc);
        } else {
          filledDot(ctx,px,py,dotR,dc);
        }
        if (isSelected) {
          ctx.beginPath(); ctx.arc(px, py, dotR*2.8, 0, Math.PI*2);
          ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.stroke();
        }
        dotHits.push({ cx: px, cy: py, val: ap.val, epoch: ap.epoch });

        var dotEdge = isNewest ? dotR*1.4 : dotR;
        var s = showPPM ? ap.val.toFixed(1) : String(Math.round(ap.val));
        var w = ctx.measureText(s).width;
        labels.push({ s:s, baseX:px, x:px, y:py-dotEdge-1, w:w, visible:true, newest:isNewest });
        globalI++;
      }
    }

    for (var pass=0; pass<ITERS; pass++) {
      for (var i=0; i<labels.length-1; i++) {
        var L=labels[i], R=labels[i+1];
        if (!L.visible||!R.visible) continue;
        var Lright=L.x+L.w/2+PAD_X, Rleft=R.x-R.w/2-PAD_X;
        if (Lright<=Rleft) continue;
        var overlap=Lright-Rleft, push=Math.floor(overlap/2)+1;
        var newLX=Math.max(L.x-push,MIN_CX), newRX=Math.min(R.x+push,MAX_CX);
        var Lexc=Math.abs(newLX-L.baseX)>MAX_SHIFT, Rexc=Math.abs(newRX-R.baseX)>MAX_SHIFT;
        if (L.newest) { L.x=L.baseX; if(Rexc)R.visible=false;else R.x=newRX; }
        else if (R.newest) { R.x=R.baseX; if(Lexc)L.visible=false;else L.x=newLX; }
        else {
          if (!Lexc&&!Rexc)     { L.x=newLX; R.x=newRX; }
          else if (Lexc&&!Rexc) { L.visible=false; R.x=R.baseX; }
          else if (!Lexc&&Rexc) { R.visible=false; L.x=L.baseX; }
          else                  { L.visible=false; R.x=R.baseX; }
        }
      }
    }
    ctx.font='bold '+valFS+'px -apple-system,sans-serif';
    ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.textBaseline='bottom';
    var shown = 0;
    for (var i=0; i<labels.length; i++) {
      if (!labels[i].visible) continue;
      if (labels[i].newest) { ctx.fillText(labels[i].s, labels[i].x, labels[i].y); continue; }
      shown++;
      if (shown % 2 === 0) ctx.fillText(labels[i].s, labels[i].x, labels[i].y);
    }
  }

  // ── AUC / heart row below day labels ─────────────────────────
  var aucY    = gBottom + 14 + 18;
  var aucFS   = 18;
  var heartFS = 16;
  for (var d = 0; d < DAYS; d++) {
    var bandX   = gLeft + d * bandW;
    var cx      = bandX + bandW / 2;
    var isToday = (dayOffset + d === todayIdx);
    var auc     = weekDays[d].auc;
    var hit     = targetAUC > 0 && auc >= targetAUC;
    var hasData = auc > 0;
    var heart   = hit ? '\u2665' : '\u2661';
    var aucStr  = hasData ? String(Math.round(auc)) : '\u2014';

    ctx.fillStyle = hit ? '#e53935' : 'rgba(255,255,255,0.25)';
    ctx.font = heartFS + 'px -apple-system,sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(heart, cx, aucY - aucFS * 0.6);

    ctx.fillStyle = isToday ? (hit ? '#FFFF00' : '#FF8C00')
                            : (hit ? '#FFA500' : 'rgba(255,255,255,0.45)');
    ctx.font = (isToday ? 'bold ' : '') + aucFS + 'px -apple-system,sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(aucStr, cx, aucY + heartFS * 0.5);
  }
}

// ─── 3-week graph card ────────────────────────────────────────────
function buildGraphCard() {
  var SCALE   = graphScale;
  var CW      = 400;
  var PAD     = 14;
  var PILL_H  = 28;
  var PILL_PAD = 8;
  var WEEKS   = 3;
  var DAYS_PER_WEEK = 7;
  var GRAPH_H = 90;   // height of each week's graph area
  var LABEL_H = 14;   // day letters below each graph
  var AUC_H   = 36;   // heart + AUC number row (doubled)
  var ROW_GAP = 12;   // gap between week rows
  var SUMMARY_H = 60;
  var LABEL_ABOVE_H = 0;
  var FOOTER_H = 14;
  var TAB_ABOVE_H = 17; // folder tabs protrude above summary box

  // Total height: pill + 3 rows of (graph + labels + auc) + gaps between + tabs + summary + footer
  var CH = PAD + PILL_H + PILL_PAD
         + WEEKS * (GRAPH_H + LABEL_H + AUC_H)
         + (WEEKS - 1) * ROW_GAP
         + ROW_GAP + LABEL_ABOVE_H + TAB_ABOVE_H + SUMMARY_H
         + PAD + FOOTER_H;

  var canvas = document.createElement('canvas');
  canvas.width  = CW * SCALE;
  canvas.height = CH * SCALE;
  var ctx = canvas.getContext('2d');
  ctx.scale(SCALE, SCALE);

  // Card background
  ctx.fillStyle = '#111';
  roundRect(ctx, 0, 0, CW, CH, 14); ctx.fill();

  var gLeft  = PAD + 6;
  var gRight = CW - PAD - 4;

  // ── Compute shared y scale across ALL 21 days ─────────────────
  var rawMax = 0;
  for (var d = 0; d < totalDays; d++) {
    for (var i = 0; i < days[d].vals.length; i++) {
      if (days[d].vals[i] > rawMax) rawMax = days[d].vals[i];
    }
  }
  if (rawMax < 4) rawMax = 4;
  var step = rawMax <= 4 ? 0.5 : rawMax <= 8 ? 1 : rawMax <= 15 ? 2 : 5;
  var maxY = Math.ceil(rawMax * 1.15 / step) * step;
  if (maxY < 2) maxY = 2;

  // Today = last day with any measurements
  var todayIdx = 0;
  for (var d = 0; d < totalDays; d++) {
    if (days[d].vals.length > 0) todayIdx = d;
  }

  // ── Zone gradient stop fractions (for zones view fill) ───────
  var zoneGrad = null;
  if (summaryView === 'zones') {
    var zt = calcZoneTimes();
    var ztTotal = zt.glucose + zt.mixed + zt.fat || 1;
    var s3 = zt.glucose / ztTotal;           // end of cyan / start of green
    var s5 = s3 + zt.mixed / ztTotal;        // end of green / start of violet
    zoneGrad = { s3: s3, s5: s5 };
  }

  // ── Draw 3 week rows ─────────────────────────────────────────
  var rowTop = PAD + PILL_H + PILL_PAD;
  for (var w = 0; w < WEEKS; w++) {
    var dayOffset  = w * DAYS_PER_WEEK;
    var weekDays   = days.slice(dayOffset, dayOffset + DAYS_PER_WEEK);
    var gTop       = rowTop;
    var gBottom    = gTop + GRAPH_H;

    // Last measurement from previous week
    var prevPt = null;
    if (w > 0) {
      for (var pd = w * DAYS_PER_WEEK - 1; pd >= (w-1) * DAYS_PER_WEEK; pd--) {
        if (days[pd] && days[pd].epochs.length > 0) {
          var ei = days[pd].epochs.length - 1;
          prevPt = { epoch: days[pd].epochs[ei], val: days[pd].vals[ei] };
          break;
        }
      }
    }

    // First measurement from next week
    var nextPt = null;
    if (w < WEEKS - 1) {
      for (var nd = (w+1) * DAYS_PER_WEEK; nd < (w+2) * DAYS_PER_WEEK; nd++) {
        if (days[nd] && days[nd].epochs.length > 0) {
          nextPt = { epoch: days[nd].epochs[0], val: days[nd].vals[0] };
          break;
        }
      }
    }

    drawWeekRow(ctx, weekDays, dayOffset, gLeft, gRight, gTop, gBottom, maxY, todayIdx, prevPt, nextPt, w === WEEKS - 1, zoneGrad);

    rowTop += GRAPH_H + LABEL_H + AUC_H + ROW_GAP;
  }

  // ── Summary stats strip ───────────────────────────────────────
  var TAB_W = 66, TAB_H = 30, TAB_R = 9, TAB_GAP = 4, TAB_FS = 16;
  var tabsAboveH = TAB_H - 3; // tabs protrude this many px above box top
  var summaryY = rowTop + ROW_GAP + tabsAboveH;
  var sumPad = 6;
  var rectY = summaryY;
  var boxX = gLeft - sumPad;
  var boxW = gRight - gLeft + sumPad * 2;
  var colW = (gRight - gLeft) / 3;
  var LABEL_FS = 14;
  var LINE_GAP = 3;
  var VALUE_FS = 26;
  var VALUE_GAP = 4;

  tabHitBoxes = [];
  var tabs = [
    { view: 'stats', label: 'Sum' },
    { view: 'zones', label: 'Time' }
  ];

  // ── Draw inactive tab first (behind), then active (in front) ──
  var drawOrder = summaryView === 'stats' ? [1, 0] : [0, 1];
  for (var di = 0; di < drawOrder.length; di++) {
    var ti = drawOrder[di];
    var tx = boxX + 6 + ti * (TAB_W + TAB_GAP);
    var ty = rectY - tabsAboveH;
    var isActive = summaryView === tabs[ti].view;

    // Folder tab shape: rounded top corners, open bottom
    ctx.beginPath();
    ctx.moveTo(tx, rectY + 3);                          // bottom-left
    ctx.lineTo(tx, ty + TAB_R);
    ctx.quadraticCurveTo(tx, ty, tx + TAB_R, ty);       // top-left corner
    ctx.lineTo(tx + TAB_W - TAB_R, ty);
    ctx.quadraticCurveTo(tx + TAB_W, ty, tx + TAB_W, ty + TAB_R); // top-right corner
    ctx.lineTo(tx + TAB_W, rectY + 3);                  // bottom-right
    ctx.closePath();

    ctx.fillStyle = isActive ? '#111' : 'rgba(255,255,255,0.05)';
    ctx.fill();

    // Border — top and sides only, no bottom
    ctx.beginPath();
    ctx.moveTo(tx, rectY + 3);
    ctx.lineTo(tx, ty + TAB_R);
    ctx.quadraticCurveTo(tx, ty, tx + TAB_R, ty);
    ctx.lineTo(tx + TAB_W - TAB_R, ty);
    ctx.quadraticCurveTo(tx + TAB_W, ty, tx + TAB_W, ty + TAB_R);
    ctx.lineTo(tx + TAB_W, rectY + 3);
    ctx.strokeStyle = isActive ? '#f5c842' : 'rgba(245,200,66,0.35)';
    ctx.lineWidth = isActive ? 2 : 1.5;
    ctx.stroke();

    // Label
    ctx.fillStyle = isActive ? '#f5c842' : 'rgba(255,255,255,0.3)';
    ctx.font = 'bold ' + TAB_FS + 'px -apple-system,sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(tabs[ti].label, tx + TAB_W / 2, ty + tabsAboveH / 2);

    tabHitBoxes.push({ view: tabs[ti].view, x: tx, y: ty, w: TAB_W, h: TAB_H });
  }

  // ── Box border ────────────────────────────────────────────────
  ctx.strokeStyle = '#f5c842';
  ctx.lineWidth = 2;
  roundRect(ctx, boxX, rectY, boxW, SUMMARY_H, 10); ctx.stroke();

  // Erase top border behind active tab so it merges cleanly
  var activeTx = boxX + 6 + (summaryView === 'stats' ? 0 : 1) * (TAB_W + TAB_GAP);
  ctx.fillStyle = '#111';
  ctx.fillRect(activeTx + 2, rectY - 1, TAB_W - 4, 4);

  if (summaryView === 'stats') {
    // ── Stats view: Range / Avg / Target% ──────────────────────
    var allVals = [], daysWithData = 0, daysOnTarget = 0, totalAUC = 0;
    for (var d = 0; d < totalDays; d++) {
      for (var i = 0; i < days[d].vals.length; i++) allVals.push(days[d].vals[i]);
      if (days[d].vals.length > 0) {
        daysWithData++;
        totalAUC += days[d].auc;
        if (targetAUC > 0 && days[d].auc >= targetAUC) daysOnTarget++;
      }
    }
    var minVal = allVals.length ? Math.min.apply(null, allVals) : 0;
    var maxVal = allVals.length ? Math.max.apply(null, allVals) : 0;
    var avgVal = daysWithData > 0 ? totalAUC / (daysWithData * 24) : 0;
    var pctOnTarget = daysWithData > 0 ? Math.round(daysOnTarget / daysWithData * 100) : 0;

    var fmtVal = function(v) { return showPPM ? v.toFixed(1) : String(Math.round(v)); };
    var sumStats = [
      { label: 'Range',  value: fmtVal(minVal) + '–' + fmtVal(maxVal) },
      { label: 'Avg',    value: showPPM ? avgVal.toFixed(1) : (Math.round(avgVal * 10) / 10).toFixed(1) },
      { label: targetAUC > 0 ? 'Target (' + targetAUC + ')' : 'Target', value: pctOnTarget + '%' }
    ];

    for (var s = 0; s < sumStats.length; s++) {
      var cx = gLeft + colW * s + colW / 2;
      if (s > 0) {
        ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 0.75;
        ctx.beginPath();
        ctx.moveTo(gLeft + colW * s, rectY + 6);
        ctx.lineTo(gLeft + colW * s, rectY + SUMMARY_H - 6);
        ctx.stroke();
      }
      var blockH = LABEL_FS + LINE_GAP + VALUE_GAP + VALUE_FS;
      var blockTop = rectY + (SUMMARY_H - blockH) / 2;
      var labelY = blockTop + LABEL_FS / 2;
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.font = LABEL_FS + 'px -apple-system,sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(sumStats[s].label, cx, labelY);
      var lw = ctx.measureText(sumStats[s].label).width;
      var lineY = blockTop + LABEL_FS + LINE_GAP;
      ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 0.75;
      ctx.beginPath();
      ctx.moveTo(cx - lw/2, lineY); ctx.lineTo(cx + lw/2, lineY); ctx.stroke();
      var valueY = lineY + VALUE_GAP + VALUE_FS / 2;
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold ' + VALUE_FS + 'px -apple-system,sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(sumStats[s].value, cx, valueY);
    }

  } else {
    // ── Zones view: Glucose / Mixed / Fat ──────────────────────
    var zt = calcZoneTimes();
    var total = zt.glucose + zt.mixed + zt.fat || 1;

    var zones = [
      { label: 'Glucose', value: Math.round(zt.glucose / total * 100) + '%', color: '#00d4ff', pct: zt.glucose / total },
      { label: 'Mixed',   value: Math.round(zt.mixed   / total * 100) + '%', color: '#4caf82', pct: zt.mixed   / total },
      { label: 'Fat',     value: Math.round(zt.fat     / total * 100) + '%', color: '#a855f7', pct: zt.fat     / total }
    ];

    for (var s = 0; s < zones.length; s++) {
      var z = zones[s];
      var cx = gLeft + colW * s + colW / 2;

      if (s > 0) {
        ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 0.75;
        ctx.beginPath();
        ctx.moveTo(gLeft + colW * s, rectY + 6);
        ctx.lineTo(gLeft + colW * s, rectY + SUMMARY_H - 6);
        ctx.stroke();
      }

      var blockH = LABEL_FS + LINE_GAP + VALUE_GAP + VALUE_FS;
      var blockTop = rectY + (SUMMARY_H - blockH) / 2;
      var labelY = blockTop + LABEL_FS / 2;
      ctx.fillStyle = z.color;
      ctx.font = 'bold ' + LABEL_FS + 'px -apple-system,sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(z.label, cx, labelY);

      var barW = colW * 0.72;
      var barH = 3;
      var barX = cx - barW / 2;
      var lineY = blockTop + LABEL_FS + LINE_GAP;
      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      roundRect(ctx, barX, lineY, barW, barH, 2); ctx.fill();
      ctx.fillStyle = z.color;
      roundRect(ctx, barX, lineY, Math.max(barW * z.pct, 2), barH, 2); ctx.fill();

      var valueY = lineY + VALUE_GAP + VALUE_FS / 2;
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold ' + VALUE_FS + 'px -apple-system,sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(z.value, cx, valueY);
    }
  }

  // ── 3 WEEKS + date range pill ─────────────────────────────────
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function fmtDate(epoch) {
    var d = new Date(epoch * 1000);
    return months[d.getUTCMonth()] + ' ' + d.getUTCDate();
  }
  var rangeStr = fmtDate(windowStart) + ' – ' + fmtDate(windowStart + 20 * 86400);
  var pillW = 220, pillH = PILL_H, pillCY = PAD + pillH / 2;
  var pillLeft = CW/2 - pillW/2, pillRight = CW/2 + pillW/2;
  ctx.fillStyle = '#f5c842';
  roundRect(ctx, pillLeft, PAD, pillW, pillH, pillH/2); ctx.fill();
  ctx.font = 'bold 16px -apple-system,sans-serif';
  var weeksW = ctx.measureText('3 WEEKS').width;
  ctx.font = '15px -apple-system,sans-serif';
  var rangeW = ctx.measureText(rangeStr).width;
  var totalTextW = weeksW + rangeW;
  var textGap = pillW - totalTextW - 20; // 10px padding each side
  var weeksX = pillLeft + 10 + weeksW / 2;
  var sepX   = pillLeft + 10 + weeksW + textGap / 2;
  var rangeX = sepX + textGap / 2 + rangeW / 2;

  ctx.fillStyle = '#1a1a2e';
  ctx.textBaseline = 'middle'; ctx.textAlign = 'center';
  ctx.font = 'bold 16px -apple-system,sans-serif';
  ctx.fillText('3 WEEKS', weeksX, pillCY + 1);
  ctx.fillStyle = 'rgba(26,26,46,0.35)';
  ctx.fillRect(sepX, PAD + 7, 1, pillH - 14);
  ctx.fillStyle = '#1a1a2e';
  ctx.font = '15px -apple-system,sans-serif';
  ctx.fillText(rangeStr, rangeX, pillCY + 1);

  // ── Watermark ─────────────────────────────────────────────────
  ctx.fillStyle = 'rgba(255,255,255,0.07)';
  ctx.font = '9px -apple-system,sans-serif';
  ctx.textAlign = 'right'; ctx.textBaseline = 'alphabetic';
  ctx.fillText('fox2.app', CW - PAD, CH - 4);

  return canvas;
}

// ─── 21-day horizontal AUC bars with zone fills ───────────────────
function buildStreakCard() {
  var SCALE    = 2;
  var CW       = 400;
  var PAD      = 14;
  var PILL_H   = 28;
  var PILL_PAD = 8;
  var DATE_W   = 52;  // Width for date labels
  var BAR_H    = 16;  // Height of each bar
  var BAR_GAP  = 4;   // Gap between bars
  var FOOTER_H = 14;

  // Count days with data
  var daysWithData = 0;
  for (var d = 0; d < totalDays; d++) {
    if (days[d].vals.length > 0) daysWithData++;
  }

  var CH = PAD + PILL_H + PILL_PAD + 8
         + daysWithData * (BAR_H + BAR_GAP)
         + PAD + FOOTER_H;

  var canvas = document.createElement('canvas');
  canvas.width  = CW * SCALE;
  canvas.height = CH * SCALE;
  var ctx = canvas.getContext('2d');
  ctx.scale(SCALE, SCALE);

  ctx.fillStyle = '#111';
  roundRect(ctx, 0, 0, CW, CH, 14); ctx.fill();

  var barLeft  = PAD + DATE_W + 8;
  var barRight = CW - PAD - 4;
  var barW     = barRight - barLeft;

  // Find max AUC for scaling
  var maxAUC = targetAUC > 0 ? targetAUC : 0;
  for (var d = 0; d < totalDays; d++) {
    if (days[d].auc > maxAUC) maxAUC = days[d].auc;
  }
  maxAUC *= 1.05;
  if (maxAUC < 40) maxAUC = 40;

  // Today = last day with data
  var todayIdx = 0;
  for (var d = 0; d < totalDays; d++) {
    if (days[d].vals.length > 0) todayIdx = d;
  }

  // ── Pill title ────────────────────────────────────────────────
  var pillCX = CW / 2;
  var pillCY = PAD + PILL_H / 2;
  var pillW  = 220;
  ctx.fillStyle = '#f5c842';
  roundRect(ctx, pillCX - pillW/2, pillCY - PILL_H/2, pillW, PILL_H, PILL_H/2); ctx.fill();
  ctx.fillStyle = '#1a1a2e';
  ctx.font = 'bold 16px -apple-system,sans-serif';
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText('21 DAYS', pillCX - pillW/2 + 14, pillCY + 1);
  ctx.fillStyle = 'rgba(26,26,46,0.35)';
  ctx.fillRect(pillCX - 1, pillCY - PILL_H/2 + 6, 1, PILL_H - 12);

  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var d0 = new Date(windowStart * 1000);
  var d1 = new Date((windowStart + 20 * 86400) * 1000);
  var dateStr = months[d0.getUTCMonth()] + ' ' + d0.getUTCDate()
              + ' – ' + months[d1.getUTCMonth()] + ' ' + d1.getUTCDate();
  ctx.fillStyle = '#1a1a2e';
  ctx.font = '15px -apple-system,sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText(dateStr, pillCX + pillW/2 - 14, pillCY + 1);

  // ── Horizontal bars ───────────────────────────────────────────
  var barY = PAD + PILL_H + PILL_PAD + 8;
  var barRow = 0;
  var daysOfWeek = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

  for (var d = 0; d < totalDays; d++) {
    var day = days[d];
    if (day.vals.length === 0) continue;  // Skip days without data

    var isToday = (d === todayIdx);
    var auc = day.auc;
    var zoneTimes = day.zoneTimes || { glucose: 0, mixed: 0, fat: 0 };
    var totalMins = zoneTimes.glucose + zoneTimes.mixed + zoneTimes.fat;

    // Date label
    var dateObj = new Date((windowStart + d * 86400) * 1000);
    var dateLabel = months[dateObj.getUTCMonth()].substring(0, 3) + ' ' + dateObj.getUTCDate();
    var dayLabel = daysOfWeek[dateObj.getUTCDay()];
    
    ctx.fillStyle = isToday ? '#f5c842' : 'rgba(255,255,255,0.5)';
    ctx.font = (isToday ? 'bold ' : '') + '11px -apple-system,sans-serif';
    ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
    ctx.fillText(dateLabel, PAD + DATE_W - 2, barY + BAR_H / 2);
    
    // Day of week (smaller, lighter)
    ctx.fillStyle = isToday ? 'rgba(245,200,66,0.6)' : 'rgba(255,255,255,0.3)';
    ctx.font = '9px -apple-system,sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(dayLabel, PAD + DATE_W + 4, barY + BAR_H / 2);

    // Bar dimensions
    var bx = barLeft;
    var by = barY;
    var bw = (auc / maxAUC) * barW;
    var br = Math.min(4, BAR_H / 2);

    // Save context before clipping
    ctx.save();
    
    // Create clipping path with rounded corners
    roundRect(ctx, bx, by, bw, BAR_H, br);
    ctx.clip();

    // Bar background
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.fillRect(bx, by, bw, BAR_H);

    // Zone fills (glucose, mixed, fat)
    if (totalMins > 0) {
      var fillX = bx;
      var glucosePct = zoneTimes.glucose / totalMins;
      var mixedPct = zoneTimes.mixed / totalMins;
      var fatPct = zoneTimes.fat / totalMins;

      // Glucose (cyan)
      if (glucosePct > 0) {
        var glucoseW = bw * glucosePct;
        ctx.fillStyle = '#22D3EE';
        ctx.fillRect(fillX, by, glucoseW, BAR_H);
        fillX += glucoseW;
      }

      // Mixed (green)
      if (mixedPct > 0) {
        var mixedW = bw * mixedPct;
        ctx.fillStyle = '#4ADE80';
        ctx.fillRect(fillX, by, mixedW, BAR_H);
        fillX += mixedW;
      }

      // Fat (violet)
      if (fatPct > 0) {
        var fatW = bw * fatPct;
        ctx.fillStyle = '#A855F7';
        ctx.fillRect(fillX, by, fatW, BAR_H);
      }
    }
    
    // AUC value inside bar at the end
    var aucText = Math.round(auc).toString();
    ctx.font = 'bold 11px -apple-system,sans-serif';
    var aucWidth = ctx.measureText(aucText).width;
    
    // Only show if there's enough room (at least 20px)
    if (bw > aucWidth + 8) {
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.textAlign = 'right';
      ctx.textBaseline = 'middle';
      ctx.fillText(aucText, bx + bw - 4, by + BAR_H / 2);
    }
    
    // Restore context (removes clipping)
    ctx.restore();

    // Today highlight border
    if (isToday) {
      ctx.strokeStyle = '#f5c842';
      ctx.lineWidth = 2;
      roundRect(ctx, bx, by, bw, BAR_H, br); ctx.stroke();
    }

    barY += BAR_H + BAR_GAP;
    barRow++;
  }

  // ── Watermark ─────────────────────────────────────────────────
  ctx.fillStyle = 'rgba(255,255,255,0.07)';
  ctx.font = '9px -apple-system,sans-serif';
  ctx.textAlign = 'right'; ctx.textBaseline = 'alphabetic';
  ctx.fillText('fox2.app', CW - PAD, CH - 4);

  return canvas;
}

// ─── Insights card ───────────────────────────────────────────────
function buildInsightsCard() {
  var SCALE = 2;
  var CW = 400;
  var PAD = 14;
  var PILL_H = 28;
  var PILL_PAD = 8;
  var SECTION_GAP = 16;
  var SECTION_TITLE_FS = 13;
  var SECTION_TITLE_H = 20;
  var CHART_H = 120;
  var TREND_H = 150;
  var SHAPE_ROW_H = 28;
  var FOOTER_H = 14;

  var gLeft = PAD + 6;
  var gRight = CW - PAD - 4;
  var gW = gRight - gLeft;

  // ── Gather data ─────────────────────────────────────────────────
  var todayIdx = 0;
  for (var d = 0; d < totalDays; d++) {
    if (days[d].vals.length > 0) todayIdx = d;
  }

  var daysWithData = 0;
  for (var d = 0; d < totalDays; d++) {
    if (days[d].vals.length > 0) daysWithData++;
  }

  var SHAPE_SECTION_H = SECTION_TITLE_H + Math.min(daysWithData, 21) * SHAPE_ROW_H + 8;
  var TOD_SECTION_H = SECTION_TITLE_H + CHART_H + 20;
  var TREND_SECTION_H = SECTION_TITLE_H + TREND_H + 30;

  var CH = PAD + PILL_H + PILL_PAD
         + TOD_SECTION_H + SECTION_GAP
         + SHAPE_SECTION_H + SECTION_GAP
         + TREND_SECTION_H
         + PAD + FOOTER_H;

  var canvas = document.createElement('canvas');
  canvas.width = CW * SCALE;
  canvas.height = CH * SCALE;
  var ctx = canvas.getContext('2d');
  ctx.scale(SCALE, SCALE);

  ctx.fillStyle = '#111';
  roundRect(ctx, 0, 0, CW, CH, 14); ctx.fill();

  // ── Pill title ──────────────────────────────────────────────────
  var pillCX = CW / 2;
  var pillCY = PAD + PILL_H / 2;
  var pillW = 160;
  ctx.fillStyle = '#f5c842';
  roundRect(ctx, pillCX - pillW/2, pillCY - PILL_H/2, pillW, PILL_H, PILL_H/2); ctx.fill();
  ctx.fillStyle = '#1a1a2e';
  ctx.font = 'bold 16px -apple-system,sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('INSIGHTS', pillCX, pillCY + 1);

  var curY = PAD + PILL_H + PILL_PAD;

  // ════════════════════════════════════════════════════════════════
  // SECTION 1: Time-of-Day Average
  // ════════════════════════════════════════════════════════════════
  function drawSectionTitle(y, text) {
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = 'bold ' + SECTION_TITLE_FS + 'px -apple-system,sans-serif';
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.fillText(text, gLeft, y);
    var tw = ctx.measureText(text).width;
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 0.75;
    ctx.beginPath();
    ctx.moveTo(gLeft + tw + 8, y + SECTION_TITLE_FS / 2);
    ctx.lineTo(gRight, y + SECTION_TITLE_FS / 2);
    ctx.stroke();
    return y + SECTION_TITLE_H;
  }

  curY = drawSectionTitle(curY, 'Zones by Time of Day');

  var PERIODS = [
    { label: '1a – 9a',  startMin: 60,   endMin: 540,  name: 'Morning' },
    { label: '9a – 5p',  startMin: 540,  endMin: 1020, name: 'Midday' },
    { label: '5p – 1a',  startMin: 1020, endMin: 1500, name: 'Evening' }
  ];

  var periodZones = [];
  for (var p = 0; p < PERIODS.length; p++) {
    periodZones.push({ glucose: 0, mixed: 0, fat: 0 });
  }

  for (var d = 0; d < totalDays; d++) {
    var pts  = days[d].epochs;
    var vals = days[d].vals;
    if (pts.length < 2) continue;

    var dayStart = windowStart + d * 86400;
    var xVals = [];
    var yVals = [];
    var firstMinute = (pts[0] - dayStart) / 60;
    if (firstMinute > 0) {
      xVals.push(0);
      yVals.push(vals[0]);
    }
    for (var i = 0; i < pts.length; i++) {
      xVals.push((pts[i] - dayStart) / 60);
      yVals.push(vals[i]);
    }

    if (xVals.length < 2) continue;
    derivCache = {};

    var lastMinute = xVals[xVals.length - 1];

    for (var minute = 0; minute < lastMinute; minute++) {
      var ppm = constrainedSpline(xVals, yVals, xVals.length, minute);
      if (isNaN(ppm)) continue;
      ppm = Math.max(0, ppm);
      var ppmInt = Math.round(ppm);

      // Evening wraps past midnight: minutes 0-59 (12a-1a) count as Evening
      var matched = false;
      for (var p = 0; p < PERIODS.length; p++) {
        var s = PERIODS[p].startMin, e = PERIODS[p].endMin;
        if (e > 1440) {
          if (minute >= s || minute < e - 1440) { matched = true; }
        } else {
          if (minute >= s && minute < e) { matched = true; }
        }
        if (matched) {
          if (ppmInt <= 2) periodZones[p].glucose++;
          else if (ppmInt <= 4) periodZones[p].mixed++;
          else periodZones[p].fat++;
          break;
        }
      }
    }
  }

  var BAR_ROW_H = 26;
  var BAR_GAP = 6;
  var LABEL_COL_W = 68;
  var barLeft = gLeft + LABEL_COL_W;
  var barRight = gRight;
  var barW_full = barRight - barLeft;

  var ZONE_COLORS = ['#22D3EE', '#4ADE80', '#A855F7'];
  var ZONE_NAMES  = ['Glucose', 'Mixed', 'Fat'];

  var todTop = curY;

  for (var p = 0; p < PERIODS.length; p++) {
    var pz = periodZones[p];
    var total = pz.glucose + pz.mixed + pz.fat;
    var ry = curY + p * (BAR_ROW_H + BAR_GAP);

    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.font = '11px -apple-system,sans-serif';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(PERIODS[p].label, gLeft, ry + BAR_ROW_H / 2);

    if (total === 0) {
      ctx.fillStyle = 'rgba(255,255,255,0.06)';
      roundRect(ctx, barLeft, ry, barW_full, BAR_ROW_H, 5); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.font = '10px -apple-system,sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('—', barLeft + barW_full / 2, ry + BAR_ROW_H / 2);
      continue;
    }

    var fracs = [pz.glucose / total, pz.mixed / total, pz.fat / total];

    var bx = barLeft;
    for (var z = 0; z < 3; z++) {
      var segW = fracs[z] * barW_full;
      if (segW < 0.5) continue;

      ctx.fillStyle = ZONE_COLORS[z];
      ctx.globalAlpha = 0.7;
      ctx.fillRect(bx, ry, segW, BAR_ROW_H);

      var pctStr = Math.round(fracs[z] * 100) + '%';
      ctx.globalAlpha = 1;
      ctx.font = 'bold 11px -apple-system,sans-serif';
      var pctW = ctx.measureText(pctStr).width;
      if (segW > pctW + 8) {
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(pctStr, bx + segW / 2, ry + BAR_ROW_H / 2);
      }

      bx += segW;
    }
    ctx.globalAlpha = 1;

    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 0.75;
    roundRect(ctx, barLeft, ry, barW_full, BAR_ROW_H, 5); ctx.stroke();

    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.moveTo(barLeft, ry);
    ctx.lineTo(barLeft + 5, ry);
    ctx.quadraticCurveTo(barLeft, ry, barLeft, ry + 5);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(barLeft, ry + BAR_ROW_H);
    ctx.lineTo(barLeft + 5, ry + BAR_ROW_H);
    ctx.quadraticCurveTo(barLeft, ry + BAR_ROW_H, barLeft, ry + BAR_ROW_H - 5);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(barRight, ry);
    ctx.lineTo(barRight - 5, ry);
    ctx.quadraticCurveTo(barRight, ry, barRight, ry + 5);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(barRight, ry + BAR_ROW_H);
    ctx.lineTo(barRight - 5, ry + BAR_ROW_H);
    ctx.quadraticCurveTo(barRight, ry + BAR_ROW_H, barRight, ry + BAR_ROW_H - 5);
    ctx.closePath(); ctx.fill();
  }

  var legendY = curY + PERIODS.length * (BAR_ROW_H + BAR_GAP) + 4;
  var legendGap = 8;
  ctx.font = '10px -apple-system,sans-serif';
  var totalLegendW = 0;
  for (var z = 0; z < 3; z++) {
    totalLegendW += 8 + 4 + ctx.measureText(ZONE_NAMES[z]).width + legendGap;
  }
  totalLegendW -= legendGap;
  var lx = gLeft + (gW - totalLegendW) / 2;
  for (var z = 0; z < 3; z++) {
    ctx.fillStyle = ZONE_COLORS[z];
    ctx.globalAlpha = 0.7;
    roundRect(ctx, lx, legendY, 8, 8, 2); ctx.fill();
    ctx.globalAlpha = 1;
    lx += 12;
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.fillText(ZONE_NAMES[z], lx, legendY - 1);
    lx += ctx.measureText(ZONE_NAMES[z]).width + legendGap;
  }

  var todBottom = legendY + 14;
  curY = todBottom + SECTION_GAP;

  // ════════════════════════════════════════════════════════════════
  // SECTION 2: Daily Shape Classification
  // ════════════════════════════════════════════════════════════════
  curY = drawSectionTitle(curY, 'Daily Patterns');

  var SHAPE_COLORS = {
    'Rising':  '#4ADE80',
    'Falling': '#22D3EE',
    'Peak':    '#A855F7',
    'Valley':  '#f5c842',
    'Flat':    'rgba(255,255,255,0.4)',
    'Single':  'rgba(255,255,255,0.25)'
  };

  var SHAPE_ICONS = {
    'Rising':  '↗',
    'Falling': '↘',
    'Peak':    '⌃',
    'Valley':  '⌄',
    'Flat':    '→',
    'Single':  '·'
  };

  function classifyDay(dayIdx) {
    // Sample the actual spline curve across the full 24-hour period
    var dayStart = windowStart + dayIdx * 86400;
    var pts = days[dayIdx].epochs;
    var vals = days[dayIdx].vals;
    
    if (pts.length === 0) return null;
    
    // Build spline arrays (same as device)
    var xVals = [];
    var yVals = [];
    
    // Compute midnight anchor using device's extrapolation logic
    var firstMinute = (pts[0] - dayStart) / 60;
    if (firstMinute > 0) {
      // Find last point from previous day
      var lastPrev = null;
      for (var d = dayIdx - 1; d >= 0; d--) {
        if (days[d].epochs.length > 0) {
          var lastIdx = days[d].epochs.length - 1;
          lastPrev = {
            epoch: days[d].epochs[lastIdx],
            val: days[d].vals[lastIdx]
          };
          break;
        }
      }
      
      var midnightValue;
      if (lastPrev && (dayStart - lastPrev.epoch) <= 1440 * 60) {
        // Extrapolate from previous day's last point to today's first point
        var prevMin = (lastPrev.epoch - dayStart) / 60;
        var currMin = firstMinute;
        var slope = (vals[0] - lastPrev.val) / (currMin - prevMin);
        midnightValue = vals[0] - slope * currMin;
        midnightValue = Math.max(0, Math.min(30, midnightValue));
      } else {
        // No previous day data or gap too large - use first measurement
        midnightValue = vals[0];
      }
      
      xVals.push(0);
      yVals.push(midnightValue);
    }
    
    // Add all measurements
    for (var i = 0; i < pts.length; i++) {
      var minute = (pts[i] - dayStart) / 60;
      xVals.push(minute);
      yVals.push(vals[i]);
    }
    
    if (xVals.length < 2) return 'Single';
    
    // Sample spline at regular intervals (every 2 hours)
    var sampledVals = [];
    derivCache = {};
    var lastMinute = Math.min(xVals[xVals.length - 1], 1440); // Don't go past midnight
    
    for (var minute = 0; minute <= lastMinute; minute += 120) {
      var ppm = constrainedSpline(xVals, yVals, xVals.length, minute);
      if (!isNaN(ppm)) {
        sampledVals.push(Math.max(0, ppm));
      }
    }
    
    // Classify based on sampled curve
    if (sampledVals.length === 0) return null;
    if (sampledVals.length === 1) return 'Single';
    
    if (sampledVals.length === 2) {
      var diff = sampledVals[1] - sampledVals[0];
      if (Math.abs(diff) < 1.5) return 'Flat';
      return diff > 0 ? 'Rising' : 'Falling';
    }
    
    // 3+ sampled points: check shape
    var first = sampledVals[0], last = sampledVals[sampledVals.length - 1];
    var maxVal = sampledVals[0], minVal = sampledVals[0], maxI = 0, minI = 0;
    for (var i = 1; i < sampledVals.length; i++) {
      if (sampledVals[i] > maxVal) { maxVal = sampledVals[i]; maxI = i; }
      if (sampledVals[i] < minVal) { minVal = sampledVals[i]; minI = i; }
    }
    var range = maxVal - minVal;
    if (range < 1.5) return 'Flat';
    // Peak: max is in the middle (not first or last)
    if (maxI > 0 && maxI < sampledVals.length - 1 && (maxVal - first) > range * 0.3 && (maxVal - last) > range * 0.3) return 'Peak';
    // Valley: min is in the middle
    if (minI > 0 && minI < sampledVals.length - 1 && (first - minVal) > range * 0.3 && (last - minVal) > range * 0.3) return 'Valley';
    // Rising or falling
    var netDiff = last - first;
    if (netDiff > range * 0.2) return 'Rising';
    if (netDiff < -range * 0.2) return 'Falling';
    return 'Flat';
  }

  // Collect all patterns and find examples
  var patternCounts = {};
  var patternExamples = {}; // Store first example of each pattern
  var totalPatterned = 0;
  
  for (var d = 0; d < totalDays; d++) {
    if (days[d].vals.length === 0) continue;
    var shape = classifyDay(d);
    totalPatterned++;
    
    if (!patternCounts[shape]) {
      patternCounts[shape] = 0;
      patternExamples[shape] = d; // Store day index of first example
    }
    patternCounts[shape]++;
  }

  // Sort patterns by frequency (descending)
  var patternList = [];
  for (var p in patternCounts) {
    patternList.push({ pattern: p, count: patternCounts[p], example: patternExamples[p] });
  }
  patternList.sort(function(a, b) { return b.count - a.count; });

  var dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  // Draw one row per unique pattern
  for (var pi = 0; pi < patternList.length; pi++) {
    var pInfo = patternList[pi];
    var shape = pInfo.pattern;
    var d = pInfo.example;
    var pct = Math.round((pInfo.count / totalPatterned) * 100);
    
    var ry = curY + pi * SHAPE_ROW_H;
    var shapeColor = SHAPE_COLORS[shape] || '#fff';

    // Percentage label (left)
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.font = 'bold 12px -apple-system,sans-serif';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(pct + '%', gLeft, ry + SHAPE_ROW_H / 2);

    // Mini sparkline (example pattern)
    var sparkLeft = gLeft + 48;
    var sparkRight = gRight - 80;
    var sparkW = sparkRight - sparkLeft;
    var sparkH = SHAPE_ROW_H - 8;
    var sparkMid = ry + SHAPE_ROW_H / 2;
    var sparkTop = sparkMid - sparkH / 2;
    var sparkBot = sparkMid + sparkH / 2;

    if (days[d].vals.length >= 2) {
      var dayStart = windowStart + d * 86400;
      var vMin = days[d].vals[0], vMax = days[d].vals[0];
      for (var i = 1; i < days[d].vals.length; i++) {
        if (days[d].vals[i] < vMin) vMin = days[d].vals[i];
        if (days[d].vals[i] > vMax) vMax = days[d].vals[i];
      }
      var vRange = vMax - vMin;
      if (vRange < 1) vRange = 1;

      ctx.strokeStyle = shapeColor;
      ctx.lineWidth = 1.5;
      ctx.lineJoin = 'round'; ctx.lineCap = 'round';
      ctx.beginPath();
      for (var i = 0; i < days[d].vals.length; i++) {
        var mx = (days[d].epochs[i] - dayStart) / 86400;
        var px = sparkLeft + mx * sparkW;
        var py = sparkBot - ((days[d].vals[i] - vMin) / vRange) * sparkH;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.stroke();

      // Dots
      for (var i = 0; i < days[d].vals.length; i++) {
        var mx = (days[d].epochs[i] - dayStart) / 86400;
        var px = sparkLeft + mx * sparkW;
        var py = sparkBot - ((days[d].vals[i] - vMin) / vRange) * sparkH;
        ctx.beginPath(); ctx.arc(px, py, 2, 0, Math.PI * 2);
        ctx.fillStyle = shapeColor; ctx.fill();
      }
    } else {
      // Single point — just a dot in the middle
      ctx.beginPath(); ctx.arc(sparkLeft + sparkW / 2, sparkMid, 3, 0, Math.PI * 2);
      ctx.fillStyle = shapeColor; ctx.fill();
    }

    // Shape label + icon
    ctx.fillStyle = shapeColor;
    ctx.font = 'bold 11px -apple-system,sans-serif';
    ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
    ctx.fillText(SHAPE_ICONS[shape] + ' ' + shape, gRight, ry + SHAPE_ROW_H / 2);

    // Subtle separator
    if (pi > 0) {
      ctx.strokeStyle = 'rgba(255,255,255,0.06)';
      ctx.lineWidth = 0.5;
      ctx.beginPath(); ctx.moveTo(gLeft, ry); ctx.lineTo(gRight, ry); ctx.stroke();
    }
  }

  curY += patternList.length * SHAPE_ROW_H + 8 + SECTION_GAP;

  // ════════════════════════════════════════════════════════════════
  // SECTION 3: Week-over-Week Trend (sparklines)
  // ════════════════════════════════════════════════════════════════
  curY = drawSectionTitle(curY, 'Weekly Trend');

  var weekStats = [];
  for (var w = 0; w < 3; w++) {
    var wDays = 0, wSum = 0, wAUC = 0, wPeak = 0;
    for (var d = w * 7; d < (w + 1) * 7 && d < totalDays; d++) {
      if (days[d].vals.length > 0) {
        wDays++;
        for (var i = 0; i < days[d].vals.length; i++) {
          wSum += days[d].vals[i];
          if (days[d].vals[i] > wPeak) wPeak = days[d].vals[i];
        }
        wAUC += days[d].auc;
      }
    }
    var wMeasCount = 0;
    for (var d = w * 7; d < (w + 1) * 7 && d < totalDays; d++) {
      wMeasCount += days[d].vals.length;
    }
    weekStats.push({
      avg: wMeasCount > 0 ? wSum / wMeasCount : 0,
      avgAUC: wDays > 0 ? wAUC / wDays : 0,
      peak: wPeak,
      days: wDays
    });
  }

  var weekLabels = ['Wk 1', 'Wk 2', 'Wk 3'];
  var BAR_AREA_H = 100;
  var BAR_LABEL_H = 30;
  var BAR_WEEK_H = 14;

  function trendArrow(v1, v2) {
    if (v2 === 0 || v1 === 0) return '';
    var pct = ((v2 - v1) / v1) * 100;
    if (Math.abs(pct) < 5) return '  →';
    return pct > 0 ? '  ↑' + Math.round(Math.abs(pct)) + '%' : '  ↓' + Math.round(Math.abs(pct)) + '%';
  }

  var metrics = [
    { label: 'Avg', values: [weekStats[0].avg, weekStats[1].avg, weekStats[2].avg], color: 'rgba(245,200,66,{a})' },
    { label: 'Peak', values: [weekStats[0].peak, weekStats[1].peak, weekStats[2].peak], color: 'rgba(168,85,247,{a})' },
    { label: 'AUC', values: [weekStats[0].avgAUC, weekStats[1].avgAUC, weekStats[2].avgAUC], color: 'rgba(34,211,238,{a})' }
  ];

  var groupW = gW / 3;
  var barGap = 4;
  var barsPerGroup = 3;
  var barW = (groupW - barGap * (barsPerGroup + 1)) / barsPerGroup;
  if (barW > 28) barW = 28;
  var barsBlockW = barsPerGroup * barW + (barsPerGroup - 1) * barGap;

  var barTop = curY + BAR_LABEL_H;
  var barBot = curY + BAR_LABEL_H + BAR_AREA_H;

  for (var m = 0; m < metrics.length; m++) {
    var met = metrics[m];
    var groupLeft = gLeft + m * groupW;
    var groupCX = groupLeft + groupW / 2;
    var barsLeft = groupCX - barsBlockW / 2;

    var vMax = 0;
    for (var w = 0; w < 3; w++) {
      if (met.values[w] > vMax) vMax = met.values[w];
    }
    if (vMax < 1) vMax = 1;

    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = 'bold 11px -apple-system,sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.fillText(met.label, groupCX, curY);

    var hasW1W3 = weekStats[0].days > 0 && weekStats[2].days > 0;
    if (hasW1W3) {
      var arrow = trendArrow(met.values[0], met.values[2]);
      if (arrow) {
        var isUp = arrow.indexOf('↑') >= 0;
        var isDown = arrow.indexOf('↓') >= 0;
        ctx.fillStyle = isUp ? '#4ADE80' : isDown ? '#22D3EE' : 'rgba(255,255,255,0.35)';
        ctx.font = 'bold 10px -apple-system,sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'top';
        ctx.fillText(arrow.trim(), groupCX, curY + 14);
      }
    }

    if (m > 0) {
      ctx.strokeStyle = 'rgba(255,255,255,0.08)';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(groupLeft, curY);
      ctx.lineTo(groupLeft, barBot + BAR_WEEK_H);
      ctx.stroke();
    }

    var barAlphas = [0.35, 0.55, 0.85];
    for (var w = 0; w < 3; w++) {
      var bx = barsLeft + w * (barW + barGap);
      var val = met.values[w];
      var bh = vMax > 0 ? (val / vMax) * BAR_AREA_H : 0;
      if (val > 0 && bh < 4) bh = 4;
      var by = barBot - bh;
      var br = Math.min(4, bh / 2, barW / 2);

      ctx.fillStyle = 'rgba(255,255,255,0.04)';
      roundRect(ctx, bx, barTop, barW, BAR_AREA_H, 4); ctx.fill();

      if (val > 0) {
        ctx.fillStyle = met.color.replace('{a}', String(barAlphas[w]));
        roundRect(ctx, bx, by, barW, bh, br); ctx.fill();
      }

      var valStr = showPPM ? val.toFixed(1) : String(Math.round(val));
      var valFS = 11;
      ctx.font = 'bold ' + valFS + 'px -apple-system,sans-serif';
      ctx.textAlign = 'center';
      if (bh > valFS + 6 && val > 0) {
        ctx.fillStyle = '#fff';
        ctx.textBaseline = 'middle';
        ctx.fillText(valStr, bx + barW / 2, by + bh / 2);
      } else if (val > 0) {
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.textBaseline = 'bottom';
        ctx.fillText(valStr, bx + barW / 2, by - 2);
      }

      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.font = '8px -apple-system,sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      ctx.fillText(weekLabels[w], bx + barW / 2, barBot + 3);
    }
  }

  // ── Watermark ─────────────────────────────────────────────────
  ctx.fillStyle = 'rgba(255,255,255,0.07)';
  ctx.font = '9px -apple-system,sans-serif';
  ctx.textAlign = 'right'; ctx.textBaseline = 'alphabetic';
  ctx.fillText('fox2.app', CW - PAD, CH - 4);

  return canvas;
}

// ── Zone time calculation ─────────────────────────────────────────
// Matches device behavior (drawKetoneGraphToSprite_zones):
//   - Uses ConstrainedSpline interpolation (exact device algorithm)
//   - Samples only up to last measurement (not full 1440 minutes)
//   - Rounds PPM to integers before zone classification
//   - No inter-day interpolation for zone calculations
//   - Processes ALL days with data (not just most recent)
// Thresholds: <=2 = glucose, <=4 = mixed, >=5 = fat (after rounding)
function calcZoneTimes() {
  var glucose = 0, mixed = 0, fat = 0;

  if (totalDays === 0) return { glucose: 0, mixed: 0, fat: 0 };
  
  // Process all days that have data
  for (var d = 0; d < totalDays; d++) {
    var pts  = days[d].epochs;
    var vals = days[d].vals;
    
    if (pts.length === 0) continue; // Skip days with no data
    
    var dayStart = windowStart + d * 86400; // midnight of this day (seconds)
    
    // ── Build arrays for ConstrainedSpline (minutes, ppm) ─────────
    var xVals = [];
    var yVals = [];
    
    // Add midnight anchor if needed (device adds this during graph prep)
    var firstMinute = (pts[0] - dayStart) / 60;
    if (firstMinute > 0) {
      // Add a midnight point - use first measurement value for simplicity
      // (device has more complex logic with previous day, but this matches the visual better)
      xVals.push(0);
      yVals.push(vals[0]);
    }
    
    // Add all measurements
    for (var i = 0; i < pts.length; i++) {
      var minute = (pts[i] - dayStart) / 60;
      xVals.push(minute);
      yVals.push(vals[i]);
    }
    
    if (xVals.length < 2) {
      // Need at least 2 points for spline - skip this day
      continue;
    }
    
    // Clear derivative cache for this day
    derivCache = {};
    
    // ── Sample the curve every minute up to last measurement ──────
    var lastMinute = xVals[xVals.length - 1];
    
    for (var minute = 0; minute < lastMinute; minute++) {
      // Use ConstrainedSpline (exact device algorithm)
      var ppm = constrainedSpline(xVals, yVals, xVals.length, minute);
      
      if (isNaN(ppm)) continue;
      
      ppm = Math.max(0, ppm);
      
      // Round ppm to nearest integer (matches device)
      var ppmInt = Math.round(ppm);
      
      // Classify this minute into a zone (matches device thresholds)
      if (ppmInt <= 2) {
        glucose++;
      } else if (ppmInt <= 4) {
        mixed++;
      } else {
        fat++;
      }
    }
  }

  return { glucose: glucose, mixed: mixed, fat: fat };
}

// Calculate zone times for a single day
function calcDayZoneTimes(dayIdx) {
  var glucose = 0, mixed = 0, fat = 0;
  
  var pts  = days[dayIdx].epochs;
  var vals = days[dayIdx].vals;
  
  if (pts.length === 0) return { glucose: 0, mixed: 0, fat: 0 };
  
  var dayStart = windowStart + dayIdx * 86400;
  
  var xVals = [];
  var yVals = [];
  
  var firstMinute = (pts[0] - dayStart) / 60;
  if (firstMinute > 0) {
    xVals.push(0);
    yVals.push(vals[0]);
  }
  
  for (var i = 0; i < pts.length; i++) {
    var minute = (pts[i] - dayStart) / 60;
    xVals.push(minute);
    yVals.push(vals[i]);
  }
  
  if (xVals.length < 2) return { glucose: 0, mixed: 0, fat: 0 };
  
  derivCache = {};
  var lastMinute = xVals[xVals.length - 1];
  
  for (var minute = 0; minute < lastMinute; minute++) {
    var ppm = constrainedSpline(xVals, yVals, xVals.length, minute);
    if (isNaN(ppm)) continue;
    ppm = Math.max(0, ppm);
    var ppmInt = Math.round(ppm);
    
    if (ppmInt <= 2) {
      glucose++;
    } else if (ppmInt <= 4) {
      mixed++;
    } else {
      fat++;
    }
  }
  
  return { glucose: glucose, mixed: mixed, fat: fat };
}

// Calculate and store zone times for all days
function calcAllDayZoneTimes() {
  for (var d = 0; d < totalDays; d++) {
    if (days[d].vals.length > 0) {
      days[d].zoneTimes = calcDayZoneTimes(d);
    }
  }
}

function fmtHM(minutes) {
  var h = Math.floor(minutes / 60);
  var m = Math.round(minutes % 60);
  if (h === 0) return m + 'm';
  if (m === 0) return h + 'h';
  return h + 'h ' + m + 'm';
}

  var dest     = document.getElementById('card-graph');
